<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t68 d68">
  <title id="t68">초전도체와 초유체 — 극저온의 두 양자 현상</title>
  <desc id="d68">1908년 헬륨 액화에서 출발해 1911년 초전도, 1937년 초유체 발견에 이르는 극저온 물리학의 두 갈래 현상을 비교한다.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fc}
      .panel{fill:#ffffff;stroke:#bfd0e3;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#1f5582}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#42597a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d97b6;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      </style>
    <marker id="ar68" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <!-- Header -->
  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#1f5582"/>
  <text x="64" y="80" class="ti" fill="#ffffff">초전도체와 초유체 — 극저온의 두 양자 현상</text>
  <text x="1136" y="80" class="sub" fill="#ffffff" text-anchor="end">과학·기술 · 비교</text>

  <!-- Scene 1: 헬륨 액화 출발점 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">출발점 — 1908, 헬륨의 액화</text>
    <text x="64" y="166" class="small">카메를링 오너스가 4.2K에서 헬륨 기체를 액화. 거시적 양자 현상을 관측할 수 있는 실험 환경이 열렸다.</text>

    <rect class="panel" x="64" y="184" width="1072" height="92" rx="10"/>
    <rect x="64" y="184" width="6" height="92" fill="#1f5582"/>
    <text x="84" y="212" class="lab">절대온도 4.2 K — 거시적 양자 현상의 문턱</text>
    <text x="84" y="238" class="small">온도가 낮을수록 입자는 가장 낮은 에너지 준위만 점유 → 양자역학적 효과가 거시 세계로 드러난다.</text>
    <text x="84" y="260" class="it" fill="#1f5582">→ 이 환경에서 두 종류의 양자 현상이 발견된다: 초전도(전기 저항 0)와 초유체(점성 0).</text>
  </g>

  <!-- Scene 2 & 3: 초전도체 column (left) -->
  <g class="reveal" data-reveal-step="2">
    <rect class="panel" x="64" y="316" width="528" height="350" rx="12" stroke-width="1.6" stroke="#1f5582" fill="#f0f5fb"/>
    <rect x="64" y="316" width="528" height="40" rx="12" fill="#1f5582"/>
    <text x="84" y="342" class="lab" fill="#ffffff">초전도체 (Superconductor)</text>
    <text x="572" y="342" class="small" fill="#ffffff" text-anchor="end">1911 · 카메를링 오너스</text>

    <text x="84" y="382" class="bd">2 — 초전도성의 발견</text>
    <text x="84" y="408" class="small">· 4.2K에서 수은의 전기 저항이 0으로 ‘갑자기’ 떨어진 현상</text>
    <text x="84" y="430" class="small">· 마티센·듀어·켈빈의 가설 경쟁 끝에 듀어의 예측 적중</text>
    <text x="84" y="452" class="small">· 수은이 선택된 이유: 상온 액체 → 불순물 제거 용이</text>
    <text x="84" y="474" class="it" fill="#1f5582">핵심 변화: 전기 저항 R = 0</text>
  </g>

  <g class="reveal" data-reveal-step="3">
    <text x="84" y="516" class="bd">3 — 마이스너 효과</text>
    <text x="84" y="542" class="small">· 초전도 상태에 들어가면 외부 자기장이 내부에서 완전히 배제됨</text>
    <text x="84" y="564" class="small">· 자석을 가까이 대면 떠오른다 (자기 부상 효과)</text>
    <text x="84" y="586" class="small">· 단순한 ‘저항 0’을 넘어선 새로운 양자 상태의 증거</text>

    <!-- 자기 부상 마이크로 도식 -->
    <g transform="translate(110,610)">
      <rect x="0" y="20" width="380" height="14" rx="4" fill="#1f5582"/>
      <text x="-26" y="32" class="small" text-anchor="end">초전도체</text>
      <rect x="160" y="-6" width="60" height="14" rx="6" fill="#a83a4a"/>
      <text x="190" y="-12" class="small" text-anchor="middle">자석</text>
      <path d="M170 8 Q190 -2 210 8" stroke="#1f5582" stroke-width="1.4" fill="none" stroke-dasharray="3,3"/>
      <path d="M150 14 Q190 -10 230 14" stroke="#1f5582" stroke-width="1.2" fill="none" stroke-dasharray="3,3" opacity=".6"/>
    </g>
    <text x="328" y="660" class="it" fill="#1f5582" text-anchor="middle">자기장의 완전한 배제</text>
  </g>

  <!-- Scene 4: 초유체 column (right) -->
  <g class="reveal" data-reveal-step="4">
    <rect class="panel" x="608" y="316" width="528" height="350" rx="12" stroke-width="1.6" stroke="#1f5582" fill="#f0f5fb"/>
    <rect x="608" y="316" width="528" height="40" rx="12" fill="#1f5582"/>
    <text x="628" y="342" class="lab" fill="#ffffff">초유체 (Superfluid)</text>
    <text x="1116" y="342" class="small" fill="#ffffff" text-anchor="end">1937 · 카피차 등</text>

    <text x="628" y="382" class="bd">4 — 초유체성의 발견</text>
    <text x="628" y="408" class="small">· 헬륨은 절대 영도에서도 얼지 않는다 (영점 운동 + 비활성)</text>
    <text x="628" y="430" class="small">· 2.17K(람다점)에서 비열·밀도가 발산하듯 급증 → 상전이</text>
    <text x="628" y="452" class="small">· 헬륨 II는 점성이 0이 되어 마찰 없이 흐른다</text>
    <text x="628" y="474" class="it" fill="#1f5582">핵심 변화: 점성 η = 0</text>

    <text x="628" y="516" class="bd">람다점 — 비열 그래프의 모양</text>
    <text x="628" y="542" class="small">· 상전이 온도 근방에서 비열이 그리스 문자 λ 모양으로 솟구침</text>
    <text x="628" y="564" class="small">· λ점 위 = 헬륨 I, 아래 = 헬륨 II(초유체)</text>
    <text x="628" y="586" class="small">· 모세관·미세 틈을 저항 없이 흐른다</text>

    <!-- 람다 곡선 -->
    <g transform="translate(648,608)">
      <line x1="0" y1="40" x2="380" y2="40" stroke="#bfd0e3" stroke-width="1"/>
      <line x1="0" y1="40" x2="0" y2="0" stroke="#bfd0e3" stroke-width="1"/>
      <text x="-6" y="6" class="small" text-anchor="end">C</text>
      <text x="380" y="54" class="small" text-anchor="end">T</text>
      <path d="M10 36 Q120 30 180 28 L180 6 Q210 28 240 36 L380 38" stroke="#1f5582" stroke-width="2" fill="none"/>
      <line x1="180" y1="40" x2="180" y2="44" stroke="#a83a4a" stroke-width="2"/>
      <text x="180" y="58" class="small" fill="#a83a4a" text-anchor="middle">2.17 K (λ)</text>
    </g>
  </g>

  <!-- Scene 5: 양자역학 공통점 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="722" class="num">5</text>
    <text x="92" y="722" class="bd">두 현상의 양자역학적 공통점</text>
    <text x="64" y="748" class="small">두 현상 모두 입자들이 거시적 단일 양자 상태로 응축된 결과 — 20세기 양자역학을 거시계에서 검증한 사례.</text>

    <rect class="panel" x="64" y="766" width="1072" height="220" rx="10"/>
    <g>
      <!-- 좌측 비교 표 -->
      <text x="84" y="794" class="lab">비교 표</text>
      <line x1="84" y1="806" x2="600" y2="806" stroke="#dfe7f1" stroke-width="1"/>

      <text x="84" y="828" class="small" fill="#10243a" font-weight="600">항목</text>
      <text x="240" y="828" class="small" fill="#1f5582" font-weight="600">초전도체</text>
      <text x="430" y="828" class="small" fill="#1f5582" font-weight="600">초유체</text>

      <text x="84" y="852" class="small">발견 연도</text>
      <text x="240" y="852" class="small">1911</text>
      <text x="430" y="852" class="small">1937</text>

      <text x="84" y="876" class="small">사라지는 양</text>
      <text x="240" y="876" class="small">전기 저항</text>
      <text x="430" y="876" class="small">점성</text>

      <text x="84" y="900" class="small">대표 현상</text>
      <text x="240" y="900" class="small">마이스너 효과</text>
      <text x="430" y="900" class="small">분수 효과·모세관 흐름</text>

      <text x="84" y="924" class="small">물질</text>
      <text x="240" y="924" class="small">수은 등 단일 원소 금속</text>
      <text x="430" y="924" class="small">액체 헬륨(He II)</text>

      <text x="84" y="948" class="small">임계 온도</text>
      <text x="240" y="948" class="small">≈ 4.2 K</text>
      <text x="430" y="948" class="small">2.17 K (λ점)</text>

      <!-- 우측 메시지 -->
      <line x1="640" y1="788" x2="640" y2="966" stroke="#dfe7f1" stroke-width="1"/>
      <text x="660" y="794" class="lab">공통 메커니즘</text>
      <line x1="660" y1="806" x2="1116" y2="806" stroke="#dfe7f1" stroke-width="1"/>
      <text x="660" y="830" class="small">· 거시적 단일 양자 상태로의 응축</text>
      <text x="660" y="852" class="small">· 외부 환경과의 산일 없이 흐름·전류가 유지</text>
      <text x="660" y="874" class="small">· 양자역학의 거시적 검증 사례</text>

      <rect x="660" y="892" width="456" height="62" rx="8" fill="#e6eff8" stroke="#1f5582" stroke-width="1.2"/>
      <text x="888" y="918" class="lab" fill="#1f5582" text-anchor="middle">저온이 거시 양자 현상의 문을 연다</text>
      <text x="888" y="940" class="small" text-anchor="middle">에너지 준위의 불연속성이 거시 세계에 드러난다</text>
    </g>
  </g>

  <text x="1140" y="1052" class="wm" text-anchor="end">EBS 2027 · 과학·기술 · 290쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#ffffff">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">액체 헬륨 액화</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1908년 카머링 오너스. 4K 부근의 극저온 실험을 가능하게 한 토대.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">초전도성</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1911년 발견. 특정 임계 온도 이하에서 전기 저항이 0이 되는 현상.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">마이스너 효과</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">초전도체가 외부 자기장을 완전히 배제하는 현상. 자기 부상이 일어난다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">초유체성</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1937년 발견. 액체 헬륨이 2.17K 이하에서 점성이 0이 되어 마찰 없이 흐른다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">양자역학적 공통점</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">두 현상 모두 입자들이 거시적인 단일 양자 상태로 응축되어 일어나는 양자 현상이다.</text>
  </g>
</svg>
