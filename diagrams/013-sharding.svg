<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t13 d13">
  <title id="t13">샤딩 — 데이터를 잘게 나눠 저장하는 분산 파일 관리</title>
  <desc id="d13">한 서버에 데이터가 몰린 구조를 사용자 ID 범위별 샤드로 분할하고, 약점을 복제로 보완하지만 시간 지연으로 인한 일관성 문제를 동기화로 해결한다.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fc}
      .panel{fill:#ffffff;stroke:#bfd0e3;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#1f5582}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#42597a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .mono{font:600 13px ui-monospace,'SF Mono',monospace;fill:#10243a}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d97b6;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      </style>
    <marker id="ar13" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
    <marker id="ar13-r" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#1f5582"/>
  <text x="64" y="80" class="ti" fill="#ffffff">샤딩 — 데이터를 잘게 나눠 저장하는 분산 파일 관리</text>
  <text x="1136" y="80" class="sub" fill="#cfdcec" text-anchor="end">과학·기술 · 분류</text>

  <!-- Scene 1: 분산 파일 관리 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">한 서버의 한계 → 분산 파일 관리</text>
    <text x="64" y="166" class="small">동시 접속 사용자와 데이터가 폭증하며 한 대의 서버로는 처리 한계. 여러 컴퓨터로 분산 저장·처리.</text>

    <g>
      <rect class="panel" x="64" y="184" width="528" height="128" rx="10"/>
      <text x="84" y="212" class="lab">단일 서버 — 한계</text>
      <line x1="84" y1="224" x2="572" y2="224" stroke="#dfe7f1" stroke-width="1"/>

      <g transform="translate(96,236)">
        <rect width="60" height="50" rx="6" fill="#1f5582"/>
        <text x="30" y="20" class="pill" text-anchor="middle">User</text>
        <text x="30" y="36" class="pill" text-anchor="middle">×N</text>
        <line x1="62" y1="25" x2="100" y2="25" stroke="#1f5582" stroke-width="1.6" marker-end="url(#ar13)"/>
        <rect x="100" y="0" width="60" height="50" rx="6" fill="#a83a4a"/>
        <text x="130" y="22" class="pill" text-anchor="middle">서버</text>
        <text x="130" y="38" class="pill" text-anchor="middle">한 대</text>
      </g>
      <text x="84" y="306" class="small" fill="#a83a4a">→ 처리 속도 ↓ · 확장 불가</text>

      <line x1="600" y1="248" x2="638" y2="248" stroke="#1f5582" stroke-width="2.4" marker-end="url(#ar13)"/>

      <rect class="panel" x="648" y="184" width="488" height="128" rx="10" stroke="#1f5582" stroke-width="1.6" fill="#f0f5fb"/>
      <text x="668" y="212" class="lab" fill="#1f5582">분산 파일 관리</text>
      <line x1="668" y1="224" x2="1116" y2="224" stroke="#d8e3f0" stroke-width="1"/>
      <text x="668" y="248" class="small">여러 컴퓨터에 데이터를 나누어 저장</text>
      <text x="668" y="270" class="small">필요할 때 각자 일을 나누어 처리</text>
      <text x="668" y="292" class="it" fill="#1f5582">→ 전체 시스템의 처리 능력을 끌어올림</text>
    </g>
  </g>

  <!-- Scene 2: 샤딩 구조 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="362" class="num">2</text>
    <text x="92" y="362" class="bd">샤딩의 구조 — ID 범위로 분할</text>
    <text x="64" y="388" class="small">예) 사용자 ID를 범위로 나누어 각 범위(샤드)를 서로 다른 기계에 저장. 부담은 줄고 동시 처리는 빨라진다.</text>

    <g>
      <rect class="panel" x="64" y="406" width="1072" height="186" rx="10"/>

      <!-- 큰 데이터베이스 분할 -->
      <text x="84" y="438" class="lab">큰 데이터베이스</text>
      <rect x="84" y="450" width="200" height="42" rx="6" fill="#dfeef9" stroke="#bfd0e3" stroke-width="1"/>
      <text x="184" y="476" class="small" text-anchor="middle">사용자 ID 1 ~ 4,000,000</text>

      <line x1="296" y1="471" x2="334" y2="471" stroke="#1f5582" stroke-width="2.4" marker-end="url(#ar13)"/>
      <text x="318" y="458" class="small" fill="#1f5582" text-anchor="middle">분할</text>

      <!-- 4 샤드 -->
      <g transform="translate(346,438)">
        <rect width="190" height="56" rx="8" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
        <text x="20" y="22" class="pill" fill="#1f5582">샤드 1</text>
        <text x="20" y="42" class="mono">ID 1 ~ 1,000,000</text>

        <rect x="200" width="190" height="56" rx="8" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
        <text x="220" y="22" class="pill" fill="#1f5582">샤드 2</text>
        <text x="220" y="42" class="mono">ID ~ 2,000,000</text>

        <rect x="400" width="190" height="56" rx="8" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
        <text x="420" y="22" class="pill" fill="#1f5582">샤드 3</text>
        <text x="420" y="42" class="mono">ID ~ 3,000,000</text>

        <rect x="600" width="190" height="56" rx="8" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
        <text x="620" y="22" class="pill" fill="#1f5582">샤드 4</text>
        <text x="620" y="42" class="mono">ID ~ 4,000,000</text>
      </g>

      <!-- 기계 -->
      <g transform="translate(346,524)">
        <rect width="190" height="50" rx="6" fill="#10243a"/>
        <text x="95" y="22" class="pill" text-anchor="middle">기계 A</text>
        <text x="95" y="40" class="small" fill="#cfdcec" text-anchor="middle">샤드 1 저장</text>

        <rect x="200" width="190" height="50" rx="6" fill="#10243a"/>
        <text x="295" y="22" class="pill" text-anchor="middle">기계 B</text>
        <text x="295" y="40" class="small" fill="#cfdcec" text-anchor="middle">샤드 2 저장</text>

        <rect x="400" width="190" height="50" rx="6" fill="#10243a"/>
        <text x="495" y="22" class="pill" text-anchor="middle">기계 C</text>
        <text x="495" y="40" class="small" fill="#cfdcec" text-anchor="middle">샤드 3 저장</text>

        <rect x="600" width="190" height="50" rx="6" fill="#10243a"/>
        <text x="695" y="22" class="pill" text-anchor="middle">기계 D</text>
        <text x="695" y="40" class="small" fill="#cfdcec" text-anchor="middle">샤드 4 저장</text>
      </g>

      <text x="84" y="586" class="it" fill="#1f5582">→ 부담 분산 + 동시 다중 처리 + 기계 추가로 손쉬운 확장</text>
    </g>
  </g>

  <!-- Scene 3: 약점 + 복제 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="640" class="num">3</text>
    <text x="92" y="640" class="bd">샤딩의 약점과 복제로의 보완</text>

    <g>
      <rect class="panel" x="64" y="658" width="528" height="160" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>
      <text x="84" y="686" class="lab" fill="#a83a4a">두 가지 약점</text>
      <line x1="84" y1="698" x2="572" y2="698" stroke="#fbe6e9" stroke-width="1"/>
      <text x="84" y="722" class="small">① 여러 샤드의 데이터를 모으는 통신 비용 ↑</text>
      <text x="84" y="744" class="small">  예) 모든 사용자 평균 이용 시간 = 모든 샤드 데이터 합산</text>
      <text x="84" y="772" class="small">② 한 기계 다운 시 그 샤드 데이터 접근 불가</text>
      <text x="84" y="794" class="small">  → 서비스 일부 중단</text>

      <rect class="panel" x="608" y="658" width="528" height="160" rx="10" stroke="#1f5582" stroke-width="1.4" fill="#f0f5fb"/>
      <text x="628" y="686" class="lab" fill="#1f5582">해법 — 복제(Replication) 결합</text>
      <line x1="628" y1="698" x2="1116" y2="698" stroke="#d8e3f0" stroke-width="1"/>

      <g transform="translate(648,716)">
        <rect width="80" height="36" rx="6" fill="#10243a"/>
        <text x="40" y="22" class="pill" text-anchor="middle">기계 A</text>
        <text x="40" y="62" class="small" text-anchor="middle">샤드 1</text>

        <line x1="84" y1="18" x2="124" y2="18" stroke="#1f5582" stroke-width="2" marker-end="url(#ar13)"/>
        <text x="104" y="10" class="small" fill="#1f5582" text-anchor="middle">복제</text>

        <rect x="128" width="80" height="36" rx="6" fill="#5e548e"/>
        <text x="168" y="22" class="pill" text-anchor="middle">기계 A'</text>
        <text x="168" y="62" class="small" text-anchor="middle">샤드 1 복제본</text>
      </g>

      <text x="628" y="800" class="it" fill="#1f5582">기계 A 다운 → 복제본을 가진 A'가 대신 응답 → 서비스 무중단</text>
    </g>
  </g>

  <!-- Scene 4: 일관성 문제 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="868" class="num">4</text>
    <text x="92" y="868" class="bd">데이터 일관성 문제와 동기화</text>
    <text x="64" y="894" class="small">기계 사이의 시간 지연으로 일관성이 일시적으로 깨질 수 있음 — 갱신 동기화 / 결국적 일관성으로 보완.</text>

    <g>
      <rect class="panel" x="64" y="912" width="1072" height="124" rx="10"/>

      <g transform="translate(96,944)">
        <rect width="170" height="52" rx="6" fill="#10243a"/>
        <text x="85" y="22" class="pill" text-anchor="middle">기계 A</text>
        <text x="85" y="42" class="mono" fill="#ffffff" text-anchor="middle">x = 100 (갱신됨)</text>

        <line x1="180" y1="26" x2="220" y2="26" stroke="#a83a4a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ar13-r)"/>
        <text x="200" y="14" class="small" fill="#a83a4a" text-anchor="middle">시간 지연</text>

        <rect x="226" width="170" height="52" rx="6" fill="#5e548e"/>
        <text x="311" y="22" class="pill" text-anchor="middle">기계 A'</text>
        <text x="311" y="42" class="mono" fill="#ffffff" text-anchor="middle">x = 99 (이전값)</text>

        <text x="430" y="32" class="small" fill="#a83a4a">⚠ 일관성 일시 깨짐</text>
      </g>

      <text x="84" y="1018" class="it" fill="#1f5582">해결: 갱신 순서·시점을 정확히 맞추는 동기화 / 일정 시간 후 회복되는 결국적 일관성 보장</text>
    </g>
  </g>

  <text x="1140" y="1064" class="wm" text-anchor="end">EBS 2027 · 과학·기술 · 223쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">분산 파일 관리</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">데이터를 여러 컴퓨터에 나누어 저장·처리하는 방식. 한 서버의 한계를 극복하기 위해 등장.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">샤딩</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">데이터를 샤드 단위로 분할하여 서로 다른 기계에 저장하는 분산 파일 관리 방식.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">샤딩의 장점</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">각 기계의 부담이 줄고 동시에 다른 요청을 처리할 수 있으며, 기계를 추가해 시스템을 쉽게 확장할 수 있다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">샤딩의 약점</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">여러 샤드의 데이터를 끌어모으는 통신 비용이 크고, 한 기계가 다운되면 그 샤드의 데이터에 접근할 수 없다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">복제와 일관성</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">복제를 결합하면 기계 다운 시에도 서비스가 끊기지 않지만, 기계 간 시간 지연으로 데이터 일관성이 일시적으로 깨질 수 있어 동기화 방법으로 보완한다.</text>
  </g>
</svg>
