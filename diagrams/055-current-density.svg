<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1020" data-app role="img" aria-labelledby="t55 d55">
  <title id="t55">전류 밀도와 표피 효과 — 도선의 열 발생을 결정하는 두 요인</title>
  <desc id="d55">단위 면적당 전류량(전류 밀도)이 열 발생을 결정하고, 고주파에서는 표피 효과로 유효 단면적이 줄어 열이 더 커진다.</desc>
  <defs>
    <style>
      .bg{fill:#fbf7ee}
      .panel{fill:#ffffff;stroke:#d8cdb6;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#8b6f47}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#4f463d}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#9c8e7a;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar55" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b6f47"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1020"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#8b6f47"/>
  <text x="64" y="80" class="ti" fill="#ffffff">전류 밀도와 표피 효과 — 도선의 열 발생을 결정하는 두 요인</text>
  <text x="1136" y="80" class="sub" fill="#f4ead6" text-anchor="end">독서 방법 · 인과</text>

  <!-- Scene 1: 전류 밀도 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">전류 밀도 — 단위 면적당 전류량 = 열 발생의 핵심</text>
    <text x="64" y="166" class="small">도선 내 전자가 원자와 충돌하며 운동 에너지가 열에너지로 변환된다. 단면적이 좁을수록 밀도와 열은 함께 커진다.</text>

    <g>
      <!-- 굵은 도선 - 전류 밀도 낮음 -->
      <rect class="panel" x="64" y="184" width="528" height="220" rx="10"/>
      <text x="84" y="212" class="lab">굵은 도선 — 전류 밀도 낮음</text>
      <line x1="84" y1="224" x2="572" y2="224" stroke="#e3d6b8" stroke-width="1"/>

      <ellipse cx="328" cy="320" rx="180" ry="48" fill="#fbeed3" stroke="#8b6f47" stroke-width="1.4"/>
      <g fill="#1f5582">
        <circle cx="200" cy="320" r="3"/>
        <circle cx="240" cy="312" r="3"/>
        <circle cx="280" cy="328" r="3"/>
        <circle cx="320" cy="316" r="3"/>
        <circle cx="360" cy="324" r="3"/>
        <circle cx="400" cy="316" r="3"/>
        <circle cx="440" cy="324" r="3"/>
      </g>
      <text x="328" y="375" class="small" text-anchor="middle">단면적 큼 → 전자들이 여유 있게 흐름</text>
      <text x="328" y="395" class="it" fill="#2a6f6f" text-anchor="middle">충돌 ↓ · 열 발생 ↓</text>

      <!-- 가는 도선 - 전류 밀도 높음 -->
      <rect class="panel" x="608" y="184" width="528" height="220" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>
      <text x="628" y="212" class="lab" fill="#a83a4a">가는 도선 — 전류 밀도 높음</text>
      <line x1="628" y1="224" x2="1116" y2="224" stroke="#fbe6e9" stroke-width="1"/>

      <ellipse cx="872" cy="320" rx="60" ry="32" fill="#fbe6e9" stroke="#a83a4a" stroke-width="1.4"/>
      <g fill="#1f5582">
        <circle cx="826" cy="312" r="3"/>
        <circle cx="844" cy="320" r="3"/>
        <circle cx="862" cy="316" r="3"/>
        <circle cx="880" cy="324" r="3"/>
        <circle cx="898" cy="318" r="3"/>
        <circle cx="916" cy="320" r="3"/>
        <circle cx="836" cy="328" r="3"/>
        <circle cx="852" cy="312" r="3"/>
        <circle cx="884" cy="312" r="3"/>
        <circle cx="908" cy="328" r="3"/>
      </g>
      <text x="872" y="375" class="small" text-anchor="middle">단면적 작음 → 전자들이 빽빽하게 흐름</text>
      <text x="872" y="395" class="it" fill="#a83a4a" text-anchor="middle">충돌 ↑ · 열 발생 ↑</text>
    </g>
  </g>

  <!-- Scene 2: 표피 효과 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="450" class="num">2</text>
    <text x="92" y="450" class="bd">표피 효과 — 고주파에서 전류가 표면으로 쏠림</text>
    <text x="64" y="476" class="small">교류의 변화하는 자기장 → 도선 내 유도 와전류 → 중심부 전류 밀어내기 → 표면층 집중.</text>

    <g>
      <rect class="panel" x="64" y="494" width="1072" height="248" rx="10"/>

      <!-- 도선 단면 비교 (DC vs AC 고주파) -->
      <g transform="translate(140,612)">
        <text x="0" y="-90" class="lab">직류 (DC)</text>
        <circle r="60" fill="#fbeed3" stroke="#8b6f47" stroke-width="1.4"/>
        <g fill="#1f5582" opacity=".7">
          <circle cx="-30" cy="-20" r="2.5"/>
          <circle cx="0" cy="-30" r="2.5"/>
          <circle cx="30" cy="-15" r="2.5"/>
          <circle cx="-25" cy="10" r="2.5"/>
          <circle cx="20" cy="20" r="2.5"/>
          <circle cx="-15" cy="35" r="2.5"/>
          <circle cx="0" cy="0" r="2.5"/>
          <circle cx="15" cy="-5" r="2.5"/>
        </g>
        <text x="0" y="80" class="small" text-anchor="middle">균일 분포</text>
        <text x="0" y="100" class="it" text-anchor="middle">전체 단면 사용</text>
      </g>

      <line x1="240" y1="612" x2="320" y2="612" stroke="#8b6f47" stroke-width="2.4" marker-end="url(#ar55)"/>
      <text x="280" y="600" class="small" fill="#8b6f47" text-anchor="middle">고주파일수록</text>

      <g transform="translate(440,612)">
        <text x="0" y="-90" class="lab" fill="#a83a4a">교류 고주파 (AC)</text>
        <circle r="60" fill="#fbeed3" stroke="#8b6f47" stroke-width="1.4"/>
        <circle r="42" fill="#fbf7ee" stroke="#d8cdb6" stroke-width="1" stroke-dasharray="3 2"/>
        <g fill="#1f5582">
          <!-- 표면층에 집중 -->
          <circle cx="-50" cy="-15" r="2.8"/>
          <circle cx="-45" cy="20" r="2.8"/>
          <circle cx="-30" cy="-45" r="2.8"/>
          <circle cx="0" cy="-52" r="2.8"/>
          <circle cx="30" cy="-45" r="2.8"/>
          <circle cx="48" cy="-20" r="2.8"/>
          <circle cx="50" cy="15" r="2.8"/>
          <circle cx="35" cy="42" r="2.8"/>
          <circle cx="0" cy="52" r="2.8"/>
          <circle cx="-30" cy="45" r="2.8"/>
        </g>
        <text x="0" y="80" class="small" text-anchor="middle" fill="#a83a4a">표면층에 집중</text>
        <text x="0" y="100" class="it" text-anchor="middle" fill="#a83a4a">유효 단면적 ↓</text>
      </g>

      <!-- 우측 인과 사슬 -->
      <g transform="translate(620,548)">
        <text x="0" y="0" class="lab">표피 효과의 인과 사슬</text>
        <line x1="0" y1="14" x2="500" y2="14" stroke="#e3d6b8" stroke-width="1"/>

        <text x="0" y="40" class="small">① 교류 → 시간에 따라 변하는 자기장</text>
        <text x="0" y="62" class="small">② 도선 내부에 ‘유도 와전류’ 발생</text>
        <text x="0" y="84" class="small">③ 중심부 전류 밀어내기 → 표면층에 집중</text>
        <text x="0" y="106" class="small">④ 유효 단면적 ↓ → 저항 ↑</text>
        <text x="0" y="134" class="it" fill="#a83a4a">⑤ 더 많은 에너지가 열로 변환 → 열 발생 ↑</text>
        <text x="0" y="160" class="it" fill="#8b6f47">주파수가 높을수록 효과 강해짐</text>
      </g>
    </g>
  </g>

  <!-- Scene 3: 실무적 함의 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="788" class="num">3</text>
    <text x="92" y="788" class="bd">실무적 해결책 — 리츠 와이어와 표면 처리</text>

    <g>
      <rect class="panel" x="64" y="806" width="528" height="186" rx="10" stroke="#8b6f47" stroke-width="1.4" fill="#fff8ec"/>
      <text x="84" y="834" class="lab" fill="#8b6f47">리츠 와이어 (Litz Wire)</text>
      <line x1="84" y1="846" x2="572" y2="846" stroke="#e3d6b8" stroke-width="1"/>
      <text x="84" y="870" class="small">여러 가닥의 ‘얇고 절연된 선’을 꼬아 사용</text>
      <text x="84" y="892" class="small">→ 각 가닥의 자기장이 서로 상쇄</text>
      <text x="84" y="914" class="small">→ 표피 효과 최소화</text>
      <text x="84" y="940" class="it">전체 단면적에 전류가 균일하게 흐름</text>

      <!-- 리츠 와이어 도식 -->
      <g transform="translate(440,910)">
        <circle r="10" fill="#fbeed3" stroke="#8b6f47"/>
        <circle cx="-14" cy="-6" r="5" fill="#1f5582" opacity=".6"/>
        <circle cx="14" cy="-6" r="5" fill="#1f5582" opacity=".6"/>
        <circle cx="-14" cy="6" r="5" fill="#1f5582" opacity=".6"/>
        <circle cx="14" cy="6" r="5" fill="#1f5582" opacity=".6"/>
        <circle cx="0" cy="-15" r="5" fill="#1f5582" opacity=".6"/>
        <circle cx="0" cy="15" r="5" fill="#1f5582" opacity=".6"/>
        <circle r="5" fill="#1f5582" opacity=".6"/>
      </g>

      <rect class="panel" x="608" y="806" width="528" height="186" rx="10" stroke="#8b6f47" stroke-width="1.4" fill="#fff8ec"/>
      <text x="628" y="834" class="lab" fill="#8b6f47">표면 처리·구조 최적화</text>
      <line x1="628" y1="846" x2="1116" y2="846" stroke="#e3d6b8" stroke-width="1"/>
      <text x="628" y="870" class="small">· 중심부 금속 제거 — 자원 절약</text>
      <text x="628" y="892" class="small">· 알루미늄 + 구리 코팅 — 표면 저항 ↓</text>
      <text x="628" y="914" class="small">· 표면층의 전도성을 우선 강화</text>
      <text x="628" y="940" class="it">표피 효과의 ‘약점’을 ‘설계 자원’으로 활용</text>
    </g>
  </g>

  <text x="1140" y="1004" class="wm" text-anchor="end">EBS 2027 · 독서 방법 · 17쪽</text>
</svg>
