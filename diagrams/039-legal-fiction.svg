<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="t039 d039">
  <title id="t039">법적 의제 — 사실 아닌 것을 사실로 취급</title>
  <desc id="d039">법적 의제의 정의(실종 선고)에서 시작해 벤담의 비판과 메인의 옹호 두 입장을 좌우 대비, 메인의 좁은·넓은 의미 구분, 한계 인식, 그리고 근대 법체계 판례 형성에 남아 있는 의제를 도식·시간축·인물 도식으로 시각화.</desc>
  <defs>
    <style>
      .reveal{transition:opacity .35s ease, transform .35s ease}
      .bg{fill:#f5f1e8}
      .panel{fill:#fff;stroke:#c9bfa8;stroke-width:1.2}
      .ti{font:700 26px 'Noto Serif KR',serif;fill:#1a1612}
      .head{font:700 18px 'Noto Serif KR',serif;fill:#1a1612}
      .lab{font:600 15px 'Pretendard',sans-serif;fill:#1a1612}
      .lab-sm{font:400 13px 'Pretendard',sans-serif;fill:#4a3f33}
      .lab-xs{font:400 11px 'Pretendard',sans-serif;fill:#7a6f5f}
      .num{font:700 20px 'Pretendard',sans-serif;fill:#2a6f6f}
      .pill{font:600 13px 'Pretendard',sans-serif;fill:#fff}
      .it-r{font:400 13px 'Pretendard',sans-serif;fill:#a83a4a}
      .it-s{font:400 13px 'Pretendard',sans-serif;fill:#2a6f6f}
      .axis{font:600 11px 'Pretendard',sans-serif;fill:#2a6f6f}
      .quote{font:600 13px 'Noto Serif KR',serif;fill:#2a6f6f;font-style:italic}
      .wm{font:400 12px 'Pretendard',sans-serif;fill:#7a6f5f;letter-spacing:.04em}
    </style>
    <marker id="ar39" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
    <marker id="ar39-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
    <symbol id="person39" viewBox="0 0 28 36">
      <circle cx="14" cy="9" r="6" fill="#ebe5d4" stroke="#7a6f5f"/>
      <path d="M3 34 Q3 19 14 19 Q25 19 25 34 Z" fill="#ebe5d4" stroke="#7a6f5f"/>
    </symbol>
    <symbol id="cross39" viewBox="0 0 24 24">
      <path d="M10 2 V14 H4 V18 H10 V24 H14 V18 H20 V14 H14 V2 Z" fill="#a83a4a" opacity="0.85"/>
    </symbol>
    <symbol id="qmark" viewBox="0 0 20 24">
      <path d="M5 7 Q5 2 10 2 Q15 2 15 7 Q15 11 10 12 V16" fill="none" stroke="#a83a4a" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="10" cy="20" r="1.6" fill="#a83a4a"/>
    </symbol>
    <symbol id="book39" viewBox="0 0 28 24">
      <rect x="2" y="2" width="24" height="20" rx="2" fill="#fff" stroke="#7a6f5f"/>
      <line x1="14" y1="2" x2="14" y2="22" stroke="#7a6f5f"/>
      <line x1="6" y1="8" x2="11" y2="8" stroke="#7a6f5f" stroke-width="0.8"/>
      <line x1="6" y1="12" x2="11" y2="12" stroke="#7a6f5f" stroke-width="0.8"/>
      <line x1="17" y1="8" x2="22" y2="8" stroke="#7a6f5f" stroke-width="0.8"/>
      <line x1="17" y1="12" x2="22" y2="12" stroke="#7a6f5f" stroke-width="0.8"/>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <rect x="40" y="36" width="1120" height="62" rx="10" fill="#2a6f6f"/>
  <text x="64" y="76" class="ti" fill="#fff">법적 의제 — 사실 아닌 것을 사실로 취급</text>
  <text x="1136" y="76" class="lab-sm" fill="#ffffff" text-anchor="end">사회·문화 · 비교</text>

  <!-- Scene 1: 정의 + 실종선고 시각화 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="134" class="num">1</text>
    <text x="92" y="134" class="head">법적 의제의 정의 + 대표 사례 (실종 선고)</text>

    <rect class="panel" x="64" y="152" width="1072" height="180" rx="10"/>
    <rect x="64" y="152" width="6" height="180" fill="#2a6f6f"/>

    <!-- 좌: 정의 박스 -->
    <g transform="translate(84,170)">
      <text x="0" y="20" class="lab">정의</text>
      <text x="0" y="44" class="lab-sm">실제로는 사실이 아닌 것을 법적으로</text>
      <text x="0" y="62" class="lab-sm">사실인 것처럼 취급하고,</text>
      <text x="0" y="80" class="lab-sm">반대 증거가 있어도 그 취급을 고수</text>
      <text x="0" y="106" class="it-s">→ 사회적 안정 + 분쟁 해결</text>
    </g>

    <!-- 우: 실종 선고 시각 시간축 -->
    <g transform="translate(440,180)">
      <text x="0" y="0" class="lab" fill="#a83a4a">실종 선고 (대표 사례)</text>

      <!-- 시간축 -->
      <line x1="20" y1="80" x2="640" y2="80" stroke="#7a6f5f" stroke-width="2"/>
      <polygon points="640,74 660,80 640,86" fill="#7a6f5f"/>

      <!-- T0 -->
      <line x1="60" y1="68" x2="60" y2="92" stroke="#7a6f5f" stroke-width="1.4"/>
      <use href="#person39" x="46" y="36" width="28" height="36"/>
      <text x="60" y="108" class="lab-xs" text-anchor="middle">생존 (확인됨)</text>
      <text x="60" y="124" class="axis" text-anchor="middle">T0</text>

      <!-- T1 -->
      <line x1="240" y1="68" x2="240" y2="92" stroke="#7a6f5f" stroke-width="1.4"/>
      <use href="#qmark" x="232" y="40" width="16" height="20"/>
      <text x="240" y="108" class="lab-xs" text-anchor="middle">생사 미확인</text>
      <text x="240" y="124" class="axis" text-anchor="middle">T1</text>

      <!-- T2 (5년 경과) -->
      <line x1="420" y1="68" x2="420" y2="92" stroke="#7a6f5f" stroke-width="1.4"/>
      <text x="420" y="44" class="lab-xs" text-anchor="middle" fill="#7a6f5f">5년 경과</text>
      <text x="420" y="108" class="lab-xs" text-anchor="middle">기간 경과</text>
      <text x="420" y="124" class="axis" text-anchor="middle">T2</text>

      <!-- T3 (선고) -->
      <line x1="580" y1="68" x2="580" y2="92" stroke="#a83a4a" stroke-width="2"/>
      <circle cx="580" cy="80" r="6" fill="#a83a4a"/>
      <use href="#cross39" x="568" y="40" width="14" height="14"/>
      <text x="580" y="108" class="lab-xs" text-anchor="middle" fill="#a83a4a" font-weight="700">사망 ‘의제’</text>
      <text x="580" y="124" class="axis" text-anchor="middle" fill="#a83a4a">T3 (선고)</text>

      <!-- 화살표 -->
      <text x="320" y="20" class="lab-xs" fill="#7a6f5f" text-anchor="middle">사실: 사망 여부 모름</text>
      <text x="320" y="148" class="it-r" text-anchor="middle">법: ‘사망’으로 취급 (반대 증거에도 불구하고)</text>
    </g>
  </g>

  <!-- Scene 2: 벤담 vs 메인 (인물 카드) -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="372" class="num">2</text>
    <text x="92" y="372" class="head">두 입장 — 벤담의 비판 vs 메인의 옹호</text>

    <!-- 벤담 카드 -->
    <rect x="64" y="390" width="528" height="200" rx="10" fill="#fbf2f4" stroke="#a83a4a" stroke-width="1.4"/>
    <rect x="64" y="390" width="528" height="36" fill="#a83a4a"/>
    <text x="84" y="414" class="pill">벤담 — 비판</text>

    <g transform="translate(84,440)">
      <use href="#person39" x="0" y="0" width="32" height="42"/>
      <text x="16" y="58" class="lab-xs" text-anchor="middle">Bentham</text>

      <text x="56" y="20" class="quote">“가장 해롭고 비열한 거짓말”</text>
      <text x="56" y="44" class="lab-sm">정의를 실현하는 일에 의제를 동원하는 것은</text>
      <text x="56" y="64" class="lab-sm">→ 거래를 한다면서 사기를 치는 것과 같다</text>

      <rect x="0" y="84" width="488" height="44" rx="8" fill="#fff" stroke="#a83a4a"/>
      <text x="14" y="102" class="lab-sm" fill="#a83a4a" font-weight="700">함의 — 폐기되어야 할 부도덕한 도구</text>
      <text x="14" y="122" class="lab-xs" fill="#a83a4a">법은 사실에 기반해야 한다</text>
    </g>

    <!-- 메인 카드 -->
    <rect x="608" y="390" width="528" height="200" rx="10" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.4"/>
    <rect x="608" y="390" width="528" height="36" fill="#2a6f6f"/>
    <text x="628" y="414" class="pill">메인 — 옹호</text>

    <g transform="translate(628,440)">
      <use href="#person39" x="0" y="0" width="32" height="42"/>
      <text x="16" y="58" class="lab-xs" text-anchor="middle">Maine</text>

      <text x="56" y="20" class="quote">“법체계 진화의 도구”</text>
      <text x="56" y="44" class="lab-sm">사회적 필요와 법 사이의 거리를 메우는 장치</text>
      <text x="56" y="64" class="lab-sm">→ 진보하는 사회의 표지</text>

      <rect x="0" y="84" width="488" height="44" rx="8" fill="#fff" stroke="#2a6f6f"/>
      <text x="14" y="102" class="lab-sm" fill="#2a6f6f" font-weight="700">함의 — 정체된 사회 vs 진보 사회</text>
      <text x="14" y="122" class="lab-xs" fill="#2a6f6f">진보 사회는 법적 의제로 변화에 유연하게 대처</text>
    </g>
  </g>

  <!-- Scene 3: 메인의 진보 사회론 - 거리 메우기 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="630" class="num">3</text>
    <text x="92" y="630" class="head">메인의 진보 사회론 — ‘거리 메우기’ 도식</text>

    <rect class="panel" x="64" y="648" width="1072" height="120" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>

    <g transform="translate(84,672)">
      <rect width="200" height="80" rx="8" fill="#fff" stroke="#7a6f5f"/>
      <text x="100" y="22" class="lab" text-anchor="middle">사회적 필요</text>
      <text x="100" y="46" class="lab-xs" text-anchor="middle">새로운 변화·요청</text>
      <text x="100" y="64" class="lab-xs" text-anchor="middle">예: 디지털 거래</text>

      <text x="232" y="46" class="lab" text-anchor="middle" fill="#a83a4a">↔</text>
      <text x="232" y="64" class="lab-xs" text-anchor="middle" fill="#a83a4a">거리</text>

      <rect x="264" y="0" width="200" height="80" rx="8" fill="#fff" stroke="#7a6f5f"/>
      <text x="364" y="22" class="lab" text-anchor="middle">기존 법조문</text>
      <text x="364" y="46" class="lab-xs" text-anchor="middle">변경 안 됨</text>
      <text x="364" y="64" class="lab-xs" text-anchor="middle">전통적 텍스트</text>

      <line x1="476" y1="40" x2="514" y2="40" stroke="#2a6f6f" stroke-width="2.4" marker-end="url(#ar39)"/>

      <rect x="522" y="0" width="448" height="80" rx="8" fill="#2a6f6f"/>
      <text x="746" y="26" class="pill" text-anchor="middle">법적 의제 — 거리를 메우는 장치</text>
      <text x="746" y="50" class="lab-xs" fill="#ffffff" text-anchor="middle">→ 진보하는 사회의 표지</text>
      <text x="746" y="68" class="lab-xs" fill="#ffffff" text-anchor="middle">법체계가 변화에 유연하게 대처</text>
    </g>
  </g>

  <!-- Scene 4: 좁은 의미 vs 넓은 의미 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="810" class="num">4</text>
    <text x="92" y="810" class="head">메인의 두 의미 구분 (비교)</text>

    <!-- 좁은 의미 -->
    <rect x="64" y="828" width="528" height="148" rx="10" fill="#fff" stroke="#7a6f5f" stroke-width="1.4"/>
    <rect x="64" y="828" width="528" height="32" fill="#a83a4a"/>
    <text x="84" y="850" class="pill">좁은 의미</text>

    <g transform="translate(84,876)">
      <text x="0" y="20" class="lab">사실 부합 ✗ 진술 + 법적 힘</text>
      <text x="0" y="44" class="lab-sm">사실에 부합하지 않는 진술이</text>
      <text x="0" y="62" class="lab-sm">부인되지 않도록 법적 힘이 가해진 것</text>

      <rect x="0" y="74" width="488" height="22" rx="6" fill="#fbf2f4" stroke="#a83a4a"/>
      <text x="10" y="90" class="lab-xs" fill="#a83a4a">예 — 실종 선고 (사망 의제)</text>
    </g>

    <!-- 넓은 의미 -->
    <rect x="608" y="828" width="528" height="148" rx="10" fill="#fff" stroke="#7a6f5f" stroke-width="1.4"/>
    <rect x="608" y="828" width="528" height="32" fill="#2a6f6f"/>
    <text x="628" y="850" class="pill">넓은 의미</text>

    <g transform="translate(628,876)">
      <text x="0" y="20" class="lab">법조문 그대로 + 적용 범위 확장</text>
      <text x="0" y="44" class="lab-sm">법 규칙의 문언이 유지되고 있다는 사실을</text>
      <text x="0" y="62" class="lab-sm">감추기 위한 가정 — 위장된 변화</text>

      <rect x="0" y="74" width="488" height="22" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="10" y="90" class="lab-xs" fill="#2a6f6f">→ “그대로다”로 위장한 변화 (적용 확장)</text>
    </g>
  </g>

  <!-- Scene 5: 메인의 한계 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="1018" class="num">5</text>
    <text x="92" y="1018" class="head">메인의 한계 인식 — 양면적 태도</text>

    <rect class="panel" x="64" y="1036" width="1072" height="80" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>

    <g transform="translate(84,1056)">
      <rect width="160" height="40" rx="8" fill="#fff" stroke="#a83a4a"/>
      <text x="80" y="26" class="lab-sm" text-anchor="middle" fill="#a83a4a">법적 의제</text>

      <line x1="170" y1="20" x2="200" y2="20" stroke="#a83a4a" stroke-width="2" marker-end="url(#ar39-r)"/>
      <text x="206" y="14" class="lab-sm">유용성 ✓ 그러나 일시적·과도기적 도구</text>
      <text x="206" y="34" class="lab-sm" fill="#a83a4a">결국 ⇒ 입법·개정으로 정식 해결되어야</text>

      <rect x="730" y="0" width="320" height="40" rx="8" fill="#a83a4a"/>
      <text x="890" y="26" class="pill" text-anchor="middle">입법 정식 해결</text>
    </g>
  </g>

  <!-- Scene 6: 근대 법체계 — 판례 형성 -->
  <g class="reveal" data-reveal-step="6">
    <text x="64" y="1156" class="num">6</text>
    <text x="92" y="1156" class="head">근대 법체계의 현실 — 판례 형성에 남은 의제의 그림자</text>

    <rect class="panel" x="64" y="1174" width="1072" height="20" rx="6" stroke="#7a6f5f" fill="#ebe5d4"/>
    <use href="#book39" x="80" y="1170" width="22" height="20"/>
    <text x="110" y="1188" class="lab-xs">판례 형성 — 법조문 그대로 + 적용 범위가 확장 = 넓은 의미의 법적 의제 (의제임이 잘 드러나지 않음)</text>
  </g>

  <text x="1140" y="1196" class="wm" text-anchor="end">EBS 2027 · 사회·문화 · 162쪽</text>
</svg>
