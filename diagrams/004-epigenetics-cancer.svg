<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" role="img" aria-labelledby="t4 d4">
  <title id="t4">후성 유전학을 이용한 항암 치료</title>
  <desc id="d4">DNA 염기 서열은 그대로지만 유전자 발현이 조절되는 후성 유전의 두 메커니즘 — 사이토신에 메틸기가 붙어 전사를 차단하는 DNA 메틸화와, 히스톤에 아세틸기가 붙어 감긴 DNA가 풀려 전사가 활성화되는 히스톤 아세틸화 — 이 어떻게 암 발생에 관여하고, 후성 유전적 항암제가 이 메커니즘을 어떻게 표적으로 하는지, 그리고 누드슨의 이중 적중 모델이 후성 유전 차원으로 어떻게 확장되었는지를 시각화한다.</desc>

  <defs>
    <marker id="ar4-ink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1612"/>
    </marker>
    <marker id="ar4-sci" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
    <marker id="ar4-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .sci { fill: #1f5582; }
    .sci-st { stroke: #1f5582; }
    .sci-bg { fill: rgba(31,85,130,0.08); }
    .sci-bg2 { fill: rgba(31,85,130,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
    .acc-bg2 { fill: rgba(168,58,74,0.18); }
    .base-A { fill: #5e8c5e; }
    .base-T { fill: #b58a3c; }
    .base-G { fill: #5e548e; }
    .base-C { fill: #1f5582; }
  ]]></style>

  <!-- ===========================================================
       Step 1 · 후성 유전 정의
       =========================================================== -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="100" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">후성 유전 (Epigenetics) — 같은 DNA, 다른 발현</text>
    <text x="60" y="86" class="lbl">DNA 염기 서열(A·G·T·C)은 변하지 않지만, 유전자가 켜지거나 꺼지는 발현이 달라지는 현상</text>
    <text x="60" y="108" class="lbl-sm">대표 메커니즘: <tspan font-weight="700" fill="#a83a4a">DNA 메틸화 (전사 억제)</tspan>  /  <tspan font-weight="700" fill="#1f5582">히스톤 아세틸화 (전사 활성화)</tspan></text>
  </g>

  <!-- ===========================================================
       Step 2 · 두 메커니즘 (좌: 메틸화 / 우: 아세틸화)
       =========================================================== -->
  <g class="reveal" data-reveal-step="2">
    <!-- DNA 메틸화 -->
    <rect x="40" y="150" width="540" height="260" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <rect x="40" y="150" width="540" height="34" rx="6" class="acc"/>
    <text x="60" y="174" class="lbl-strong" fill="#f5f1e8">DNA 메틸화 → 전사 억제 (유전자 OFF)</text>

    <!-- DNA 가닥 with 염기 -->
    <g transform="translate(80, 250)">
      <!-- 백본 (양쪽 줄) -->
      <line x1="0" y1="-12" x2="460" y2="-12" class="ink" stroke-width="1.6"/>
      <line x1="0" y1="12" x2="460" y2="12" class="ink" stroke-width="1.6"/>
      <!-- 염기 쌍 (작은 사각형으로) -->
      <g font-family="ui-monospace, monospace" font-size="9" fill="#f5f1e8" font-weight="700" text-anchor="middle">
        <rect x="20" y="-10" width="14" height="20" class="base-A"/><text x="27" y="2">A</text>
        <rect x="60" y="-10" width="14" height="20" class="base-T"/><text x="67" y="2">T</text>
        <rect x="100" y="-10" width="14" height="20" class="base-G"/><text x="107" y="2">G</text>
        <rect x="140" y="-10" width="14" height="20" class="base-C"/><text x="147" y="2">C</text>
        <rect x="180" y="-10" width="14" height="20" class="base-A"/><text x="187" y="2">A</text>
        <rect x="220" y="-10" width="14" height="20" class="base-C"/><text x="227" y="2">C</text>
        <rect x="260" y="-10" width="14" height="20" class="base-T"/><text x="267" y="2">T</text>
        <rect x="300" y="-10" width="14" height="20" class="base-C"/><text x="307" y="2">C</text>
        <rect x="340" y="-10" width="14" height="20" class="base-G"/><text x="347" y="2">G</text>
        <rect x="380" y="-10" width="14" height="20" class="base-A"/><text x="387" y="2">A</text>
        <rect x="420" y="-10" width="14" height="20" class="base-T"/><text x="427" y="2">T</text>
      </g>
      <!-- 프로모터 영역 표시 -->
      <line x1="100" y1="-22" x2="320" y2="-22" stroke="#a83a4a" stroke-width="1.6" stroke-dasharray="3 2"/>
      <text x="210" y="-30" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">프로모터 영역</text>

      <!-- 메틸기 (사이토신 C 위에 부착) -->
      <g>
        <line x1="147" y1="-10" x2="147" y2="-46" class="acc-st" stroke-width="1.4"/>
        <circle cx="147" cy="-54" r="11" class="acc"/>
        <text x="147" y="-50" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">CH₃</text>

        <line x1="307" y1="-10" x2="307" y2="-46" class="acc-st" stroke-width="1.4"/>
        <circle cx="307" cy="-54" r="11" class="acc"/>
        <text x="307" y="-50" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">CH₃</text>
      </g>
      <text x="227" y="-72" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">메틸기가 사이토신(C)에 부착</text>
    </g>

    <!-- 결과: 전사 X -->
    <g transform="translate(80, 320)">
      <line x1="0" y1="0" x2="60" y2="0" class="acc-st" stroke-width="1.6" marker-end="url(#ar4-acc)"/>
      <text x="0" y="22" class="lbl-sm" fill="#a83a4a" font-weight="700">전사 차단</text>
      <text x="0" y="40" class="lbl-xs">→ RNA 중합효소가 결합 못 함</text>
      <text x="0" y="56" class="lbl-xs">→ 해당 유전자 OFF</text>
    </g>

    <text x="320" y="380" class="lbl-sm" fill="#a83a4a" font-weight="700">결과: 유전자가 '꺼진다'</text>

    <!-- 히스톤 아세틸화 -->
    <rect x="620" y="150" width="540" height="260" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <rect x="620" y="150" width="540" height="34" rx="6" class="sci"/>
    <text x="640" y="174" class="lbl-strong" fill="#f5f1e8">히스톤 아세틸화 → 전사 활성화 (유전자 ON)</text>

    <!-- Before: 감긴 DNA -->
    <g transform="translate(720, 280)">
      <text x="0" y="-44" text-anchor="middle" class="lbl-xs" font-weight="700">Before · 감긴 DNA</text>
      <!-- 히스톤 (보라색 원) -->
      <circle r="26" class="sci"/>
      <text y="3" text-anchor="middle" font-size="10" fill="#f5f1e8" font-weight="600">히스톤</text>
      <!-- 감긴 DNA (이중 나선) -->
      <ellipse rx="40" ry="32" fill="none" class="ink" stroke-width="1.6"/>
      <ellipse rx="44" ry="36" fill="none" class="ink" stroke-width="1.2" opacity="0.6"/>
      <text x="0" y="56" text-anchor="middle" class="lbl-xs">→ DNA 단단히 감김 → 전사 X</text>
    </g>

    <!-- 화살표 + 아세틸기 부착 -->
    <g transform="translate(820, 280)">
      <line x1="0" y1="0" x2="58" y2="0" class="sci-st" stroke-width="2" marker-end="url(#ar4-sci)"/>
      <circle cx="30" cy="-22" r="11" fill="#a8884a"/>
      <text x="30" y="-18" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">Ac</text>
      <line x1="30" y1="-12" x2="30" y2="-4" stroke="#a8884a" stroke-width="1.4"/>
      <text x="30" y="22" text-anchor="middle" class="lbl-xs" fill="#1f5582" font-weight="700">아세틸기 부착</text>
    </g>

    <!-- After: 풀린 DNA -->
    <g transform="translate(990, 280)">
      <text x="0" y="-44" text-anchor="middle" class="lbl-xs" font-weight="700">After · 풀린 DNA</text>
      <!-- 풀린 DNA -->
      <line x1="-58" y1="-12" x2="58" y2="-12" class="ink" stroke-width="1.6"/>
      <line x1="-58" y1="12" x2="58" y2="12" class="ink" stroke-width="1.6"/>
      <g class="ink" stroke-width="1">
        <line x1="-46" y1="-12" x2="-46" y2="12"/>
        <line x1="-22" y1="-12" x2="-22" y2="12"/>
        <line x1="2" y1="-12" x2="2" y2="12"/>
        <line x1="26" y1="-12" x2="26" y2="12"/>
        <line x1="50" y1="-12" x2="50" y2="12"/>
      </g>
      <!-- 작은 히스톤 (옆으로 밀려난) -->
      <circle cx="0" cy="36" r="14" class="sci" opacity="0.4"/>
      <circle cx="0" cy="36" r="14" fill="none" class="sci-st" stroke-width="1"/>
      <text x="0" y="56" text-anchor="middle" class="lbl-xs" fill="#1f5582" font-weight="700">→ DNA 풀려남 → 전사 가능</text>
    </g>

    <text x="900" y="380" class="lbl-sm" fill="#1f5582" font-weight="700">결과: 유전자가 '켜진다'</text>
  </g>

  <!-- ===========================================================
       Step 3 · 후성 유전 오류와 암
       =========================================================== -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="430" width="540" height="220" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <rect x="40" y="430" width="540" height="34" rx="6" class="acc"/>
    <text x="60" y="454" class="lbl-strong" fill="#f5f1e8">후성 유전 오류 → 암 발생</text>

    <!-- 경로 1 -->
    <g transform="translate(60, 484)">
      <rect x="0" y="0" width="500" height="62" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">경로 ① 종양 억제 유전자가 꺼짐</text>
      <text x="14" y="42" class="lbl-sm">메틸화 → 종양 억제 유전자 OFF → 세포 분열 통제 불능</text>
      <text x="14" y="58" class="lbl-xs" fill="#a83a4a">→ 무제한 증식</text>
    </g>

    <!-- 경로 2 -->
    <g transform="translate(60, 558)">
      <rect x="0" y="0" width="500" height="62" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">경로 ② 암 유발 유전자가 과활성화</text>
      <text x="14" y="42" class="lbl-sm">비정상 아세틸화 → 암 유발 유전자 ON ↑↑ → 정상 조절 시스템 무너짐</text>
      <text x="14" y="58" class="lbl-xs" fill="#a83a4a">→ 암 발생</text>
    </g>
  </g>

  <!-- ===========================================================
       Step 4 · 후성 유전적 항암제
       =========================================================== -->
  <g class="reveal" data-reveal-step="4">
    <rect x="620" y="430" width="540" height="220" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <rect x="620" y="430" width="540" height="34" rx="6" class="sci"/>
    <text x="640" y="454" class="lbl-strong" fill="#f5f1e8">후성 유전적 항암제 → 메커니즘 표적</text>

    <!-- 기존 항암제 -->
    <g transform="translate(640, 484)">
      <rect x="0" y="0" width="500" height="50" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="20" class="lbl-strong">기존 항암제</text>
      <text x="14" y="38" class="lbl-sm">빠르게 분열하는 세포 표적 → 정상 세포까지 손상</text>
    </g>

    <!-- 후성 항암제 -->
    <g transform="translate(640, 542)">
      <rect x="0" y="0" width="500" height="78" rx="4" class="paper2 sci-st" stroke-width="1.4"/>
      <text x="14" y="20" class="lbl-strong" fill="#1f5582">후성 유전적 항암제</text>
      <text x="14" y="40" class="lbl-sm">① 종양 억제 유전자의 메틸화 제거 → 다시 켜기</text>
      <text x="14" y="58" class="lbl-sm">② 비정상 아세틸화 효소 억제 → 과활성화 막기</text>
      <text x="14" y="74" class="lbl-xs" fill="#1f5582" font-weight="700">→ 정상 세포 손상 ↓ + 암세포 표적 정확도 ↑</text>
    </g>
  </g>

  <!-- ===========================================================
       Step 5 · 누드슨 이중 적중 모델 확장
       =========================================================== -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="670" width="1120" height="200" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="698" class="lbl-head">누드슨의 이중 적중 모델 — 후성 유전 차원으로 확장</text>

    <!-- 기존 모델 -->
    <g transform="translate(80, 720)">
      <text x="0" y="0" class="lbl-strong">기존 모델</text>
      <text x="0" y="20" class="lbl-sm">두 대립 유전자 모두에 돌연변이가 있어야 암 발생</text>

      <!-- 두 대립 유전자 막대 -->
      <g transform="translate(0, 36)">
        <rect x="0" y="0" width="220" height="28" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="10" y="18" class="lbl-xs" font-weight="700">대립 ①</text>
        <line x1="80" y1="6" x2="100" y2="22" stroke="#a83a4a" stroke-width="2.4"/>
        <line x1="100" y1="6" x2="80" y2="22" stroke="#a83a4a" stroke-width="2.4"/>
        <text x="160" y="18" class="lbl-xs" fill="#a83a4a" font-weight="700">돌연변이 ✗</text>

        <rect x="0" y="34" width="220" height="28" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="10" y="52" class="lbl-xs" font-weight="700">대립 ②</text>
        <line x1="80" y1="40" x2="100" y2="56" stroke="#a83a4a" stroke-width="2.4"/>
        <line x1="100" y1="40" x2="80" y2="56" stroke="#a83a4a" stroke-width="2.4"/>
        <text x="160" y="52" class="lbl-xs" fill="#a83a4a" font-weight="700">돌연변이 ✗</text>

        <text x="240" y="38" class="lbl-strong" fill="#a83a4a">→ 암</text>
      </g>
    </g>

    <!-- 확장 모델 -->
    <g transform="translate(640, 720)">
      <text x="0" y="0" class="lbl-strong" fill="#1f5582">확장된 모델 (후성 유전학 발전)</text>
      <text x="0" y="20" class="lbl-sm">한쪽 돌연변이 + 다른 쪽 후성 유전적 오류 조합도 암 발생</text>

      <g transform="translate(0, 36)">
        <rect x="0" y="0" width="220" height="28" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="10" y="18" class="lbl-xs" font-weight="700">대립 ①</text>
        <line x1="80" y1="6" x2="100" y2="22" stroke="#a83a4a" stroke-width="2.4"/>
        <line x1="100" y1="6" x2="80" y2="22" stroke="#a83a4a" stroke-width="2.4"/>
        <text x="160" y="18" class="lbl-xs" fill="#a83a4a" font-weight="700">돌연변이 ✗</text>

        <rect x="0" y="34" width="220" height="28" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="10" y="52" class="lbl-xs" font-weight="700">대립 ②</text>
        <circle cx="90" cy="48" r="9" class="acc"/>
        <text x="90" y="51" text-anchor="middle" font-size="8" fill="#f5f1e8" font-weight="700">CH₃</text>
        <text x="160" y="52" class="lbl-xs" fill="#1f5582" font-weight="700">메틸화(후성)</text>

        <text x="240" y="38" class="lbl-strong" fill="#1f5582">→ 암</text>
      </g>
    </g>

    <text x="60" y="850" class="lbl-xs" fill="#1f5582" font-weight="700">→ 암 발생에는 유전적 돌연변이뿐 아니라 후성 유전적 오류도 동등한 역할을 할 수 있다는 점이 인정되었다.</text>
  </g>

  <text x="1160" y="930" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 과학·기술 · 172쪽</text>
</svg>
