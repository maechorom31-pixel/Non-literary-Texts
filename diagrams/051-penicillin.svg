<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1080" role="img" aria-labelledby="t051 d051">
  <title id="t051">페니실린의 발견과 작용 원리</title>
  <desc id="d051">(가) 1928년 플레밍이 푸른곰팡이의 항박테리아 효과를 우연히 발견한 세런디피티에서 시작해, 800배 희석에도 효과 유지·인체 무해성 등 특성 연구, 분리·정제 실패의 한계, 1935년 플로리·체인·히틀리의 분리·정제 기술과 동물 실험, 1941년 미국 옥수수 침지액 배양으로 이뤄진 대량 생산까지의 상용화 흐름을 시각화하고, (나) 페니실린의 화학 구조(베타-락탐 4원자 고리 + 곁사슬), 세포벽 펩티도글리칸 합성 효소를 무력화하는 작용 원리, 그리고 외막을 가진 그람 음성균에 대해 효과가 약한 한계를 차례로 보여 준다.</desc>

  <defs>
    <marker id="ar51-sci" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .sci { fill: #1f5582; }
    .sci-st { stroke: #1f5582; }
    .sci-bg { fill: rgba(31,85,130,0.08); }
    .sci-bg2 { fill: rgba(31,85,130,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- (가) 헤더 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="36" rx="6" class="sci"/>
    <text x="60" y="54" class="lbl-strong" fill="#f5f1e8">(가) 발견과 상용화의 역사</text>
  </g>

  <!-- 시간선 -->
  <g class="reveal" data-reveal-step="1">
    <line x1="80" y1="160" x2="1120" y2="160" stroke="#7a6f5f" stroke-width="1.4"/>
  </g>

  <!-- Step 2 · 1928 플레밍 발견 -->
  <g class="reveal" data-reveal-step="2">
    <g transform="translate(180, 160)">
      <circle r="10" class="sci"/>
      <text x="0" y="-22" text-anchor="middle" class="lbl-strong">1928</text>
      <rect x="-100" y="20" width="200" height="80" rx="4" class="sci-bg sci-st" stroke-width="1.4"/>
      <text x="0" y="42" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#1f5582">플레밍의 발견</text>
      <text x="0" y="60" text-anchor="middle" class="lbl-xs">푸른곰팡이가 자란</text>
      <text x="0" y="76" text-anchor="middle" class="lbl-xs">배양 접시에서 포도상</text>
      <text x="0" y="92" text-anchor="middle" class="lbl-xs">구균이 자라지 못함</text>
    </g>
  </g>

  <!-- Step 3 · 특성 연구 -->
  <g class="reveal" data-reveal-step="3">
    <g transform="translate(440, 160)">
      <circle r="8" class="sci"/>
      <text x="0" y="-22" text-anchor="middle" class="lbl-strong">특성 연구</text>
      <rect x="-100" y="20" width="200" height="80" rx="4" class="paper rule" stroke-width="1"/>
      <text x="0" y="42" text-anchor="middle" class="lbl-sm" font-weight="700">800배 희석에도</text>
      <text x="0" y="60" text-anchor="middle" class="lbl-xs">박테리아 죽이는 효과 유지</text>
      <text x="0" y="76" text-anchor="middle" class="lbl-xs" fill="#1f5582">+ 인체 무해 (백혈구·동물)</text>
      <text x="0" y="92" text-anchor="middle" class="lbl-xs" fill="#a83a4a">분리·정제 실패</text>
    </g>
  </g>

  <!-- Step 4 · 1935 플로리 팀 -->
  <g class="reveal" data-reveal-step="4">
    <g transform="translate(700, 160)">
      <circle r="10" class="sci"/>
      <text x="0" y="-22" text-anchor="middle" class="lbl-strong">1935</text>
      <rect x="-100" y="20" width="200" height="80" rx="4" class="sci-bg sci-st" stroke-width="1.4"/>
      <text x="0" y="42" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#1f5582">플로리 연구 팀</text>
      <text x="0" y="60" text-anchor="middle" class="lbl-xs">+ 체인·히틀리 합류</text>
      <text x="0" y="76" text-anchor="middle" class="lbl-xs">분리·정제 기술 개발</text>
      <text x="0" y="92" text-anchor="middle" class="lbl-xs" fill="#1f5582">동물 실험으로 약효 입증</text>
    </g>
  </g>

  <!-- Step 5 · 1941 상용화 -->
  <g class="reveal" data-reveal-step="5">
    <g transform="translate(960, 160)">
      <circle r="12" class="sci"/>
      <text x="0" y="-22" text-anchor="middle" class="lbl-strong" fill="#1f5582">1941</text>
      <rect x="-110" y="20" width="220" height="80" rx="4" class="sci"/>
      <text x="0" y="42" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#f5f1e8">미국 대량 생산</text>
      <text x="0" y="60" text-anchor="middle" class="lbl-xs" fill="#f5f1e8">옥수수 침지액 배양</text>
      <text x="0" y="76" text-anchor="middle" class="lbl-xs" fill="#f5f1e8">→ 생산량 폭증</text>
      <text x="0" y="92" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" opacity="0.85">기적의 의약품 등장</text>
    </g>
  </g>

  <!-- (가) 세런디피티 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="290" width="1120" height="60" rx="6" class="sci-bg2 sci-st" stroke-width="1.5"/>
    <text x="60" y="318" class="lbl-strong" fill="#1f5582">세런디피티 (Serendipity)</text>
    <text x="240" y="318" class="lbl-sm">의도하지 않은 우연의 발견이 큰 의미를 지니게 된 경우</text>
    <text x="60" y="338" class="lbl-xs">→ 페니실린의 발견은 그 대표적 사례</text>
  </g>

  <!-- (나) 헤더 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="370" width="1120" height="36" rx="6" class="acc"/>
    <text x="60" y="394" class="lbl-strong" fill="#f5f1e8">(나) 화학 구조와 작용 원리</text>
  </g>

  <!-- Step 6 · 화학 구조 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="420" width="540" height="240" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="448" class="lbl-strong">페니실린의 화학 구조</text>

    <!-- 베타-락탐 + 곁사슬 -->
    <g transform="translate(220, 540)">
      <!-- 베타-락탐 4원자 고리 (사각형) -->
      <rect x="-40" y="-40" width="80" height="80" fill="none" class="acc-st" stroke-width="2.4"/>
      <circle cx="-40" cy="-40" r="10" class="acc"/>
      <text x="-40" y="-37" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">N</text>
      <circle cx="40" cy="-40" r="10" class="paper" stroke="#1a1612" stroke-width="1.4"/>
      <text x="40" y="-37" text-anchor="middle" font-size="9" font-weight="700">C</text>
      <circle cx="40" cy="40" r="10" class="paper" stroke="#1a1612" stroke-width="1.4"/>
      <text x="40" y="43" text-anchor="middle" font-size="9" font-weight="700">C</text>
      <circle cx="-40" cy="40" r="10" class="paper" stroke="#1a1612" stroke-width="1.4"/>
      <text x="-40" y="43" text-anchor="middle" font-size="9" font-weight="700">C</text>

      <text x="0" y="-60" text-anchor="middle" class="lbl-sm" fill="#a83a4a" font-weight="700">베타-락탐 (4원자 고리)</text>
      <text x="0" y="74" text-anchor="middle" class="lbl-xs">탄소 3 + 질소 1</text>
      <text x="0" y="90" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">항균 효과의 핵심</text>
    </g>

    <!-- 곁사슬 -->
    <g transform="translate(440, 540)">
      <line x1="-50" y1="0" x2="-20" y2="0" class="ink" stroke-width="1.6"/>
      <text x="-35" y="-6" text-anchor="middle" class="lbl-xs">결합</text>
      <rect x="-20" y="-20" width="100" height="40" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="30" y="6" text-anchor="middle" class="lbl-sm" font-weight="700">R-C=O</text>
      <text x="30" y="34" text-anchor="middle" class="lbl-xs">곁사슬</text>
    </g>
  </g>

  <!-- Step 7 · 작용 원리 -->
  <g class="reveal" data-reveal-step="7">
    <rect x="620" y="420" width="540" height="240" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="640" y="448" class="lbl-strong" fill="#a83a4a">박테리아 세포벽 합성 억제</text>
    <text x="640" y="468" class="lbl-sm">동물 세포 vs 박테리아 세포의 차이를 식별</text>

    <g transform="translate(640, 488)">
      <rect x="0" y="0" width="240" height="100" rx="4" class="paper rule" stroke-width="1"/>
      <text x="120" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">동물 세포</text>
      <text x="120" y="42" text-anchor="middle" class="lbl-xs">세포벽 X</text>
      <text x="120" y="62" text-anchor="middle" class="lbl-xs" fill="#1f5582" font-weight="700">→ 페니실린 작용 X</text>
      <text x="120" y="82" text-anchor="middle" class="lbl-xs">인체 무해</text>

      <rect x="260" y="0" width="240" height="100" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="380" y="22" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#a83a4a">박테리아</text>
      <text x="380" y="42" text-anchor="middle" class="lbl-xs">펩티도글리칸 세포벽</text>
      <text x="380" y="62" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 베타-락탐이 합성 효소 무력화</text>
      <text x="380" y="82" text-anchor="middle" class="lbl-xs">세포벽 합성 억제 → 사멸</text>
    </g>

    <text x="640" y="640" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 박테리아만 죽이고 인체는 보호하는 항생제 작용 원리</text>
  </g>

  <!-- Step 8 · 그람 음성균의 한계 -->
  <g class="reveal" data-reveal-step="8">
    <rect x="40" y="680" width="1120" height="280" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="708" class="lbl-head">한계 — 그람 음성균에는 효과가 약함</text>
    <text x="60" y="730" class="lbl-sm">그람 염색법에 따른 박테리아 분류 (펩티도글리칸층의 두께)</text>

    <!-- 그람 양성 -->
    <g transform="translate(80, 760)">
      <rect x="0" y="0" width="500" height="180" rx="6" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">그람 양성균 (보라색)</text>

      <!-- 세포벽 단면 -->
      <g transform="translate(60, 70)">
        <rect x="0" y="-10" width="200" height="60" fill="#a83a4a" opacity="0.8"/>
        <text x="100" y="22" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">두꺼운 펩티도글리칸층</text>
        <line x1="0" y1="50" x2="200" y2="50" class="ink" stroke-width="1.4"/>
        <text x="100" y="68" text-anchor="middle" class="lbl-xs">세포막</text>
      </g>

      <text x="14" y="170" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 페니실린 효과적 (세포벽에 직접 작용)</text>
    </g>

    <!-- 그람 음성 -->
    <g transform="translate(620, 760)">
      <rect x="0" y="0" width="500" height="180" rx="6" class="paper2 ink" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong">그람 음성균 (분홍색)</text>

      <!-- 세포벽 단면 (외막 추가) -->
      <g transform="translate(60, 50)">
        <rect x="0" y="-10" width="200" height="20" fill="#7a6f5f" opacity="0.7"/>
        <text x="100" y="4" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">외막</text>
        <rect x="0" y="14" width="200" height="20" fill="#a83a4a" opacity="0.6"/>
        <text x="100" y="28" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">얇은 펩티도글리칸</text>
        <line x1="0" y1="38" x2="200" y2="38" class="ink" stroke-width="1.4"/>
        <text x="100" y="56" text-anchor="middle" class="lbl-xs">세포막</text>
      </g>

      <text x="14" y="160" class="lbl-xs" fill="#7a6f5f" font-weight="700">외막 + 얇은 펩티도글리칸</text>
      <text x="14" y="174" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 페니실린이 외막을 통과하지 못함 → 효과 약함</text>
    </g>
  </g>

  <text x="1160" y="1070" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 주제 통합 · 273쪽</text>
</svg>
