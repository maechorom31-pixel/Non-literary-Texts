<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t049 d049">
  <title id="t049">시민 불복종과 소크라테스</title>
  <desc id="d049">(가) 헨리 소로가 1849년에 제시한 시민 불복종 개념과 그 특징(처벌 수용·비폭력으로 일반 범죄와 구별, 헌법·도덕 등 상위 규범 부합), 간디·킹·3·1운동·민주화 운동 같은 사례, 그리고 민주 정부에서 시민 불복종이 정당화되느냐를 둘러싼 찬반 논쟁(반대=묵시적 합의·합법적 수단 / 찬성=다수결로 보호되지 않는 소수의 권리), (나) 『크리톤』에서 소크라테스가 탈옥을 거부한 논변(법률의 의인화, 부모-자식 비유, 70년 묵시적 합의)을 좌우 대비로 시각화한다.</desc>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .quote { font-family: 'Noto Serif KR', serif; font-size: 12px; font-style: italic; fill: #5e548e; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .hum { fill: #5e548e; }
    .hum-st { stroke: #5e548e; }
    .hum-bg { fill: rgba(94,84,142,0.08); }
    .hum-bg2 { fill: rgba(94,84,142,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- (가) 헤더 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="36" rx="6" class="hum"/>
    <text x="60" y="54" class="lbl-strong" fill="#f5f1e8">(가) 현대의 시민 불복종 — 정당화 논쟁</text>
  </g>

  <!-- Step 1 · 시민 불복종 개념 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="80" width="1120" height="100" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="108" class="lbl-head">시민 불복종이란?</text>
    <text x="60" y="134" class="lbl-sm">부당하다고 생각하는 법을 바꾸기 위해 의도적으로 법을 어기는 행동</text>
    <text x="60" y="156" class="lbl-xs">헨리 소로 (1849, 미국-멕시코 전쟁 반대 → 인두세 거부 → 감옥)</text>
  </g>

  <!-- Step 2 · 내용과 구별 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="200" width="540" height="160" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="228" class="lbl-strong" fill="#5e548e">시민 불복종의 특징</text>

    <g transform="translate(60, 250)">
      <rect x="0" y="0" width="500" height="40" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="20" class="lbl-sm" font-weight="700">상위 규범에 부합</text>
      <text x="14" y="36" class="lbl-xs">헌법·도덕 같은 상위 규범 보호 목적</text>

      <rect x="0" y="50" width="500" height="40" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="70" class="lbl-sm" font-weight="700">처벌 수용 + 비폭력</text>
      <text x="14" y="86" class="lbl-xs">시행 중 법을 어긴 처벌을 불사함</text>
    </g>

    <text x="60" y="346" class="lbl-xs" fill="#5e548e" font-weight="700">→ 일반 범죄와 구별되는 도덕적 행위</text>
  </g>

  <!-- Step 3 · 사례 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="620" y="200" width="540" height="160" rx="6" class="hum-bg2 hum-st" stroke-width="1.5"/>
    <text x="640" y="228" class="lbl-strong" fill="#5e548e">사례</text>

    <g transform="translate(640, 250)">
      <rect x="0" y="0" width="240" height="40" rx="3" class="paper rule" stroke-width="1"/>
      <text x="120" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">간디</text>
      <text x="120" y="36" text-anchor="middle" class="lbl-xs">인도 비폭력 불복종</text>

      <rect x="260" y="0" width="240" height="40" rx="3" class="paper rule" stroke-width="1"/>
      <text x="380" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">마틴 루서 킹</text>
      <text x="380" y="36" text-anchor="middle" class="lbl-xs">흑인 민권 운동</text>

      <rect x="0" y="50" width="240" height="40" rx="3" class="paper rule" stroke-width="1"/>
      <text x="120" y="72" text-anchor="middle" class="lbl-sm" font-weight="700">3·1 운동</text>
      <text x="120" y="86" text-anchor="middle" class="lbl-xs">일제 강점기 항일</text>

      <rect x="260" y="50" width="240" height="40" rx="3" class="paper rule" stroke-width="1"/>
      <text x="380" y="72" text-anchor="middle" class="lbl-sm" font-weight="700">민주화 운동</text>
      <text x="380" y="86" text-anchor="middle" class="lbl-xs">독재 정권 시대</text>
    </g>

    <text x="640" y="346" class="lbl-xs" fill="#5e548e">자기 방어적 폭력은 일정 조건에서 정당화될 수 있다는 입장도 존재</text>
  </g>

  <!-- Step 4-5 · 민주 정부 찬반 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="380" width="540" height="180" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="408" class="lbl-strong" fill="#a83a4a">민주 정부 — 반대론</text>

    <g transform="translate(60, 430)">
      <rect x="0" y="0" width="500" height="120" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">근거</text>
      <text x="14" y="42" class="lbl-sm">민주 정부에는 합법적 수단이 있음</text>
      <text x="14" y="60" class="lbl-xs" fill="#7a6f5f">선거 / 청원 / 언론</text>
      <text x="14" y="86" class="lbl-sm" font-weight="700" fill="#a83a4a">묵시적 합의</text>
      <text x="14" y="106" class="lbl-xs">법을 지킨다는 묵시적 합의가 있는 것이며,</text>
    </g>

    <text x="60" y="572" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 시민 불복종은 정당화되지 않는다</text>
  </g>

  <g class="reveal" data-reveal-step="5">
    <rect x="620" y="380" width="540" height="180" rx="6" class="hum-bg2 hum-st" stroke-width="1.5"/>
    <text x="640" y="408" class="lbl-strong" fill="#5e548e">민주 정부 — 찬성론</text>

    <g transform="translate(640, 430)">
      <rect x="0" y="0" width="500" height="120" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">근거</text>
      <text x="14" y="42" class="lbl-sm">선거로는 모든 의견 반영 어려움</text>
      <text x="14" y="60" class="lbl-xs" fill="#7a6f5f">소수의 의견이 무시됨</text>
      <text x="14" y="86" class="lbl-sm" font-weight="700" fill="#5e548e">소수 권리 보호</text>
      <text x="14" y="106" class="lbl-xs">다수결로 보호되지 않는 소수의 권리</text>
    </g>

    <text x="640" y="572" class="lbl-xs" fill="#5e548e" font-weight="700">→ 민주주의에서도 시민 불복종이 필요하다</text>
  </g>

  <!-- (나) 헤더 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="580" width="1120" height="36" rx="6" class="acc"/>
    <text x="60" y="604" class="lbl-strong" fill="#f5f1e8">(나) 소크라테스 — 『크리톤』의 법률 옹호 논변</text>
  </g>

  <!-- Step 6 · 첫 거부 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="630" width="1120" height="100" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="658" class="lbl-head" fill="#a83a4a">소크라테스의 거부 — 친구 크리톤의 탈옥 권유</text>
    <text x="60" y="684" class="quote">"우리는 우리가 합의한 정의로운 것들을 준수하는 것인가, 아닌가?"</text>
    <text x="60" y="708" class="lbl-xs" fill="#a83a4a">→ 합의를 어기고 해롭게 해서는 안 될 이들(나라)을 해롭게 해서는 안 된다</text>
  </g>

  <!-- Step 7-9 · 세 논거 -->
  <g class="reveal" data-reveal-step="7">
    <rect x="40" y="750" width="370" height="240" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="778" class="lbl-strong" fill="#a83a4a">① 법률의 의인화</text>

    <g transform="translate(60, 800)">
      <rect x="0" y="0" width="330" height="170" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">법률이 묻는다</text>
      <text x="14" y="44" class="lbl-xs">"당신은 우리(법률)와 나라 전체를</text>
      <text x="14" y="60" class="lbl-xs">파멸시킬 작정이 아닌가?"</text>
      <text x="14" y="84" class="lbl-xs">"법정 판결이 무력해지면</text>
      <text x="14" y="100" class="lbl-xs">나라가 존립할 수 있겠는가?"</text>
      <text x="14" y="138" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 한 개인이 판결 무시 →</text>
      <text x="14" y="154" class="lbl-xs" fill="#a83a4a" font-weight="700">  나라의 파멸로 이어짐</text>
    </g>
  </g>

  <g class="reveal" data-reveal-step="8">
    <rect x="430" y="750" width="370" height="240" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="450" y="778" class="lbl-strong" fill="#a83a4a">② 부모-자식 비유</text>

    <g transform="translate(450, 800)">
      <rect x="0" y="0" width="330" height="170" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">법률이 말한다</text>
      <text x="14" y="44" class="lbl-xs">"당신은 우리에 의해 태어나고</text>
      <text x="14" y="60" class="lbl-xs">양육받고 교육받았다"</text>
      <text x="14" y="84" class="lbl-xs">"당신은 우리의 자손이며</text>
      <text x="14" y="100" class="lbl-xs">노예이다"</text>
      <text x="14" y="138" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 시민과 법률은 대등 X</text>
      <text x="14" y="154" class="lbl-xs" fill="#a83a4a" font-weight="700">  되갚을 수 없는 관계</text>
    </g>
  </g>

  <g class="reveal" data-reveal-step="9">
    <rect x="820" y="750" width="340" height="240" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="840" y="778" class="lbl-strong" fill="#a83a4a">③ 묵시적 합의</text>

    <g transform="translate(840, 800)">
      <rect x="0" y="0" width="320" height="170" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">법률이 말한다</text>
      <text x="14" y="44" class="lbl-xs">"당신은 70년을 숙고한 끝에</text>
      <text x="14" y="60" class="lbl-xs">우리와 합의한 것이다"</text>
      <text x="14" y="84" class="lbl-xs">"마음에 들지 않았다면</text>
      <text x="14" y="100" class="lbl-xs">얼마든지 떠날 수 있었다"</text>
      <text x="14" y="138" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 떠나지 않음 = 머물며</text>
      <text x="14" y="154" class="lbl-xs" fill="#a83a4a" font-weight="700">  법률에 따르겠다는 묵시적 합의</text>
    </g>
  </g>

  <!-- 종합 비교 -->
  <g class="reveal" data-reveal-step="9">
    <rect x="40" y="1010" width="1120" height="60" rx="6" class="paper2 ink" stroke-width="1"/>
    <text x="60" y="1038" class="lbl-strong">한 줄 핵심</text>
    <text x="60" y="1058" class="lbl-sm">현대 옹호: <tspan font-weight="700" fill="#5e548e">소수의 권리를 위한 시민 불복종 필요</tspan> ↔ 소크라테스: <tspan font-weight="700" fill="#a83a4a">법률에 대한 묵시적 합의 → 복종 의무</tspan></text>
  </g>

  <text x="1160" y="1070" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 주제 통합 · 263쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#5e548e"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">시민 불복종</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">부당하다고 생각하는 법을 바꾸기 위해 의도적으로 법을 어기는 행동. 비폭력·처벌 수용으로 일반 범죄와 구별된다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">민주 정부 반대론</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">선거·청원·언론 등 합법적 수단이 있으므로 법을 지킨다는 묵시적 합의를 어겨서는 안 된다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">민주 정부 찬성론</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">다수결이 보호하지 못하는 소수의 권리를 위한 시민 불복종은 민주주의에서도 필요하다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">소크라테스의 법률 옹호</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">탈옥은 합의한 정의를 어기고 나라를 파멸시키는 일이며, 시민은 법률에 의해 태어나고 양육된 자손으로서 묵시적 합의를 했다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">묵시적 합의 개념</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">시민이 법률 아래 머물러 살아온 사실 자체로 법률에 따르겠다는 합의를 한 것으로 보는 관념.</text>
  </g>
</svg>
