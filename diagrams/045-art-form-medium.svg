<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1340" role="img" aria-labelledby="t45 d45">
  <title id="t45">예술 형식과 매체 — 레싱의 매체 구분과 페히의 유동성</title>
  <desc id="d45">(가) 레싱의 시·회화 매체-효과 구분과 문자 예술의 우월성, (나) 상호 매체성 개념의 두 관점(통합 vs 분리)과 페히의 유동적 매체관을 인물 도식·시간/공간 비교·매체 변환 도식으로 시각화.</desc>
  <defs>
    <style>
      .bg{fill:#f8f6fb}
      .panel{fill:#ffffff;stroke:#d6cfe8;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a2434}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#5b5170}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a2434}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a2434}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e548e}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#4f4664}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#5b5170}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .axis{font:600 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e548e}
      .quote{font:600 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e548e;font-style:italic}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#9b91b1;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar45" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e548e"/>
    </marker>
    <symbol id="canvas" viewBox="0 0 60 48">
      <rect x="2" y="2" width="56" height="40" fill="#f1ecf8" stroke="#5e548e" stroke-width="1.2"/>
      <circle cx="20" cy="22" r="6" fill="#a83a4a" opacity="0.6"/>
      <path d="M30 30 L40 18 L48 30 Z" fill="#5e548e" opacity="0.5"/>
      <line x1="2" y1="42" x2="58" y2="42" stroke="#5e548e" stroke-width="0.8"/>
      <line x1="14" y1="42" x2="14" y2="48" stroke="#5e548e" stroke-width="0.8"/>
      <line x1="46" y1="42" x2="46" y2="48" stroke="#5e548e" stroke-width="0.8"/>
    </symbol>
    <symbol id="scroll" viewBox="0 0 48 56">
      <rect x="6" y="4" width="36" height="48" fill="#fff" stroke="#5e548e" stroke-width="1.2"/>
      <line x1="12" y1="14" x2="36" y2="14" stroke="#5e548e" stroke-width="0.8"/>
      <line x1="12" y1="22" x2="36" y2="22" stroke="#5e548e" stroke-width="0.8"/>
      <line x1="12" y1="30" x2="36" y2="30" stroke="#5e548e" stroke-width="0.8"/>
      <line x1="12" y1="38" x2="32" y2="38" stroke="#5e548e" stroke-width="0.8"/>
    </symbol>
    <symbol id="cam" viewBox="0 0 32 24">
      <rect x="2" y="6" width="28" height="16" rx="2" fill="#fff" stroke="#5e548e" stroke-width="1.2"/>
      <rect x="9" y="2" width="10" height="6" rx="1" fill="#fff" stroke="#5e548e" stroke-width="1.2"/>
      <circle cx="16" cy="14" r="5" fill="#5e548e" opacity="0.4"/>
      <circle cx="16" cy="14" r="2.4" fill="#2a2434"/>
    </symbol>
    <symbol id="film" viewBox="0 0 40 24">
      <rect x="2" y="2" width="36" height="20" rx="1.4" fill="#2a2434"/>
      <circle cx="8" cy="6" r="1.4" fill="#fff"/>
      <circle cx="14" cy="6" r="1.4" fill="#fff"/>
      <circle cx="20" cy="6" r="1.4" fill="#fff"/>
      <circle cx="26" cy="6" r="1.4" fill="#fff"/>
      <circle cx="32" cy="6" r="1.4" fill="#fff"/>
      <circle cx="8" cy="18" r="1.4" fill="#fff"/>
      <circle cx="14" cy="18" r="1.4" fill="#fff"/>
      <circle cx="20" cy="18" r="1.4" fill="#fff"/>
      <circle cx="26" cy="18" r="1.4" fill="#fff"/>
      <circle cx="32" cy="18" r="1.4" fill="#fff"/>
      <rect x="6" y="9" width="28" height="6" fill="#fff"/>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1340"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#5e548e"/>
  <text x="64" y="80" class="ti" fill="#ffffff">예술 형식과 매체 — 레싱의 매체 구분과 페히의 유동성</text>
  <text x="1136" y="80" class="sub" fill="#ddd5ec" text-anchor="end">주제 통합 · 비교</text>

  <!-- (가) 헤더 -->
  <rect x="40" y="124" width="1120" height="34" rx="6" fill="#ede8f6"/>
  <text x="60" y="148" class="lab" fill="#5e548e">(가) 레싱 — 시·회화 매체 구분</text>

  <!-- Scene 1: 시·회화 관계 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="194" class="num">1</text>
    <text x="92" y="194" class="bd">출발점 — 호라티우스의 ‘시는 회화처럼’</text>

    <rect class="panel" x="64" y="212" width="1072" height="100" rx="10"/>
    <rect x="64" y="212" width="6" height="100" fill="#5e548e"/>

    <g transform="translate(96,232)">
      <use href="#scroll" x="0" y="0" width="40" height="46"/>
      <text x="48" y="14" class="quote">“시는 회화처럼 (Ut pictura poesis)”</text>
      <text x="48" y="34" class="small">호라티우스 — 미메시스(모방)의 공통점</text>
      <text x="48" y="56" class="it" fill="#5e548e">→ 회화를 모범으로 시를 평가하던 18C 후반까지의 지배적 관점</text>
      <use href="#canvas" x="900" y="0" width="60" height="48"/>
    </g>
  </g>

  <!-- Scene 2: 레싱의 비판 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="354" class="num">2</text>
    <text x="92" y="354" class="bd">레싱의 비판 — 시와 회화의 본질적 차이 무시</text>

    <rect class="panel" x="64" y="372" width="1072" height="80" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>

    <g transform="translate(84,394)">
      <use href="#scroll" x="0" y="0" width="32" height="36"/>
      <text x="40" y="12" class="lab" fill="#a83a4a">≠</text>
      <use href="#canvas" x="56" y="0" width="40" height="32"/>

      <text x="116" y="14" class="lab" fill="#a83a4a">고전 관점의 한계</text>
      <text x="116" y="34" class="small">회화의 원칙을 시에 그대로 적용 → 본질적 차이 무시</text>
    </g>
  </g>

  <!-- Scene 3: 매체와 효과 — 시간 vs 공간 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="494" class="num">3</text>
    <text x="92" y="494" class="bd">레싱의 대안 — 매체(공간/시간)와 효과의 차이</text>

    <g>
      <!-- 좌: 회화 (공간) -->
      <rect class="panel" x="64" y="512" width="528" height="166" rx="10"/>
      <rect x="64" y="512" width="528" height="34" rx="10" fill="#5e548e"/>
      <text x="84" y="536" class="pill">이미지 예술 (회화)</text>

      <use href="#canvas" x="84" y="558" width="80" height="64"/>

      <text x="180" y="582" class="lab" fill="#5e548e">매체 = 공간적 (Space)</text>
      <text x="180" y="606" class="small">동시적 묘사 — 모든 요소를 한 화면에</text>

      <!-- 공간 좌표 도식 -->
      <line x1="180" y1="624" x2="540" y2="624" stroke="#5e548e" stroke-width="1.2"/>
      <line x1="200" y1="612" x2="200" y2="660" stroke="#5e548e" stroke-width="1.2"/>
      <text x="540" y="638" class="axis" text-anchor="end">x (공간)</text>
      <circle cx="240" cy="640" r="3" fill="#a83a4a"/>
      <circle cx="320" cy="650" r="3" fill="#a83a4a"/>
      <circle cx="400" cy="640" r="3" fill="#a83a4a"/>
      <circle cx="460" cy="650" r="3" fill="#a83a4a"/>
      <text x="180" y="672" class="it" fill="#a83a4a">단점 — 시간 흐름 표현 어려움</text>

      <!-- 우: 시 (시간) -->
      <rect class="panel" x="608" y="512" width="528" height="166" rx="10"/>
      <rect x="608" y="512" width="528" height="34" rx="10" fill="#5e548e"/>
      <text x="628" y="536" class="pill">문자 예술 (시)</text>

      <use href="#scroll" x="628" y="558" width="48" height="64"/>

      <text x="700" y="582" class="lab" fill="#5e548e">매체 = 시간적 (Time)</text>
      <text x="700" y="606" class="small">연속적 묘사 — 사건/내면의 흐름</text>

      <!-- 시간 화살표 -->
      <line x1="700" y1="624" x2="1080" y2="624" stroke="#5e548e" stroke-width="1.2"/>
      <polygon points="1080,618 1092,624 1080,630" fill="#5e548e"/>
      <text x="1080" y="638" class="axis" text-anchor="end">t (시간)</text>
      <circle cx="730" cy="624" r="3" fill="#5e548e"/>
      <circle cx="810" cy="624" r="3" fill="#5e548e"/>
      <circle cx="900" cy="624" r="3" fill="#5e548e"/>
      <circle cx="990" cy="624" r="3" fill="#5e548e"/>
      <text x="700" y="672" class="it" fill="#a83a4a">단점 — 동시적 전체 어려움</text>
    </g>
  </g>

  <!-- Scene 4: 문자 예술 우월성 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="720" class="num">4</text>
    <text x="92" y="720" class="bd">레싱의 결론 — 문자 예술의 ‘상상 공간’ 우월성</text>

    <rect class="panel" x="64" y="738" width="1072" height="86" rx="10" stroke="#5e548e" stroke-width="1.6" fill="#f1ecf8"/>

    <g transform="translate(84,758)">
      <use href="#scroll" x="0" y="0" width="36" height="42"/>
      <line x1="42" y1="22" x2="80" y2="22" stroke="#5e548e" stroke-width="2.4" marker-end="url(#ar45)"/>
      <text x="98" y="14" class="lab" fill="#5e548e">독자의 ‘감각적 환상’ 자극</text>
      <text x="98" y="36" class="small">시간 흐름 + 내면 변화의 연속적 묘사 = 회화보다 더 넓은 ‘상상 공간’ 확장</text>
      <text x="98" y="56" class="it" fill="#5e548e">→ 문자 예술의 상대적 우월성</text>
    </g>
  </g>

  <!-- (나) 헤더 -->
  <rect x="40" y="850" width="1120" height="34" rx="6" fill="#ede8f6"/>
  <text x="60" y="874" class="lab" fill="#5e548e">(나) 상호 매체성과 페히의 유동성</text>

  <!-- Scene 5: 상호 매체성 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="918" class="num">5</text>
    <text x="92" y="918" class="bd">상호 매체성 — 매체 환경 변화</text>

    <rect class="panel" x="64" y="936" width="1072" height="84" rx="10"/>
    <rect x="64" y="936" width="6" height="84" fill="#5e548e"/>

    <g transform="translate(96,956)">
      <rect width="80" height="34" rx="6" fill="#ede8f6"/>
      <text x="40" y="22" class="small" text-anchor="middle">문학</text>
      <rect x="92" width="80" height="34" rx="6" fill="#ede8f6"/>
      <text x="132" y="22" class="small" text-anchor="middle">회화</text>
      <rect x="184" width="80" height="34" rx="6" fill="#ede8f6"/>
      <text x="224" y="22" class="small" text-anchor="middle">음악</text>
      <rect x="276" width="80" height="34" rx="6" fill="#ede8f6"/>
      <text x="316" y="22" class="small" text-anchor="middle">사진</text>
      <rect x="368" width="80" height="34" rx="6" fill="#ede8f6"/>
      <text x="408" y="22" class="small" text-anchor="middle">영화</text>

      <text x="476" y="14" class="small">→ 경계가 무너지고</text>
      <text x="476" y="32" class="small">매체들이 경쟁·혼합</text>

      <text x="660" y="22" class="it" fill="#5e548e">상호 매체성 = 매체 간 상호 작용 (두 관점 존재)</text>
    </g>
  </g>

  <!-- Scene 6: 통합 관점 -->
  <g class="reveal" data-reveal-step="6">
    <text x="64" y="1062" class="num">6</text>
    <text x="92" y="1062" class="bd">통합 관점 (1960s) — 매체 = 예술 형식 (동일시)</text>

    <rect class="panel" x="64" y="1080" width="1072" height="116" rx="10"/>

    <g transform="translate(84,1100)">
      <!-- 여러 매체 → 하나로 통합 -->
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#ede8f6"/>
      <text x="40" y="20" class="small" text-anchor="middle">매체 A</text>
      <rect x="0" y="40" width="80" height="32" rx="6" fill="#ede8f6"/>
      <text x="40" y="60" class="small" text-anchor="middle">매체 B</text>
      <rect x="0" y="80" width="80" height="0" rx="6" fill="#ede8f6"/>

      <line x1="84" y1="14" x2="180" y2="40" stroke="#5e548e" stroke-width="2" marker-end="url(#ar45)"/>
      <line x1="84" y1="56" x2="180" y2="44" stroke="#5e548e" stroke-width="2" marker-end="url(#ar45)"/>

      <rect x="190" y="20" width="200" height="40" rx="8" fill="#5e548e"/>
      <text x="290" y="44" class="pill" text-anchor="middle">하나의 매체로 ‘통합’</text>

      <text x="430" y="20" class="small">매체와 예술 형식을 동일시</text>
      <text x="430" y="40" class="small">→ 여러 매체가 하나로 통합되는 과정</text>
      <text x="430" y="62" class="it" fill="#a83a4a">한계 — 통합된 작품 내부의 매체 간 상호 작용 분석 어려움</text>
    </g>
  </g>

  <!-- Scene 7: 페히의 유동성 -->
  <g class="reveal" data-reveal-step="7">
    <text x="64" y="1232" class="num">7</text>
    <text x="92" y="1232" class="bd">페히 — 예술 형식과 매체의 유동적 관계</text>

    <rect class="panel" x="64" y="1250" width="1072" height="60" rx="10" stroke="#5e548e" stroke-width="1.6" fill="#f1ecf8"/>

    <g transform="translate(84,1262)">
      <use href="#cam" x="0" y="6" width="40" height="30"/>
      <text x="20" y="46" class="small" text-anchor="middle">사진 (예술 형식)</text>

      <line x1="48" y1="20" x2="100" y2="20" stroke="#5e548e" stroke-width="2.4" marker-end="url(#ar45)"/>
      <text x="74" y="14" class="axis" text-anchor="middle">매체로 기능</text>

      <use href="#film" x="108" y="8" width="46" height="28"/>
      <text x="131" y="46" class="small" text-anchor="middle">영화 (예술 형식)</text>

      <text x="200" y="20" class="lab" fill="#5e548e">예술 형식 ≠ 매체 (구별 ✓), 단 위치는 고정 ✗</text>
      <text x="200" y="42" class="it" fill="#5e548e">→ 한 형식이 다른 예술의 매체로 기능 가능 (상호 분석 가능)</text>
    </g>
  </g>

  <text x="1140" y="1324" class="wm" text-anchor="end">EBS 2027 · 주제 통합 · 245쪽</text>
</svg>
