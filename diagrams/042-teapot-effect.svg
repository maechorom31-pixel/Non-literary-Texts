<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1210" role="img" aria-labelledby="t042 d042">
  <title id="t042">찻주전자 효과와 젖음성</title>
  <desc id="d042">차나 물을 따를 때 액체가 주둥이 바깥 면을 타고 흐르는 찻주전자 효과(드리블링)에서 출발해, 뒤에즈 연구 팀이 밝힌 원인(젖음성, 점성과 무관)과 두 가지 해결 방법(액체 속력 유지·곡률 반경 감소), 토머스 영의 접촉각으로 정량화한 젖음성, 고체-액체 간 표면 에너지가 접촉각에 미치는 영향, 그리고 물의 접촉각에 따른 친수성·소수성·초소수성 분류까지 인과 흐름으로 시각화한다.</desc>

  <defs>
    <marker id="ar42-sci" viewBox="0 0 1200 1210" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .sci { fill: #1f5582; }
    .sci-st { stroke: #1f5582; }
    .sci-bg { fill: rgba(31,85,130,0.08); }
    .sci-bg2 { fill: rgba(31,85,130,0.18); }
    .water { fill: rgba(31,85,130,0.55); }
  ]]></style>

  <!-- Step 1 · 찻주전자 효과 정의 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="240" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">찻주전자 효과 (드리블링) — 일상의 미스터리</text>
    <text x="60" y="86" class="lbl-sm">왈칵 따를 때는 잘 쏟아지지만, 쏟는 속력이 줄면 액체가 용기 바깥 면을 타고 흘러내림</text>

    <!-- 찻주전자 일러스트 -->
    <g transform="translate(180, 200)">
      <!-- 주전자 본체 -->
      <ellipse cx="0" cy="20" rx="80" ry="40" class="paper2" stroke="#1a1612" stroke-width="1.4"/>
      <!-- 주둥이 -->
      <path d="M 70 0 Q 110 -10 130 -20" fill="none" stroke="#1a1612" stroke-width="2"/>
      <path d="M 70 20 Q 110 14 130 -20" fill="#ebe5d4" stroke="#1a1612" stroke-width="1.4"/>
      <!-- 손잡이 -->
      <path d="M -80 10 Q -100 -10 -90 30" fill="none" stroke="#1a1612" stroke-width="2"/>
      <!-- 액체가 주둥이를 타고 흐름 -->
      <path d="M 130 -10 Q 122 0 116 14 Q 110 28 100 40" fill="none" class="sci-st" stroke-width="2.4"/>
      <text x="100" y="60" class="lbl-xs" fill="#1f5582" font-weight="700">↓ 바깥 면을 타고 흐름</text>
    </g>

    <text x="400" y="180" class="lbl-strong">정상 (왈칵 따를 때)</text>
    <text x="400" y="202" class="lbl-sm">액체가 주둥이 끝에서 떨어져 컵으로</text>
    <text x="400" y="240" class="lbl-strong" fill="#1f5582">찻주전자 효과 (속력 ↓)</text>
    <text x="400" y="262" class="lbl-sm" fill="#1f5582">액체가 주둥이 표면을 타고 흘러내림</text>
  </g>

  <!-- Step 2 · 뒤에즈 연구: 원인 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="290" width="1120" height="160" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <text x="60" y="318" class="lbl-head" fill="#1f5582">2010 뒤에즈 연구 팀 — 원인 규명</text>

    <g transform="translate(60, 340)">
      <rect x="0" y="0" width="500" height="90" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">핵심 발견</text>
      <text x="14" y="44" class="lbl-sm">원인 = 주둥이의 <tspan font-weight="700" fill="#1f5582">젖음성</tspan></text>
      <text x="14" y="62" class="lbl-sm" fill="#a83a4a">점성과는 무관 (예상과 달리)</text>
      <text x="14" y="84" class="lbl-xs">젖음성이 높을수록 액체가 표면을 타고 흐르기 쉬움</text>
    </g>

    <g transform="translate(620, 340)">
      <rect x="0" y="0" width="500" height="90" rx="4" class="sci-bg2 sci-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#1f5582">젖음성이란?</text>
      <text x="14" y="44" class="lbl-sm">고체 표면에서 액체가 잘 퍼지는 정도</text>
      <text x="14" y="62" class="lbl-sm">예: 매끈한 금속 위 물방울 = 둥근 형체</text>
      <text x="14" y="80" class="lbl-xs" fill="#1f5582">유리 위 물방울 = 넓게 퍼짐</text>
    </g>
  </g>

  <!-- Step 3 · 해결 방법 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="470" width="1120" height="120" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="498" class="lbl-head">해결 방법 — 두 가지 접근</text>

    <g transform="translate(80, 520)">
      <rect x="0" y="0" width="500" height="50" rx="4" class="sci"/>
      <text x="14" y="20" class="lbl-strong" fill="#f5f1e8">① 액체 속력 유지</text>
      <text x="14" y="38" class="lbl-xs" fill="#f5f1e8">일정한 값 이상의 속력 유지 → 효과 안 나타남</text>

      <rect x="540" y="0" width="500" height="50" rx="4" class="sci"/>
      <text x="554" y="20" class="lbl-strong" fill="#f5f1e8">② 곡률 반경 감소</text>
      <text x="554" y="38" class="lbl-xs" fill="#f5f1e8">주둥이 가장자리 곡률 ↓ → 액체가 떨어지기 쉬움</text>
    </g>
  </g>

  <!-- Step 4 · 접촉각 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="610" width="540" height="220" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <text x="60" y="638" class="lbl-head" fill="#1f5582">토머스 영 — 접촉각으로 정량화</text>

    <!-- 두 물방울 비교 -->
    <g transform="translate(140, 760)">
      <!-- 작은 접촉각 (퍼짐) -->
      <line x1="-100" y1="0" x2="0" y2="0" class="ink" stroke-width="1.4"/>
      <ellipse cx="-50" cy="-2" rx="45" ry="14" class="water"/>
      <text x="-50" y="-26" text-anchor="middle" class="lbl-xs" fill="#1f5582" font-weight="700">θ = 30°</text>
      <text x="-50" y="20" text-anchor="middle" class="lbl-xs">작은 접촉각</text>
      <text x="-50" y="34" text-anchor="middle" class="lbl-xs" fill="#1f5582">젖음성 ↑</text>
    </g>

    <g transform="translate(420, 760)">
      <!-- 큰 접촉각 (둥글) -->
      <line x1="-50" y1="0" x2="50" y2="0" class="ink" stroke-width="1.4"/>
      <circle cx="0" cy="-12" r="14" class="water"/>
      <text x="0" y="-32" text-anchor="middle" class="lbl-xs" fill="#1f5582" font-weight="700">θ = 130°</text>
      <text x="0" y="20" text-anchor="middle" class="lbl-xs">큰 접촉각</text>
      <text x="0" y="34" text-anchor="middle" class="lbl-xs" fill="#1f5582">젖음성 ↓</text>
    </g>

    <text x="60" y="678" class="lbl-sm">기체 중에서 고체 면에 액체 방울이 닿았을 때 만들어지는 각도</text>
    <text x="60" y="696" class="lbl-xs" fill="#1f5582" font-weight="700">→ 접촉각이 작을수록 액체가 더 잘 퍼짐 = 젖음성 ↑</text>
  </g>

  <!-- Step 5 · 표면 에너지 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="620" y="610" width="540" height="220" rx="6" class="sci-bg2 sci-st" stroke-width="1.5"/>
    <text x="640" y="638" class="lbl-head" fill="#1f5582">표면 에너지 — 접촉각의 결정 요인</text>
    <text x="640" y="660" class="lbl-sm">동일 액체라도 고체 면에 따라 접촉각이 달라지는 이유</text>

    <g transform="translate(640, 680)">
      <rect x="0" y="0" width="500" height="50" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">표면 에너지</text>
      <text x="14" y="40" class="lbl-xs">서로 다른 두 물질의 경계에서 경계면 면적을 결정짓는 에너지</text>

      <rect x="0" y="60" width="500" height="80" rx="4" class="sci-bg sci-st" stroke-width="1.4"/>
      <text x="14" y="80" class="lbl-strong" fill="#1f5582">관계</text>
      <text x="14" y="100" class="lbl-sm">고체-액체 간 표면 에너지 ↓</text>
      <text x="14" y="118" class="lbl-sm" fill="#1f5582" font-weight="700">→ 접촉각 ↓ → 젖음성 ↑</text>
      <text x="14" y="134" class="lbl-xs">표면 에너지가 작을수록 더 잘 퍼진다</text>
    </g>
  </g>

  <!-- Step 6 · 친수·소수·초소수 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="850" width="1120" height="140" rx="6" class="paper2 ink" stroke-width="1"/>
    <text x="60" y="878" class="lbl-head">물에 대한 접촉각으로 본 분류</text>

    <g transform="translate(80, 900)">
      <rect x="0" y="0" width="340" height="70" rx="4" class="sci-bg sci-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#1f5582">친수성</text>
      <text x="14" y="42" class="lbl-sm">접촉각 0~90°</text>
      <text x="14" y="58" class="lbl-xs" fill="#1f5582">물이 잘 퍼짐</text>

      <rect x="360" y="0" width="340" height="70" rx="4" class="sci-bg2 sci-st" stroke-width="1.4"/>
      <text x="374" y="22" class="lbl-strong" fill="#1f5582">소수성</text>
      <text x="374" y="42" class="lbl-sm">접촉각 90~180°</text>
      <text x="374" y="58" class="lbl-xs" fill="#1f5582">물이 잘 퍼지지 않음</text>

      <rect x="720" y="0" width="340" height="70" rx="4" class="sci"/>
      <text x="734" y="22" class="lbl-strong" fill="#f5f1e8">초소수성</text>
      <text x="734" y="42" class="lbl-sm" fill="#f5f1e8">접촉각 150° 이상</text>
      <text x="734" y="58" class="lbl-xs" fill="#f5f1e8">물방울이 거의 머무르지 않음</text>
    </g>
  </g>

  <text x="1160" y="1010" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 주제 통합 · 230쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1020" width="1120" height="170" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1020" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1042" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1042" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#ffffff">4개 항목</text>
    <line x1="40" y1="1054" x2="1160" y2="1054" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1070" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">찻주전자 효과</text>
    <text x="240" y="1070" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">쏟는 속력이 줄면 액체가 용기 바깥 면을 타고 흐르는 현상. 점성과 무관하고 젖음성이 원인.</text>
    <line x1="40" y1="1084" x2="1160" y2="1084" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1100" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">젖음성과 접촉각</text>
    <text x="240" y="1100" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">젖음성은 고체 표면에서 액체가 잘 퍼지는 정도. 접촉각이 작을수록 젖음성이 크다.</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">표면 에너지</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">고체-액체 간 표면 에너지가 작을수록 접촉각이 작아져 젖음성이 커진다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">친수성·소수성·초소수성</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">물 접촉각 0~90° 친수, 90~180° 소수, 150° 이상 초소수.</text>
  </g>
</svg>
