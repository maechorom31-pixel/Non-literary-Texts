<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1270" data-app role="img" aria-labelledby="t64 d64">
  <title id="t64">복잡계 경제학 — 자생적 질서로서의 시장</title>
  <desc id="d64">기존 경제학의 합리적 선택·수학 모델 가정에 도전해, 경로 의존성·경로 고착·창발·자기 조직화로 현대 경제를 설명하는 새로운 패러다임.</desc>
  <defs>
    <style>
      .bg{fill:#fbf7ee}
      .panel{fill:#ffffff;stroke:#d8cdb6;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#8b6f47}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#4f463d}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#9c8e7a;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar64" viewBox="0 0 1200 1270" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b6f47"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#8b6f47"/>
  <text x="64" y="80" class="ti" fill="#ffffff">복잡계 경제학 — 자생적 질서로서의 시장</text>
  <text x="1136" y="80" class="sub" fill="#f4ead6" text-anchor="end">독서 방법 · 주장과 근거</text>

  <!-- Scene 1: 도입 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">출발 — 현대 경제의 변동성과 패러다임 전환</text>
    <text x="64" y="166" class="small">기술과 세계 금융 시장의 변화로 예측이 어려워졌다 → 산타페 연구소 중심의 ‘복잡계 경제학’ 등장.</text>

    <rect class="panel" x="64" y="184" width="1072" height="80" rx="10"/>
    <rect x="64" y="184" width="6" height="80" fill="#8b6f47"/>
    <text x="84" y="212" class="lab">근본적인 생각의 전환 요구</text>
    <text x="84" y="236" class="small">‘경제 주체가 언제나 가장 합리적 선택을 한다’ — 이 전제가 진리가 아니라고 본다.</text>
    <text x="84" y="256" class="it" fill="#8b6f47">경제를 동적이고 복잡한 ‘시스템’으로 이해</text>
  </g>

  <!-- Scene 2: 복잡계 경제학의 관점 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="308" class="num">2</text>
    <text x="92" y="308" class="bd">기존 경제학 vs 복잡계 경제학</text>

    <g>
      <rect class="panel" x="64" y="326" width="528" height="156" rx="10"/>
      <rect x="64" y="326" width="528" height="34" rx="10" fill="#a87f4a"/>
      <text x="84" y="350" class="pill">기존 경제학 — 수학 모델 중심</text>
      <text x="84" y="382" class="small">· 합리적 선택 가정</text>
      <text x="84" y="404" class="small">· 수학적 계산 + 도식적 모델</text>
      <text x="84" y="426" class="small">· 결과를 ‘예측’할 수 있는 시스템</text>
      <text x="84" y="456" class="it">정밀한 예측이 가능하다는 믿음</text>

      <rect class="panel" x="608" y="326" width="528" height="156" rx="10" stroke="#8b6f47" stroke-width="1.6" fill="#fff8ec"/>
      <rect x="608" y="326" width="528" height="34" rx="10" fill="#8b6f47"/>
      <text x="628" y="350" class="pill">복잡계 경제학 — 자생적 형성</text>
      <text x="628" y="382" class="small">· 동적으로 변화하는 복잡한 시스템</text>
      <text x="628" y="404" class="small">· 다양한 주체 + 제한된 정보 + 상호작용</text>
      <text x="628" y="426" class="small">· 예측 불가능한 ‘비정형성’</text>
      <text x="628" y="456" class="it" fill="#8b6f47">경로 의존성이 효율성보다 강하게 작용</text>
    </g>
  </g>

  <!-- Scene 3: 시장 질서의 본질 - 자생·창발 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="528" class="num">3</text>
    <text x="92" y="528" class="bd">시장 질서의 본질 — 자생적 질서와 창발</text>
    <text x="64" y="554" class="small">시장은 누군가가 ‘설계’하지 않는다. 미시 행위가 거시 질서를 만들어 낸다.</text>

    <g>
      <rect class="panel" x="64" y="572" width="1072" height="160" rx="10"/>

      <!-- 미시 -->
      <g transform="translate(96,592)">
        <text x="0" y="0" class="lab">미시 — 개별 주체</text>
        <line x1="0" y1="14" x2="280" y2="14" stroke="#e3d6b8" stroke-width="1"/>
        <g fill="#8b6f47">
          <circle cx="20" cy="50" r="6"/>
          <circle cx="60" cy="42" r="6"/>
          <circle cx="100" cy="58" r="6"/>
          <circle cx="140" cy="46" r="6"/>
          <circle cx="180" cy="56" r="6"/>
          <circle cx="220" cy="44" r="6"/>
          <circle cx="260" cy="52" r="6"/>
          <circle cx="40" cy="80" r="6"/>
          <circle cx="80" cy="86" r="6"/>
          <circle cx="120" cy="74" r="6"/>
          <circle cx="160" cy="84" r="6"/>
          <circle cx="200" cy="78" r="6"/>
          <circle cx="240" cy="86" r="6"/>
        </g>
        <text x="140" y="120" class="small" text-anchor="middle">제한된 정보·상호작용</text>
      </g>

      <line x1="408" y1="652" x2="448" y2="652" stroke="#8b6f47" stroke-width="2.6" marker-end="url(#ar64)"/>
      <text x="428" y="640" class="small" fill="#8b6f47" text-anchor="middle">창발</text>

      <!-- 거시 -->
      <g transform="translate(488,592)">
        <text x="0" y="0" class="lab" fill="#8b6f47">거시 — 자생적 질서</text>
        <line x1="0" y1="14" x2="280" y2="14" stroke="#e3d6b8" stroke-width="1"/>
        <path d="M 10 80 Q 50 30 100 60 Q 150 90 200 50 Q 240 30 270 60" fill="none" stroke="#8b6f47" stroke-width="2.6"/>
        <text x="140" y="120" class="small" text-anchor="middle">개별 합을 넘는 새로운 질서</text>
      </g>

      <text x="800" y="652" class="it" fill="#8b6f47">예) 어떤 기술이 표준이 될지, 어떤 정책이 성공할지 누구도 단정 ✗</text>
      <text x="800" y="676" class="small">새로운 기술의 학습 비용 + 네트워크 효과 → 기존 기술 ‘경로 고착’</text>
      <text x="800" y="698" class="small">기술뿐 아니라 정책·제도·시장 구조 전반에 반복</text>
    </g>
  </g>

  <!-- Scene 4: 의의 - 자기 조직화 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="780" class="num">4</text>
    <text x="92" y="780" class="bd">의의 — 자기 조직화 능력의 강조</text>
    <text x="64" y="806" class="small">경제는 살아 있는 유기체. 외부의 하향식 통제 ✗ → 변화에 적응하며 스스로 질서를 재구성하는 능력이 핵심.</text>

    <g>
      <rect class="panel" x="64" y="824" width="1072" height="200" rx="10" stroke="#8b6f47" stroke-width="1.6" fill="#fff8ec"/>
      <text x="84" y="852" class="lab" fill="#8b6f47">자기 조직화 능력 — 4단계 순환</text>
      <line x1="84" y1="864" x2="1116" y2="864" stroke="#e3d6b8" stroke-width="1"/>

      <g>
        <rect x="84" y="884" width="220" height="60" rx="10" fill="#fbeed3" stroke="#8b6f47"/>
        <text x="194" y="910" class="lab" text-anchor="middle">새 정보·환경</text>
        <text x="194" y="932" class="small" text-anchor="middle">변화의 자극</text>

        <line x1="312" y1="914" x2="350" y2="914" stroke="#8b6f47" stroke-width="2.4" marker-end="url(#ar64)"/>

        <rect x="358" y="884" width="220" height="60" rx="10" fill="#fbeed3" stroke="#8b6f47"/>
        <text x="468" y="910" class="lab" text-anchor="middle">행동 전략 변경</text>
        <text x="468" y="932" class="small" text-anchor="middle">주체들의 적응</text>

        <line x1="586" y1="914" x2="624" y2="914" stroke="#8b6f47" stroke-width="2.4" marker-end="url(#ar64)"/>

        <rect x="632" y="884" width="220" height="60" rx="10" fill="#fbeed3" stroke="#8b6f47"/>
        <text x="742" y="910" class="lab" text-anchor="middle">경제 구조 재조직</text>
        <text x="742" y="932" class="small" text-anchor="middle">미시→거시 변환</text>

        <line x1="860" y1="914" x2="898" y2="914" stroke="#8b6f47" stroke-width="2.4" marker-end="url(#ar64)"/>

        <rect x="906" y="884" width="218" height="60" rx="10" fill="#8b6f47"/>
        <text x="1015" y="910" class="lab" fill="#ffffff" text-anchor="middle">회복·진화</text>
        <text x="1015" y="932" class="small" fill="#f4ead6" text-anchor="middle">전체 경제의 적응</text>
      </g>

      <text x="84" y="998" class="it" fill="#8b6f47">→ 정확한 예측·통제가 아닌, 패턴 인식과 적응적 대응 능력이 필수</text>
    </g>
  </g>

  <text x="1140" y="1064" class="wm" text-anchor="end">EBS 2027 · 독서 방법 · 48쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="170" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#8b6f47"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">4개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">현대 경제의 변동성</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">기술·세계 정세 변화로 과거와 다른 양상을 보이며 변동성·불확실성이 크다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">복잡계 경제학</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">경제를 수학 모델의 결과물이 아닌 주체 간 상호작용에서 자생적으로 형성되는 현상으로 본다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">자생적 질서</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">시장 질서는 누군가에 의해 설계·통제되지 않고 미시적 행위가 거시적 패턴을 만들어 낸다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">복잡계 경제학의 의의</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">정확한 예측보다 패턴 인식과 적응적 대응을 강조해 경제 정책에 새로운 관점을 제공한다.</text>
  </g>
</svg>
