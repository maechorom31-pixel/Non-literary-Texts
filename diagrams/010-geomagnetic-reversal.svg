<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t10 d10">
  <title id="t10">지자기 역전의 발견 — 잔류 지자기에서 시간표까지</title>
  <desc id="d10">1940년대 블래킷의 가설에서 출발해 자력계 개발·잔류 지자기 측정·대륙 이동설 부활·지자기 역전 가설·검증·시간표 확정으로 이어진 흐름.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fc}
      .panel{fill:#ffffff;stroke:#bfd0e3;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#1f5582}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#42597a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d97b6;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      </style>
    <marker id="ar10" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#1f5582"/>
  <text x="64" y="80" class="ti" fill="#ffffff">지자기 역전의 발견 — 잔류 지자기에서 시간표까지</text>
  <text x="1136" y="80" class="sub" fill="#cfdcec" text-anchor="end">과학·기술 · 시간 순서</text>

  <!-- Scene 1: 블래킷 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">출발점 — 블래킷의 가설(1940년대 말)</text>
    <text x="64" y="166" class="small">회전하는 거대한 물체가 자기장을 만든다는 가설은 곧 폐기되었지만, 검증 과정에서 정밀한 자력계가 개발되었다.</text>

    <g>
      <rect class="panel" x="64" y="184" width="528" height="86" rx="10"/>
      <text x="84" y="212" class="lab">블래킷의 가설</text>
      <text x="84" y="236" class="small">지구 자기장의 기원 = 회전하는 거대한 물체</text>
      <text x="84" y="258" class="it" fill="#a83a4a">→ 가설 자체는 폐기</text>

      <line x1="600" y1="226" x2="638" y2="226" stroke="#1f5582" stroke-width="2.4" marker-end="url(#ar10)"/>

      <rect class="panel" x="648" y="184" width="488" height="86" rx="10" stroke="#1f5582" stroke-width="1.6" fill="#f0f5fb"/>
      <text x="668" y="212" class="lab" fill="#1f5582">정밀 자력계 개발 + 잔류 지자기 측정 가능</text>
      <text x="668" y="236" class="small">암석에 남은 ‘과거의 자기 흔적’ — 잔류 지자기</text>
      <text x="668" y="258" class="it" fill="#1f5582">→ 고지자기 연구의 토대 형성</text>
    </g>
  </g>

  <!-- Scene 2: 대륙 이동설 부활 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="320" class="num">2</text>
    <text x="92" y="320" class="bd">대륙 이동설의 부활</text>
    <text x="64" y="346" class="small">잔류 지자기 방향이 시대마다 다르게 나오는 현상 → 대륙이 이동했다고 가정하면 자연스럽게 설명된다.</text>

    <g>
      <rect class="panel" x="64" y="364" width="528" height="98" rx="10"/>
      <text x="84" y="392" class="lab">관찰된 현상</text>
      <text x="84" y="416" class="small">시대 A의 암석: 자기 방향 ↗</text>
      <text x="84" y="436" class="small">시대 B의 암석: 자기 방향 →</text>
      <text x="84" y="456" class="small">같은 지역의 암석들이 시대별로 다른 방향</text>

      <line x1="600" y1="412" x2="638" y2="412" stroke="#1f5582" stroke-width="2.4" marker-end="url(#ar10)"/>

      <rect class="panel" x="648" y="364" width="488" height="98" rx="10" stroke="#1f5582" stroke-width="1.6" fill="#f0f5fb"/>
      <text x="668" y="392" class="lab" fill="#1f5582">베게너 대륙 이동설의 부활</text>
      <text x="668" y="416" class="small">대륙이 움직였다면 시대별 자기 방향 차이가</text>
      <text x="668" y="436" class="small">자연스럽게 설명된다.</text>
      <text x="668" y="456" class="it" fill="#1f5582">잔류 지자기 = 폐기된 가설을 살린 결정적 증거</text>
    </g>
  </g>

  <!-- Scene 3: 지자기 역전 가설 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="514" class="num">3</text>
    <text x="92" y="514" class="bd">또 하나의 발견 — 지자기 역전 가설</text>
    <text x="64" y="540" class="small">현재와 정반대 방향의 잔류 지자기를 가진 암석이 여러 지역에서 반복 관찰됨.</text>

    <rect class="panel" x="64" y="558" width="1072" height="100" rx="10"/>
    <g>
      <!-- 현재 자기장 -->
      <text x="100" y="590" class="lab" text-anchor="middle">현재</text>
      <g transform="translate(100,628)">
        <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#1f5582"/>
        <text x="-15" y="4" class="pill" text-anchor="middle">N</text>
        <text x="15" y="4" class="pill" text-anchor="middle">S</text>
      </g>

      <!-- 화살표 -->
      <line x1="160" y1="628" x2="220" y2="628" stroke="#5e548e" stroke-width="2" marker-end="url(#ar10)" stroke-dasharray="4 3"/>
      <text x="190" y="618" class="small" text-anchor="middle" fill="#5e548e">시간↑</text>

      <!-- 과거(역전) 자기장 -->
      <text x="280" y="590" class="lab" text-anchor="middle">과거 어느 시기</text>
      <g transform="translate(280,628)">
        <rect x="-30" y="-12" width="60" height="24" rx="4" fill="#a83a4a"/>
        <text x="-15" y="4" class="pill" text-anchor="middle">S</text>
        <text x="15" y="4" class="pill" text-anchor="middle">N</text>
      </g>

      <text x="380" y="600" class="small">→ 과거 어느 시기에 N극·S극이</text>
      <text x="380" y="618" class="small">  지금과 반대였다는 뜻</text>
      <text x="380" y="640" class="it" fill="#1f5582">처음엔 받아들이기 어려웠으나, 여러 지역에서 반복 관찰</text>

      <text x="800" y="616" class="lab" fill="#a83a4a">지자기 역전 가설 등장</text>
      <text x="800" y="640" class="small">→ 지구 자기장 자체가 뒤바뀐 적이 있다</text>
    </g>
  </g>

  <!-- Scene 4: 검증 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="710" class="num">4</text>
    <text x="92" y="710" class="bd">검증 — 광물 탓일까, 자기장 탓일까?</text>
    <text x="64" y="736" class="small">잔류 지자기가 반대인 두 가능성 — 자기장 자체가 뒤바뀜 vs 일부 광물의 거꾸로 기록 특성. 같은 시기 다른 광물 비교로 판정.</text>

    <g>
      <rect class="panel" x="64" y="754" width="528" height="124" rx="10"/>
      <text x="84" y="782" class="lab">실험 설계</text>
      <line x1="84" y1="794" x2="572" y2="794" stroke="#dfe7f1" stroke-width="1"/>
      <text x="84" y="818" class="small">같은 시기에 형성된 ‘서로 다른 광물’의</text>
      <text x="84" y="838" class="small">잔류 지자기 방향을 비교한다.</text>
      <text x="84" y="860" class="it">광물 탓이라면 광물별로 방향이 다를 것</text>

      <rect class="panel" x="608" y="754" width="528" height="124" rx="10" stroke="#1f5582" stroke-width="1.6" fill="#f0f5fb"/>
      <text x="628" y="782" class="lab" fill="#1f5582">결과</text>
      <line x1="628" y1="794" x2="1116" y2="794" stroke="#d8e3f0" stroke-width="1"/>
      <text x="628" y="818" class="small">광물 종류와 무관하게 모든 광물이</text>
      <text x="628" y="838" class="small">같은 방향을 가리킴</text>
      <text x="628" y="860" class="it" fill="#1f5582">→ 자기장 자체가 뒤바뀌었음이 확정됨</text>
    </g>
  </g>

  <!-- Scene 5: 시간표 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="930" class="num">5</text>
    <text x="92" y="930" class="bd">지자기 역전 시간표 — 1959, 뤼턴 → 정밀화</text>

    <g>
      <rect class="panel" x="64" y="948" width="1072" height="92" rx="10"/>

      <!-- 시간 막대 -->
      <g transform="translate(120,990)">
        <rect x="0" y="-12" width="160" height="24" fill="#1f5582"/>
        <text x="80" y="4" class="pill" text-anchor="middle">정상</text>
        <rect x="160" y="-12" width="120" height="24" fill="#a83a4a"/>
        <text x="220" y="4" class="pill" text-anchor="middle">역전</text>
        <rect x="280" y="-12" width="200" height="24" fill="#1f5582"/>
        <text x="380" y="4" class="pill" text-anchor="middle">정상</text>
        <rect x="480" y="-12" width="100" height="24" fill="#a83a4a"/>
        <text x="530" y="4" class="pill" text-anchor="middle">역전</text>
        <rect x="580" y="-12" width="180" height="24" fill="#1f5582"/>
        <text x="670" y="4" class="pill" text-anchor="middle">정상</text>
        <text x="780" y="4" class="lab">…</text>

        <text x="0" y="36" class="small" fill="#5e548e">과거 ←</text>
        <text x="780" y="36" class="small" fill="#5e548e" text-anchor="end">→ 현재</text>
      </g>

      <text x="900" y="980" class="small">+ 방사성 동위 원소 연대 측정</text>
      <text x="900" y="1000" class="small">→ 절대 연대 정밀화</text>
      <text x="900" y="1024" class="it" fill="#1f5582">해저 지각·판 구조론의 핵심 증거</text>
    </g>
  </g>

  <text x="1140" y="1064" class="wm" text-anchor="end">EBS 2027 · 과학·기술 · 211쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">잔류 지자기</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">암석이 형성될 당시의 지구 자기장 방향을 그대로 보존한 자기 흔적. 고지자기 연구의 핵심 자료이다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">대륙 이동설의 부활</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">잔류 지자기 방향이 시대에 따라 다르게 나타나는 현상을 설명하기 위해 베게너의 대륙 이동설이 다시 인정받게 되었다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">지자기 역전 가설</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">현재와 정반대 방향의 잔류 지자기가 여러 지역에서 발견되어, 과거에 N극과 S극이 뒤바뀐 적이 있다는 가설이 제기되었다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">검증 방법</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">같은 시기에 형성된 서로 다른 광물의 잔류 지자기 방향을 비교해, 일관되게 같은 방향이면 자기장 자체가 뒤바뀐 것으로 확인된다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">지자기 역전 시간표</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1959년 뤼턴이 처음 제시하고 방사성 연대 측정으로 정밀화. 해저 지각 형성과 판 구조론을 뒷받침하는 강력한 증거가 되었다.</text>
  </g>
</svg>
