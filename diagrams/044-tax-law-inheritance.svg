<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" data-app role="img" aria-labelledby="t044 d044">
  <title id="t044">조세 법률주의와 상속·증여세</title>
  <desc id="d044">(가) 조세 법률주의의 두 해석(열거주의 vs 포괄주의)을 비교 매트릭스로, (나) 무상 이전의 두 시점(사망=상속 vs 생전=증여)과 유산세·유산 취득세 방식을 가족 도식과 흐름도로 시각화.</desc>
  <defs>
    <style>
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
      .bg{fill:#f5f1e8}
      .panel{fill:#fff;stroke:#c9bfa8;stroke-width:1.2}
      .ti{font:700 26px 'Noto Serif KR',serif;fill:#1a1612}
      .head{font:700 18px 'Noto Serif KR',serif;fill:#1a1612}
      .lab{font:600 15px 'Pretendard',sans-serif;fill:#1a1612}
      .lab-sm{font:400 13px 'Pretendard',sans-serif;fill:#4a3f33}
      .lab-xs{font:400 11px 'Pretendard',sans-serif;fill:#7a6f5f}
      .num{font:700 20px 'Pretendard',sans-serif;fill:#2a6f6f}
      .pill{font:600 13px 'Pretendard',sans-serif;fill:#fff}
      .it{font:400 13px 'Pretendard',sans-serif;fill:#2a6f6f}
      .it-r{font:400 13px 'Pretendard',sans-serif;fill:#a83a4a}
      .figLab{font:600 12px 'Pretendard',sans-serif;fill:#1a1612}
      .wm{font:400 12px 'Pretendard',sans-serif;fill:#7a6f5f;letter-spacing:.04em}
    </style>
    <marker id="ar44" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
    <marker id="ar44-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
    <symbol id="person44" viewBox="0 0 28 36">
      <circle cx="14" cy="9" r="6" fill="#ebe5d4" stroke="#7a6f5f" stroke-width="1"/>
      <path d="M3 34 Q3 19 14 19 Q25 19 25 34 Z" fill="#ebe5d4" stroke="#7a6f5f" stroke-width="1"/>
    </symbol>
    <symbol id="cross44" viewBox="0 0 24 24">
      <path d="M10 2 V14 H4 V18 H10 V24 H14 V18 H20 V14 H14 V2 Z" fill="#a83a4a" opacity="0.85"/>
    </symbol>
    <symbol id="coin44" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="#e0a020" stroke="#7a6f5f" stroke-width="1"/>
      <text x="10" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1612">$</text>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <rect x="40" y="36" width="1120" height="62" rx="10" fill="#2a6f6f"/>
  <text x="64" y="76" class="ti" fill="#fff">조세 법률주의와 상속·증여세</text>
  <text x="1136" y="76" class="lab-sm" fill="#cfe5e1" text-anchor="end">주제 통합 · 분류</text>

  <!-- (가) 헤더 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="134" class="num">1</text>
    <text x="92" y="134" class="head">(가) 조세 법률주의 — 자의적 과세 방지 + 재산권 보호</text>

    <rect class="panel" x="64" y="152" width="1072" height="100" rx="10"/>
    <rect x="64" y="152" width="6" height="100" fill="#2a6f6f"/>

    <!-- 입법-납세자-정부 삼각관계 -->
    <g transform="translate(96,170)">
      <rect x="0" y="20" width="160" height="48" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="80" y="40" class="lab" text-anchor="middle" fill="#2a6f6f">법률 (입법)</text>
      <text x="80" y="58" class="lab-xs" text-anchor="middle">국회 제정</text>

      <line x1="170" y1="44" x2="208" y2="44" stroke="#2a6f6f" stroke-width="2" marker-end="url(#ar44)"/>

      <rect x="216" y="20" width="160" height="48" rx="8" fill="#fff" stroke="#7a6f5f" stroke-width="1"/>
      <text x="296" y="40" class="lab" text-anchor="middle">정부 (과세)</text>
      <text x="296" y="58" class="lab-xs" text-anchor="middle">법률 ‘근거’만 가능</text>

      <line x1="386" y1="44" x2="424" y2="44" stroke="#2a6f6f" stroke-width="2" marker-end="url(#ar44)"/>

      <rect x="432" y="20" width="160" height="48" rx="8" fill="#fbeed3" stroke="#a8884a" stroke-width="1"/>
      <text x="512" y="40" class="lab" text-anchor="middle">납세자</text>
      <text x="512" y="58" class="lab-xs" text-anchor="middle">재산권 보호</text>

      <text x="700" y="46" class="lab-sm">→ 헌법상 원칙</text>
      <text x="700" y="66" class="it">자의적 과세 ✗ · 세율·기준의 자의적 변경 ✗</text>
    </g>
  </g>

  <!-- 비교 매트릭스: 열거 vs 포괄 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="294" class="num">2</text>
    <text x="92" y="294" class="head">조세 열거주의 — 엄격 적용</text>

    <rect class="panel" x="64" y="312" width="528" height="216" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>
    <text x="84" y="338" class="lab" fill="#a83a4a">방식 — 명시된 사항만 과세</text>
    <line x1="84" y1="350" x2="572" y2="350" stroke="#fbe6e9"/>

    <!-- 법조문 박스 -->
    <g transform="translate(84,360)">
      <rect width="240" height="60" rx="6" fill="#fff" stroke="#a83a4a" stroke-width="1"/>
      <text x="14" y="22" class="lab-xs" fill="#a83a4a">제 12조</text>
      <text x="14" y="40" class="lab-xs">A 거래 → 과세</text>
      <text x="14" y="56" class="lab-xs">B 거래 → 과세</text>

      <line x1="252" y1="30" x2="290" y2="30" stroke="#a83a4a" stroke-width="2" marker-end="url(#ar44-r)"/>

      <rect x="298" y="0" width="180" height="60" rx="6" fill="#fbe6e9" stroke="#a83a4a" stroke-dasharray="4 3"/>
      <text x="388" y="24" class="lab-xs" text-anchor="middle" fill="#a83a4a">새 형태 거래 C</text>
      <text x="388" y="44" class="lab-xs" text-anchor="middle">→ 과세 ✗ (공백)</text>
    </g>

    <rect x="84" y="430" width="488" height="34" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
    <text x="100" y="452" class="lab-xs" fill="#2a6f6f">▲ 장점 — 납세자 권리 최대 보장</text>

    <rect x="84" y="470" width="488" height="34" rx="6" fill="#fbe6e9" stroke="#a83a4a"/>
    <text x="100" y="492" class="lab-xs" fill="#a83a4a">▼ 한계 — 변화 속도 못 따라가 ‘과세 공백’ 발생</text>
  </g>

  <g class="reveal" data-reveal-step="3">
    <text x="620" y="294" class="num">3</text>
    <text x="648" y="294" class="head">조세 포괄주의 — 유연 해석</text>

    <rect class="panel" x="620" y="312" width="540" height="216" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
    <text x="640" y="338" class="lab" fill="#2a6f6f">방식 — 입법 취지·과세 목적 종합</text>
    <line x1="640" y1="350" x2="1140" y2="350" stroke="#bfd9d3"/>

    <g transform="translate(640,360)">
      <rect width="240" height="60" rx="6" fill="#fff" stroke="#2a6f6f" stroke-width="1"/>
      <text x="14" y="22" class="lab-xs" fill="#2a6f6f">법문 + 입법 취지</text>
      <text x="14" y="40" class="lab-xs">A · B 거래 + …</text>
      <text x="14" y="56" class="lab-xs">유사 성격까지 포괄</text>

      <line x1="252" y1="30" x2="290" y2="30" stroke="#2a6f6f" stroke-width="2" marker-end="url(#ar44)"/>

      <rect x="298" y="0" width="180" height="60" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="388" y="24" class="lab-xs" text-anchor="middle" fill="#2a6f6f">새 형태 거래 C</text>
      <text x="388" y="44" class="lab-xs" text-anchor="middle">→ 유사 → 과세 ✓</text>
    </g>

    <rect x="640" y="430" width="500" height="34" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
    <text x="656" y="452" class="lab-xs" fill="#2a6f6f">▲ 장점 — 변화하는 경제에 유연 대응</text>

    <rect x="640" y="470" width="500" height="34" rx="6" fill="#fbe6e9" stroke="#a83a4a"/>
    <text x="656" y="492" class="lab-xs" fill="#a83a4a">▼ 한계 — 자의적 해석 위험</text>
  </g>

  <!-- Step 4 · 균형 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="566" class="num">4</text>
    <text x="92" y="566" class="head">현대 조세 실무 — 두 입장의 균형</text>

    <rect class="panel" x="64" y="584" width="1072" height="100" rx="10"/>

    <!-- 시소 도식 -->
    <g transform="translate(64,594)">
      <line x1="40" y1="56" x2="380" y2="56" stroke="#7a6f5f" stroke-width="2"/>
      <polygon points="210,56 196,82 224,82" fill="#7a6f5f"/>
      <rect x="50" y="22" width="120" height="32" rx="6" fill="#fbf2f4" stroke="#a83a4a"/>
      <text x="110" y="42" class="lab-xs" text-anchor="middle" fill="#a83a4a">엄격 (열거)</text>
      <rect x="250" y="22" width="120" height="32" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="310" y="42" class="lab-xs" text-anchor="middle" fill="#2a6f6f">유연 (포괄)</text>

      <text x="430" y="24" class="lab" fill="#2a6f6f">입법 — 적절한 일반 조항</text>
      <text x="430" y="44" class="lab" fill="#2a6f6f">해석 — 신중한 균형 유지</text>
      <text x="430" y="68" class="it">법률 문언만 → 공백 / 너무 포괄 → 권리 침해</text>
    </g>
  </g>

  <!-- (나) 헤더 + 시간축 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="722" class="num">5</text>
    <text x="92" y="722" class="head">(나) 무상 이전에 부과되는 두 세금 — 사망 vs 생전</text>

    <rect class="panel" x="64" y="740" width="1072" height="116" rx="10"/>
    <rect x="64" y="740" width="6" height="116" fill="#2a6f6f"/>

    <!-- 시간축 -->
    <line x1="120" y1="800" x2="1100" y2="800" stroke="#2a6f6f" stroke-width="2"/>
    <polygon points="1100,794 1116,800 1100,806" fill="#2a6f6f"/>
    <text x="1130" y="804" class="lab-xs" fill="#2a6f6f">시간</text>

    <line x1="380" y1="788" x2="380" y2="812" stroke="#a83a4a" stroke-width="1.4"/>
    <circle cx="380" cy="800" r="6" fill="#a83a4a"/>
    <text x="380" y="780" class="lab" text-anchor="middle" fill="#a83a4a">생전 (증여)</text>
    <text x="380" y="828" class="lab-xs" text-anchor="middle">자녀에게 재산 이전</text>

    <line x1="820" y1="788" x2="820" y2="812" stroke="#7a6f5f" stroke-width="1.4"/>
    <circle cx="820" cy="800" r="6" fill="#7a6f5f"/>
    <text x="820" y="780" class="lab" text-anchor="middle" fill="#7a6f5f">사망 시점 (상속)</text>
    <text x="820" y="828" class="lab-xs" text-anchor="middle">사망에 따른 무상 귀속</text>

    <text x="84" y="850" class="it">조세의 공평성 + 부의 재분배 → 두 세금 모두 부의 집중을 막는 도구</text>
  </g>

  <!-- 상속세 -->
  <g class="reveal" data-reveal-step="6">
    <text x="64" y="894" class="num">6</text>
    <text x="92" y="894" class="head">상속세 — 사망 시 무상 귀속</text>

    <rect class="panel" x="64" y="912" width="1072" height="172" rx="10" stroke="#7a6f5f" stroke-width="1.4"/>

    <!-- 가족 도식 -->
    <g transform="translate(84,932)">
      <use href="#person44" x="20" y="0" width="32" height="42"/>
      <use href="#cross44" x="46" y="0" width="14" height="14"/>
      <text x="36" y="58" class="figLab" text-anchor="middle">피상속인 (사망)</text>

      <line x1="62" y1="22" x2="118" y2="22" stroke="#7a6f5f" stroke-width="2" marker-end="url(#ar44)"/>
      <use href="#coin44" x="78" y="6" width="16" height="16"/>
      <text x="90" y="48" class="lab-xs" fill="#a83a4a" text-anchor="middle">무상 귀속</text>

      <use href="#person44" x="130" y="-8" width="22" height="28"/>
      <use href="#person44" x="160" y="-8" width="22" height="28"/>
      <use href="#person44" x="190" y="-8" width="22" height="28"/>
      <text x="170" y="38" class="figLab" text-anchor="middle">상속인들</text>
    </g>

    <!-- 두 방식 -->
    <g transform="translate(380,932)">
      <rect width="340" height="120" rx="8" fill="#fbeed3" stroke="#a8884a" stroke-width="1.2"/>
      <text x="170" y="22" class="lab" text-anchor="middle" fill="#a8884a">유산세 방식 — 통합 산정</text>
      <line x1="14" y1="32" x2="326" y2="32" stroke="#d8c595"/>

      <!-- 통합 막대 -->
      <rect x="14" y="44" width="312" height="20" fill="#a8884a"/>
      <text x="170" y="60" class="lab-xs" fill="#fff" text-anchor="middle">전체 상속 재산 (모두 합산)</text>

      <text x="14" y="86" class="lab-xs">→ 한 덩어리 ⇒ 산정 ⇒ 세액 결정</text>
      <text x="14" y="104" class="it-r">총액 기준 (피상속인 중심)</text>
    </g>

    <g transform="translate(740,932)">
      <rect width="380" height="120" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="190" y="22" class="lab" text-anchor="middle" fill="#2a6f6f">유산 취득세 방식 — 개별 산정</text>
      <line x1="14" y1="32" x2="366" y2="32" stroke="#bfd9d3"/>

      <!-- 분할 막대 -->
      <rect x="14" y="44" width="100" height="20" fill="#2a6f6f"/>
      <rect x="120" y="44" width="120" height="20" fill="#2a6f6f" opacity="0.75"/>
      <rect x="246" y="44" width="120" height="20" fill="#2a6f6f" opacity="0.55"/>

      <text x="14" y="86" class="lab-xs">→ 각 상속인이 받은 몫에 따로 부과</text>
      <text x="14" y="104" class="it">개별 기준 (상속인 중심)</text>
    </g>
  </g>

  <!-- 증여세 -->
  <g class="reveal" data-reveal-step="7">
    <text x="64" y="1116" class="num">7</text>
    <text x="92" y="1116" class="head">증여세 — 생존 중 무상 이전</text>

    <rect class="panel" x="64" y="1134" width="1072" height="50" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>

    <g transform="translate(84,1146)">
      <use href="#person44" x="0" y="0" width="22" height="28"/>
      <text x="11" y="40" class="lab-xs" text-anchor="middle">증여자 (생존)</text>

      <line x1="30" y1="14" x2="100" y2="14" stroke="#a83a4a" stroke-width="2" marker-end="url(#ar44-r)"/>
      <use href="#coin44" x="56" y="2" width="14" height="14"/>
      <text x="65" y="40" class="lab-xs" fill="#a83a4a" text-anchor="middle">무상 이전</text>

      <use href="#person44" x="108" y="0" width="22" height="28"/>
      <text x="119" y="40" class="lab-xs" text-anchor="middle">수증자 (받는 사람)</text>

      <text x="180" y="14" class="lab-sm">· 부과 기준 = 받는 사람 / 일정 금액 이하 비과세</text>
      <text x="180" y="34" class="it-r">상속세(사망) ↔ 증여세(생전) — 두 세금 모두 부의 집중 방지·형평성 유지</text>
    </g>
  </g>

  <text x="1140" y="1188" class="wm" text-anchor="end">EBS 2027 · 주제 통합 · 240쪽</text>
</svg>
