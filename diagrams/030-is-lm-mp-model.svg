<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1240" role="img" aria-labelledby="t030 d030">
  <title id="t030">거시 경제 이론과 IS-LM·IS-MP 모형</title>
  <desc id="d030">고전학파의 시장 자율 조정 신뢰에서 케인스 경제학으로의 전환에서 출발해, 이자율-국민소득의 우하향 관계를 보여 주는 IS 곡선, 통화량을 외생적으로 고정한 가정 하에 우상향하는 LM 곡선과 그 교차점인 단기 균형, 1970년대 스태그플레이션으로 드러난 IS-LM의 한계, 중앙은행을 시장 내부 주체로 보고 물가·소득에 따라 금리를 내생적으로 조정하는 MP 곡선의 등장, 그리고 IS-MP 모형의 의의(현대 금융 시장의 금리 중심 정책 효과 분석 + 경제 주체 기대 변화 분석)까지 시각화한다.</desc>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    svg[data-app] .reveal { opacity: 0; transform: translateY(6px); }
    svg[data-app] .reveal.on { opacity: 1; transform: translateY(0); }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .soc { fill: #2a6f6f; }
    .soc-st { stroke: #2a6f6f; }
    .soc-bg { fill: rgba(42,111,111,0.08); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- Step 1 · 고전학파 → 케인스 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="120" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">고전학파 → 케인스 전환</text>

    <g transform="translate(60, 80)">
      <rect x="0" y="0" width="380" height="56" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">고전학파</text>
      <text x="14" y="44" class="lbl-sm">시장 자율 조정 + 가격·임금 유연성 → 완전 고용</text>

      <text x="420" y="34" class="lbl-head" fill="#a83a4a">→</text>

      <rect x="460" y="0" width="660" height="56" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="474" y="22" class="lbl-strong" fill="#a83a4a">케인스 (대공황 이후)</text>
      <text x="474" y="44" class="lbl-sm">총수요가 자동 조정되지 않음 → 정부 지출 등 정책 개입 필요</text>
    </g>
  </g>

  <!-- Step 2 · IS 곡선 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="170" width="540" height="280" rx="6" class="soc-bg soc-st" stroke-width="1.5"/>
    <text x="60" y="198" class="lbl-head" fill="#2a6f6f">IS 곡선 — 상품 시장 균형</text>
    <text x="60" y="220" class="lbl-sm">이자율 ↓ → 투자·소득 ↑ (우하향)</text>

    <!-- 그래프 -->
    <g transform="translate(120, 410)">
      <line x1="0" y1="0" x2="0" y2="-180" class="ink" stroke-width="1.4"/>
      <line x1="0" y1="0" x2="380" y2="0" class="ink" stroke-width="1.4"/>
      <text x="-8" y="-180" text-anchor="end" class="lbl-xs">이자율 (r)</text>
      <text x="380" y="14" text-anchor="end" class="lbl-xs">국민 소득 (Y)</text>

      <!-- IS 곡선 (우하향) -->
      <path d="M 30 -160 Q 130 -100 250 -50 Q 320 -20 360 -10" fill="none" class="soc-st" stroke-width="2.4"/>
      <text x="320" y="-30" class="lbl-strong" fill="#2a6f6f">IS</text>

      <!-- 화살표 표시 -->
      <line x1="80" y1="-130" x2="240" y2="-50" stroke="#2a6f6f" stroke-width="0.8" stroke-dasharray="2 2"/>
      <text x="160" y="-100" class="lbl-xs" fill="#2a6f6f">r ↓ → Y ↑</text>
    </g>
  </g>

  <!-- Step 3 · LM 곡선과 균형 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="620" y="170" width="540" height="280" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="640" y="198" class="lbl-head">LM 곡선 + 단기 균형</text>
    <text x="640" y="220" class="lbl-sm">통화량 외생적 고정 → 소득 ↑ 시 이자율 ↑ (우상향)</text>

    <!-- 그래프 -->
    <g transform="translate(700, 410)">
      <line x1="0" y1="0" x2="0" y2="-180" class="ink" stroke-width="1.4"/>
      <line x1="0" y1="0" x2="380" y2="0" class="ink" stroke-width="1.4"/>
      <text x="-8" y="-180" text-anchor="end" class="lbl-xs">r</text>
      <text x="380" y="14" text-anchor="end" class="lbl-xs">Y</text>

      <!-- IS -->
      <path d="M 30 -160 Q 130 -100 250 -50 Q 320 -20 360 -10" fill="none" class="soc-st" stroke-width="2"/>
      <text x="60" y="-150" class="lbl-strong" fill="#2a6f6f">IS</text>

      <!-- LM (우상향) -->
      <path d="M 20 -10 Q 120 -50 220 -100 Q 320 -150 360 -170" fill="none" class="acc-st" stroke-width="2.4"/>
      <text x="320" y="-148" class="lbl-strong" fill="#a83a4a">LM</text>

      <!-- 균형점 -->
      <circle cx="180" cy="-90" r="6" fill="#1a1612"/>
      <text x="190" y="-96" class="lbl-xs" font-weight="700">단기 균형</text>
      <line x1="180" y1="-90" x2="180" y2="0" stroke="#7a6f5f" stroke-width="0.6" stroke-dasharray="2 2"/>
      <line x1="180" y1="-90" x2="0" y2="-90" stroke="#7a6f5f" stroke-width="0.6" stroke-dasharray="2 2"/>
      <text x="180" y="14" text-anchor="middle" class="lbl-xs">Y*</text>
      <text x="-8" y="-86" text-anchor="end" class="lbl-xs">r*</text>
    </g>
  </g>

  <!-- Step 4 · 스태그플레이션 → IS-MP -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="470" width="1120" height="120" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="498" class="lbl-head" fill="#a83a4a">1970년대 한계 — IS-LM에서 IS-MP로</text>

    <g transform="translate(60, 520)">
      <rect x="0" y="0" width="320" height="56" rx="4" class="paper2 acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">오일 쇼크 → 스태그플레이션</text>
      <text x="14" y="44" class="lbl-sm">경기 침체 + 물가 상승 동시 발생</text>

      <text x="356" y="34" class="lbl-head" fill="#a83a4a">→</text>

      <rect x="400" y="0" width="700" height="56" rx="4" class="soc-bg soc-st" stroke-width="1.4"/>
      <text x="414" y="22" class="lbl-strong" fill="#2a6f6f">신케인스학파의 IS-MP 모형 등장</text>
      <text x="414" y="44" class="lbl-sm">기존 IS는 유지 + LM을 MP로 교체 (통화량 → 금리)</text>
    </g>
  </g>

  <!-- Step 5 · MP 곡선 특징 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="610" width="1120" height="280" rx="6" class="soc-bg soc-st" stroke-width="1.5"/>
    <text x="60" y="638" class="lbl-head" fill="#2a6f6f">MP 곡선의 특징 — 외생 vs 내생 (LM과의 결정적 차이)</text>

    <!-- LM (외생) -->
    <g transform="translate(60, 660)">
      <rect x="0" y="0" width="500" height="200" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">LM 곡선 — 외생적</text>
      <text x="14" y="44" class="lbl-sm">중앙은행 = <tspan font-weight="700" fill="#a83a4a">시장 밖에서 시장을 규율하는 외부 주체</tspan></text>
      <text x="14" y="62" class="lbl-sm">통화량을 외생적으로 일정하게 고정</text>

      <!-- 시각: 시장 밖 중앙은행 -->
      <g transform="translate(120, 90)">
        <rect x="0" y="0" width="120" height="80" rx="4" class="paper2 ink" stroke-width="1"/>
        <text x="60" y="24" text-anchor="middle" class="lbl-sm" font-weight="700">시장</text>
        <text x="60" y="46" text-anchor="middle" class="lbl-xs">IS / LM</text>
        <text x="60" y="64" text-anchor="middle" class="lbl-xs">균형</text>

        <rect x="160" y="20" width="120" height="40" rx="4" class="acc"/>
        <text x="220" y="44" text-anchor="middle" font-size="11" fill="#f5f1e8" font-weight="700">중앙은행</text>
        <line x1="158" y1="40" x2="124" y2="40" class="acc-st" stroke-width="1.4" stroke-dasharray="2 2"/>
        <text x="142" y="36" text-anchor="middle" class="lbl-xs" fill="#a83a4a">통화량 고정</text>
      </g>
    </g>

    <!-- MP (내생) -->
    <g transform="translate(600, 660)">
      <rect x="0" y="0" width="540" height="200" rx="4" class="soc-bg soc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#2a6f6f">MP 곡선 — 내생적</text>
      <text x="14" y="44" class="lbl-sm">중앙은행 = <tspan font-weight="700" fill="#2a6f6f">시장 내부의 주체</tspan></text>
      <text x="14" y="62" class="lbl-sm">물가·소득에 따라 기준 금리를 내생적으로 조정</text>

      <!-- 시각: 시장 안 중앙은행 -->
      <g transform="translate(140, 90)">
        <rect x="0" y="0" width="220" height="90" rx="4" class="paper2 soc-st" stroke-width="1.2"/>
        <text x="110" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">경제 시스템</text>
        <rect x="80" y="40" width="80" height="36" rx="3" class="soc"/>
        <text x="120" y="62" text-anchor="middle" font-size="11" fill="#f5f1e8" font-weight="700">중앙은행</text>
        <text x="110" y="86" text-anchor="middle" class="lbl-xs" fill="#2a6f6f">물가↑ → 금리↑ (긴축)</text>
      </g>
    </g>
  </g>

  <!-- Step 6 · 의의 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="910" width="1120" height="80" rx="6" class="paper2 ink" stroke-width="1"/>
    <text x="60" y="938" class="lbl-strong">IS-MP 모형의 의의</text>
    <text x="60" y="958" class="lbl-sm">① 현대 금융 시장의 금리 중심 정책 효과를 현실적으로 설명 (통화량만으로 정밀 통제 어려움)</text>
    <text x="60" y="978" class="lbl-sm">② 경제 주체의 기대 변화가 총수요·경기 변동에 미치는 영향까지 분석 가능</text>
  </g>

  <text x="1160" y="1010" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 사회·문화 · 122쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1020" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1020" width="1120" height="32" rx="6" fill="#2a6f6f"/>
    <text x="60" y="1042" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1042" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">6개 항목</text>
    <line x1="40" y1="1054" x2="1160" y2="1054" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1070" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">케인스 경제학</text>
    <text x="240" y="1070" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">고전학파의 시장 자율 조정 신뢰를 비판하며, 낮은 총수요가 실업·소득 감소를 낳으므로 정부 개입이 필요하다고 본다.</text>
    <line x1="40" y1="1084" x2="1160" y2="1084" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1100" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">IS 곡선</text>
    <text x="240" y="1100" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">이자율 ↓ → 투자·소득 ↑의 관계를 나타내는 우하향 곡선. 상품 시장의 균형을 보여 준다.</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">LM 곡선</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">통화량을 외생적으로 고정한 가정 하에, 소득 ↑ → 이자율 ↑의 관계를 나타내는 우상향 곡선.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">IS-LM의 한계</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1970년대 스태그플레이션으로 통화량 중심 모형의 한계가 드러났다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">MP 곡선</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">중앙은행을 경제 내부 주체로 보고, 물가·소득에 따라 기준 금리를 내생적으로 조정함을 보여 준다.</text>
  </g>
</svg>
