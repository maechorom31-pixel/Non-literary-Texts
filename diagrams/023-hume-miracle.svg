<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1160" role="img" aria-labelledby="t23 d23">
  <title id="t23">기적적 사건에 대한 흄의 견해</title>
  <desc id="d23">기적의 정의(자연법칙으로 설명될 수 없는 초자연적 사건)와 흄의 두 가설(증언 거짓 vs 기적 발생)을 양팔 저울로 비교하고, 흄의 부등식(증언이 거짓일 가능성 &lt; 기적이 일어날 가능성)이 성립할 수 없음을 시각화하며, 프라이스의 복권 반박과 그 한계, 종교의 토대로서의 기적까지 정리한다.</desc>

  <defs>
    <marker id="ar23-hum" viewBox="0 0 1200 1160" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e548e"/>
    </marker>
    <marker id="ar23-acc" viewBox="0 0 1200 1160" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .quote { font-family: 'Noto Serif KR', serif; font-size: 12px; font-style: italic; fill: #5e548e; }
    .formula { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #5e548e; }
    .ink { stroke: #1a1612; }
    .ink-fill { fill: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .hum { fill: #5e548e; }
    .hum-st { stroke: #5e548e; }
    .hum-bg { fill: rgba(94,84,142,0.08); }
    .hum-bg2 { fill: rgba(94,84,142,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- Step 1: 도입 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="80" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">"기적을 봤다"는 증언, 우리는 어떻게 따져야 할까?</text>
    <text x="60" y="86" class="lbl-sm">"죽은 사람이 살아났다", "바위가 떠다녔다" — 어떤 사건을 비로소 '기적'이라 부를 수 있는가?</text>
  </g>

  <!-- Step 2: 기적의 정의 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="130" width="1120" height="170" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="158" class="lbl-strong" fill="#5e548e">기적이란 무엇인가? — 일어나기 어려운 일 ≠ 기적</text>

    <!-- 3단 분류 -->
    <g transform="translate(60, 178)">
      <!-- 1) 일어나기 어렵지만 자연법칙 안 -->
      <rect x="0" y="0" width="340" height="106" rx="4" class="paper rule" stroke-width="1"/>
      <rect x="0" y="0" width="340" height="22" rx="4" class="paper2"/>
      <text x="14" y="16" class="lbl-strong">① 어렵지만 자연법칙 안</text>
      <text x="14" y="48" class="lbl-sm">예: 명량 대첩 (13척 vs 133척)</text>
      <text x="14" y="68" class="lbl-sm">→ 일어나기 매우 어려운 일</text>
      <text x="14" y="92" class="lbl-xs" fill="#a83a4a" font-weight="700">기적이 아님</text>

      <!-- 2) 알려진 법칙으로는 설명 X, 미래에 설명됨 -->
      <rect x="360" y="0" width="340" height="106" rx="4" class="paper rule" stroke-width="1"/>
      <rect x="360" y="0" width="340" height="22" rx="4" class="paper2"/>
      <text x="374" y="16" class="lbl-strong">② 당시 미설명, 후에 과학으로 설명</text>
      <text x="374" y="48" class="lbl-sm">예: 어두운 곳에서 감광판이 노출됨</text>
      <text x="374" y="68" class="lbl-sm">→ 후에 방사능 과학으로 설명</text>
      <text x="374" y="92" class="lbl-xs" fill="#a83a4a" font-weight="700">기적이 아님</text>

      <!-- 3) 자연법칙으로 절대 일어날 수 없음 -->
      <rect x="720" y="0" width="340" height="106" rx="4" class="hum-bg2 hum-st" stroke-width="1.4"/>
      <rect x="720" y="0" width="340" height="22" rx="4" fill="#5e548e"/>
      <text x="734" y="16" class="lbl-strong" fill="#f5f1e8">③ 초자연적 사건</text>
      <text x="734" y="48" class="lbl-sm">자연법칙으로는 실제로 일어날 수 없음</text>
      <text x="734" y="68" class="lbl-sm">예: 죽은 사람이 살아남, 공중 부양</text>
      <text x="734" y="92" class="lbl-xs" fill="#5e548e" font-weight="700">→ 비로소 '기적'</text>
    </g>
  </g>

  <!-- Step 3: 흄의 확률 논증 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="320" width="1120" height="290" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="348" class="lbl-head">흄의 확률 논증 — 두 가설을 저울에 올린다</text>
    <text x="60" y="368" class="lbl-sm">"공중에 떠 있는 사람을 봤다"는 증언. 두 가설 중 어느 쪽이 더 그럴듯한가?</text>

    <!-- 저울 -->
    <g transform="translate(600, 470)">
      <!-- 기둥 + 가로대 (오른쪽이 무거워서 기울어짐) -->
      <line x1="0" y1="-90" x2="0" y2="40" class="ink" stroke-width="2"/>
      <polygon points="-20,40 20,40 0,72" class="ink" fill="#1a1612"/>
      <rect x="-60" y="72" width="120" height="6" class="ink" fill="#1a1612"/>
      <line x1="-220" y1="-60" x2="220" y2="-100" class="ink" stroke-width="2"/>

      <!-- 왼쪽: 증언 거짓 가설 (낮은 위치 = 증거 더 큼 = 무거움) -->
      <line x1="-220" y1="-60" x2="-220" y2="-30" class="ink" stroke-width="1"/>
      <line x1="-260" y1="-30" x2="-180" y2="-30" class="ink" stroke-width="1"/>
      <rect x="-280" y="-30" width="120" height="80" rx="4" class="hum"/>
      <text x="-220" y="-12" text-anchor="middle" font-size="11" fill="#f5f1e8" font-weight="700">가설 ①</text>
      <text x="-220" y="6" text-anchor="middle" font-size="10" fill="#f5f1e8">증언자의</text>
      <text x="-220" y="22" text-anchor="middle" font-size="10" fill="#f5f1e8">거짓·착각·속임</text>
      <text x="-220" y="44" text-anchor="middle" font-size="9" fill="#f5f1e8" opacity="0.85">→ 매우 흔한 일</text>

      <!-- 오른쪽: 기적 가설 (높은 위치 = 증거 약함 = 가벼움) -->
      <line x1="220" y1="-100" x2="220" y2="-130" class="ink" stroke-width="1"/>
      <line x1="180" y1="-130" x2="260" y2="-130" class="ink" stroke-width="1"/>
      <rect x="160" y="-130" width="120" height="50" rx="4" fill="#a83a4a" opacity="0.85"/>
      <text x="220" y="-110" text-anchor="middle" font-size="11" fill="#f5f1e8" font-weight="700">가설 ②</text>
      <text x="220" y="-94" text-anchor="middle" font-size="10" fill="#f5f1e8">기적이 실제 일어남</text>
      <text x="220" y="-66" text-anchor="middle" font-size="9" fill="#a83a4a" font-weight="700">→ 자연법칙에 어긋남</text>
    </g>

    <!-- 좌측 설명 -->
    <g transform="translate(60, 388)">
      <text x="0" y="0" class="lbl-strong">증거의 무게</text>
      <text x="0" y="22" class="lbl-sm">· 사람들이 거짓말을 한다는 강력한 증거</text>
      <text x="0" y="40" class="lbl-sm">· 우리를 속이는 메커니즘이 매우 많음</text>
      <text x="0" y="58" class="lbl-sm">· 세계가 자연법칙에 지배된다는 매우 강한 증거</text>
      <text x="0" y="84" class="lbl-strong" fill="#5e548e">→ 가설 ①의 증거가 압도적</text>
    </g>

    <!-- 우측: 부등식 -->
    <g transform="translate(900, 388)">
      <text x="0" y="0" class="lbl-strong" fill="#a83a4a">흄의 부등식</text>
      <rect x="0" y="14" width="240" height="60" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="120" y="40" text-anchor="middle" class="formula" fill="#a83a4a">P(증언 거짓) &lt; P(기적)</text>
      <text x="120" y="58" text-anchor="middle" class="lbl-xs">…여야만 증언을 믿을 수 있다</text>
      <text x="0" y="100" class="lbl-strong" fill="#a83a4a">결론</text>
      <text x="0" y="120" class="lbl-sm">이 부등식은 성립할 수 없다.</text>
      <text x="0" y="138" class="lbl-sm" fill="#a83a4a" font-weight="700">→ 기적의 증언은 믿을 수 없다.</text>
    </g>

    <text x="600" y="588" text-anchor="middle" class="quote">증언이 신뢰될 가능성은 자연법칙의 강력함을 결코 넘지 못한다</text>
  </g>

  <!-- Step 4: 프라이스의 반박과 한계 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="630" width="1120" height="200" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="658" class="lbl-head" fill="#5e548e">프라이스의 반박 — 복권 당첨 사례</text>

    <!-- 프라이스 주장 -->
    <g transform="translate(60, 678)">
      <rect x="0" y="0" width="540" height="138" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">반박 주장</text>
      <text x="14" y="44" class="lbl-sm">"내가 천만분의 1 복권에 당첨됐다는 신문 보도"</text>
      <text x="14" y="62" class="quote">P(신문 거짓) &lt; P(복권 당첨 = 1/10⁷) — 어렵다</text>
      <text x="14" y="84" class="lbl-sm">신문 보도가 거짓일 가능성이 천만분의 1보다 작지는 않을 것이다.</text>
      <text x="14" y="106" class="lbl-sm">하지만 우리는 신문을 보면 당첨을 믿는다.</text>
      <text x="14" y="128" class="lbl-xs" fill="#5e548e" font-weight="700">→ 흄의 부등식은 잘못된 게 아닌가?</text>
    </g>

    <!-- 화살표 -->
    <line x1="610" y1="747" x2="660" y2="747" stroke="#a83a4a" stroke-width="1.6" marker-end="url(#ar23-acc)"/>

    <!-- 재반박 -->
    <g transform="translate(680, 678)">
      <rect x="0" y="0" width="460" height="138" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">결정적 문제 — 두 사건은 종류가 다르다</text>
      <text x="14" y="44" class="lbl-sm"><tspan font-weight="700">복권 당첨</tspan> = 자연법칙 안에서 실제로 일어남</text>
      <text x="14" y="62" class="lbl-sm">  → 확률은 낮아도 0이 아님 (1/10⁷)</text>
      <text x="14" y="84" class="lbl-sm"><tspan font-weight="700" fill="#a83a4a">기적</tspan> = 자연법칙에 어긋남</text>
      <text x="14" y="102" class="lbl-sm">  → 발생 확률이 사실상 <tspan font-weight="700">0</tspan></text>
      <text x="14" y="126" class="lbl-xs" fill="#a83a4a" font-weight="700">⇒ 비교 자체가 잘못. 흄의 부등식은 그대로 살아남음</text>
    </g>
  </g>

  <!-- Step 5: 종교의 토대 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="850" width="1120" height="68" rx="6" class="hum-bg2 hum-st" stroke-width="1.4"/>
    <text x="60" y="878" class="lbl-strong" fill="#5e548e">기적과 종교의 관계 — 흄의 진의</text>
    <text x="60" y="900" class="quote">"가장 성스러운 종교는 이성이 아니라 신앙에 기초하고 있다."</text>
    <text x="540" y="900" class="lbl-sm">→ 종교를 부정하려는 것이 아니라, 기적의 증언이 이성적 검증의 영역이 아님을 강조</text>
  </g>

  <text x="1160" y="932" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 인문·예술 · 93쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="940" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="940" width="1120" height="32" rx="6" fill="#5e548e"/>
    <text x="60" y="962" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="962" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="974" x2="1160" y2="974" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="990" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">기적의 정의</text>
    <text x="240" y="990" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">단지 일어나기 힘든 사건이 아니라, 자연법칙으로는 실제로 일어날 수 없는 초자연적 사건이다.</text>
    <line x1="40" y1="1004" x2="1160" y2="1004" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1020" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">두 가설</text>
    <text x="240" y="1020" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">기적 증언을 두고 ① 증언자가 거짓말이거나 속고 있음 vs ② 초자연적 사건이 실제로 일어남, 두 가설을 확률로 비교해야 한다.</text>
    <line x1="40" y1="1034" x2="1160" y2="1034" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1050" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">흄의 결론</text>
    <text x="240" y="1050" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">증언이 거짓일 가능성이 기적이 일어날 가능성보다 낮아야 증언을 믿을 수 있는데, 그 부등식은 성립할 수 없으므로 기적의 증언은 믿을 수 없다.</text>
    <line x1="40" y1="1064" x2="1160" y2="1064" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1080" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">프라이스의 반박</text>
    <text x="240" y="1080" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">복권 당첨 신문 보도 사례를 들어 흄의 논증을 비판했지만, 복권 당첨은 자연법칙 안에서 일어나는 일이라 자연법칙에 어긋나는 기적과 종류가 다르다.</text>
    <line x1="40" y1="1094" x2="1160" y2="1094" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1110" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">흄의 진의</text>
    <text x="240" y="1110" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">종교를 부정하려는 것이 아니라, 가장 성스러운 종교는 이성이 아니라 신앙에 기초한다는 점을 강조한 것.</text>
  </g>
</svg>
