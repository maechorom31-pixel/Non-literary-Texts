<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1220" role="img" aria-labelledby="t25 d25">
  <title id="t25">미끄러운 비탈길 논증</title>
  <desc id="d25">사소한 첫 발걸음이 끔찍한 결과로 미끄러져 내려간다는 미끄러운 비탈길 논증의 정의에서 출발해, 도미노 이론·알코올 의존증 같은 일상 사례, 안락사를 둘러싼 생명 의료 윤리 적용, 머리카락이 한 올씩 빠져도 대머리가 아니라는 식으로 미끄러지는 대머리 논증과의 비교, 비탈길 중간에 있을 수 있는 평평한 땅(통제 지점)이라는 반박, 그리고 공포심을 불러일으키는 수사법의 위험까지를 시각화한다.</desc>

  <defs>
    <marker id="ar25-acc" viewBox="0 0 1200 1220" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
    <marker id="ar25-hum" viewBox="0 0 1200 1220" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e548e"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .quote { font-family: 'Noto Serif KR', serif; font-size: 12px; font-style: italic; fill: #5e548e; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .hum { fill: #5e548e; }
    .hum-st { stroke: #5e548e; }
    .hum-bg { fill: rgba(94,84,142,0.08); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- Step 1 · 비탈길 정의 + 시각화 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="180" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="60" class="lbl-head" fill="#a83a4a">미끄러운 비탈길 논증 — 첫 발걸음의 위험</text>
    <text x="60" y="86" class="lbl-sm">사소한 첫 발걸음 → 연쇄 → 끔찍한 결과 → 따라서 처음부터 허용해서는 안 된다</text>

    <!-- 비탈길 일러스트 -->
    <g transform="translate(80, 100)">
      <!-- 비탈길 -->
      <path d="M 0 0 L 1040 100 L 1040 110 L 0 10 Z" fill="#a83a4a" opacity="0.35"/>
      <line x1="0" y1="0" x2="1040" y2="100" stroke="#a83a4a" stroke-width="1.4"/>

      <!-- 첫 발걸음 -->
      <circle cx="40" cy="3" r="8" class="acc"/>
      <text x="40" y="-10" text-anchor="middle" class="lbl-xs" font-weight="700">사소한 첫 걸음</text>

      <!-- 연쇄 -->
      <circle cx="280" cy="27" r="7" class="acc"/>
      <circle cx="520" cy="51" r="7" class="acc"/>
      <circle cx="760" cy="75" r="7" class="acc"/>
      <text x="520" y="42" text-anchor="middle" class="lbl-xs" fill="#a83a4a">연쇄적 미끄러짐</text>

      <!-- 끝점 -->
      <circle cx="1000" cy="96" r="14" fill="#a83a4a"/>
      <text x="1000" y="100" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">끔찍</text>
      <text x="1000" y="125" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">받아들이기 힘든 결과</text>
    </g>
  </g>

  <!-- Step 2 · 일상 사례 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="230" width="1120" height="160" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="258" class="lbl-head">일상 사례 — 우리에게 익숙한 논증</text>

    <!-- 도미노 이론 -->
    <g transform="translate(80, 290)">
      <rect x="0" y="0" width="500" height="76" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">도미노 이론 (아이젠하워 · 베트남 전쟁)</text>
      <!-- 도미노 -->
      <g transform="translate(280, 36)">
        <rect x="0" y="0" width="10" height="30" class="acc" transform="rotate(-15 5 30)"/>
        <rect x="20" y="0" width="10" height="30" class="acc" opacity="0.85"/>
        <rect x="40" y="0" width="10" height="30" class="acc" opacity="0.7"/>
        <rect x="60" y="0" width="10" height="30" class="acc" opacity="0.55"/>
        <rect x="80" y="0" width="10" height="30" class="acc" opacity="0.4"/>
      </g>
      <text x="14" y="44" class="lbl-xs">베트남 공산화 → 캄보디아 → 라오스로 연쇄</text>
      <text x="14" y="62" class="lbl-xs" fill="#a83a4a">→ 첫 도미노를 무너뜨리지 마라</text>
    </g>

    <!-- 알코올 의존증 -->
    <g transform="translate(620, 290)">
      <rect x="0" y="0" width="500" height="76" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">알코올 의존증</text>
      <text x="14" y="44" class="lbl-sm">"한 잔 정도야"</text>
      <text x="180" y="44" class="lbl-sm" fill="#a83a4a">→ 두 잔 → 만취 → 의존</text>
      <text x="14" y="62" class="lbl-xs" fill="#a83a4a">→ 술을 아예 입에 대게 해서는 안 된다</text>
    </g>
  </g>

  <!-- Step 3 · 안락사 적용 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="410" width="1120" height="140" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="438" class="lbl-head" fill="#a83a4a">생명 의료 윤리 적용 — 안락사 반대 논증</text>

    <g transform="translate(80, 466)">
      <rect x="0" y="0" width="160" height="60" rx="4" class="paper2 acc-st" stroke-width="1.4"/>
      <text x="80" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">안락사 허용</text>
      <text x="80" y="42" text-anchor="middle" class="lbl-xs">중증 환자 편안한 죽음</text>

      <line x1="164" y1="30" x2="200" y2="30" class="acc-st" stroke-width="1.6" marker-end="url(#ar25-acc)"/>

      <rect x="204" y="0" width="220" height="60" rx="4" class="paper2 acc-st" stroke-width="1.4"/>
      <text x="314" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">치료 가능 환자도 안락사</text>
      <text x="314" y="42" text-anchor="middle" class="lbl-xs">"무의미하다" 자의적 판단</text>

      <line x1="428" y1="30" x2="464" y2="30" class="acc-st" stroke-width="1.6" marker-end="url(#ar25-acc)"/>

      <rect x="468" y="0" width="280" height="60" rx="4" fill="#a83a4a"/>
      <text x="608" y="22" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#f5f1e8">히틀러 시대 식 안락사</text>
      <text x="608" y="42" text-anchor="middle" class="lbl-xs" fill="#f5f1e8">장애인·정치범 살해</text>

      <text x="780" y="36" class="lbl-sm" fill="#a83a4a" font-weight="700">→ 첫 발걸음 자체를 막자</text>
    </g>
  </g>

  <!-- Step 4 · 대머리 논증 비교 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="570" width="1120" height="180" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="598" class="lbl-head">대머리 논증 — 같은 미끄러짐의 오류</text>

    <g transform="translate(80, 620)">
      <text x="0" y="0" class="lbl-strong">머리카락 한 올씩 빠지면…</text>

      <!-- 머리 단계 -->
      <g transform="translate(0, 16)">
        <!-- 풍성 -->
        <g transform="translate(40, 40)">
          <ellipse rx="22" ry="20" fill="#1a1612"/>
          <ellipse cy="6" rx="22" ry="20" fill="#ebe5d4"/>
          <text y="56" text-anchor="middle" class="lbl-xs">풍성</text>
        </g>
        <text x="100" y="44" class="lbl-xs">→</text>
        <g transform="translate(160, 40)">
          <ellipse rx="22" ry="20" fill="#1a1612" opacity="0.85"/>
          <ellipse cy="6" rx="22" ry="20" fill="#ebe5d4"/>
          <text y="56" text-anchor="middle" class="lbl-xs">한 올↓</text>
        </g>
        <text x="220" y="44" class="lbl-xs">→</text>
        <g transform="translate(280, 40)">
          <ellipse rx="22" ry="20" fill="#1a1612" opacity="0.6"/>
          <ellipse cy="6" rx="22" ry="20" fill="#ebe5d4"/>
          <text y="56" text-anchor="middle" class="lbl-xs">한 올↓</text>
        </g>
        <text x="340" y="44" class="lbl-xs">→</text>
        <g transform="translate(400, 40)">
          <ellipse rx="22" ry="20" fill="#1a1612" opacity="0.3"/>
          <ellipse cy="6" rx="22" ry="20" fill="#ebe5d4"/>
          <text y="56" text-anchor="middle" class="lbl-xs">한 올↓</text>
        </g>
        <text x="460" y="44" class="lbl-xs">→</text>
        <!-- 대머리 -->
        <g transform="translate(520, 40)">
          <ellipse rx="22" ry="20" fill="#ebe5d4" stroke="#1a1612" stroke-width="1"/>
          <text y="56" text-anchor="middle" class="lbl-xs" fill="#a83a4a">대머리</text>
        </g>
      </g>

      <!-- 결론 박스 -->
      <rect x="600" y="20" width="460" height="76" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="614" y="42" class="lbl-strong" fill="#a83a4a">대머리 논증 = 오류</text>
      <text x="614" y="62" class="lbl-sm">"한 올 빠진다고 대머리 아니다"를 무한 반복</text>
      <text x="614" y="80" class="lbl-sm">→ 한 올만 있어도 대머리가 아니라는 불합리한 결론</text>
      <text x="614" y="100" class="lbl-xs" fill="#a83a4a" font-weight="700">⇒ 미끄러운 비탈길 논증도 같은 구조의 오류일 수 있다</text>
    </g>
  </g>

  <!-- Step 5 · 평평한 땅 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="770" width="1120" height="160" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="798" class="lbl-head" fill="#5e548e">반박 — 비탈길에 평평한 땅이 있을 수 있다</text>

    <g transform="translate(80, 830)">
      <!-- 비탈길 + 평평한 땅 -->
      <path d="M 0 60 L 200 80 L 400 80 L 600 100 L 800 100 L 1000 120" fill="none" class="hum-st" stroke-width="2"/>
      <!-- 평평 영역 강조 -->
      <rect x="200" y="74" width="200" height="12" fill="#5e548e" opacity="0.25"/>
      <rect x="600" y="94" width="200" height="12" fill="#5e548e" opacity="0.25"/>
      <text x="300" y="68" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">평평한 땅 (통제 지점)</text>
      <text x="700" y="88" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">평평한 땅</text>

      <!-- 안락사 반박 -->
      <text x="0" y="40" class="lbl-strong" fill="#5e548e">안락사 반박 사례</text>
      <text x="200" y="40" class="lbl-xs">환자 본인 + 가족 + 의료 전문가의 동의 → 통제 가능</text>
      <text x="200" y="56" class="lbl-xs">민주 사회 = 위장 안락사 못 일어남 → 미끄러짐 X</text>
    </g>
  </g>

  <!-- Step 6 · 수사법 위험 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="950" width="1120" height="40" rx="6" class="paper2 ink" stroke-width="1"/>
    <text x="60" y="976" class="lbl-sm"><tspan font-weight="700" fill="#a83a4a">수사법으로서의 위험</tspan>: 미끄러짐이 불가피하지 않은데도 그것이 불가피한 것처럼 공포심을 불러일으키는 도구로 쓰일 수 있다</text>
  </g>

  <text x="1160" y="990" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 인문·예술 · 100쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1000" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1000" width="1120" height="32" rx="6" fill="#5e548e"/>
    <text x="60" y="1022" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1022" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#ffffff">6개 항목</text>
    <line x1="40" y1="1034" x2="1160" y2="1034" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1050" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">미끄러운 비탈길 논증</text>
    <text x="240" y="1050" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">사소한 첫 발걸음을 허용하면 연쇄적으로 끔찍한 결과에 이르므로 처음부터 허용해서는 안 된다는 논증.</text>
    <line x1="40" y1="1064" x2="1160" y2="1064" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1080" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">일상 사례</text>
    <text x="240" y="1080" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">도미노 이론(베트남 공산화 → 주변국 공산화), 알코올 의존증 환자의 한 잔 → 만취 등.</text>
    <line x1="40" y1="1094" x2="1160" y2="1094" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1110" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">생명 의료 윤리 적용</text>
    <text x="240" y="1110" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">안락사 허용 → 치료 가능 환자 안락사 → 장애인·정치범 안락사로 미끄러질 우려에서 안락사를 반대.</text>
    <line x1="40" y1="1124" x2="1160" y2="1124" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1140" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">대머리 논증과의 비교</text>
    <text x="240" y="1140" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">연속되는 선에서 단절점을 찾을 수 없다는 점에 의지하지만, 그렇다고 양 끝(머리카락 풍성 ↔ 완전 대머리)을 같다고 볼 수는 없다.</text>
    <line x1="40" y1="1154" x2="1160" y2="1154" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1170" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">평평한 땅의 가능성</text>
    <text x="240" y="1170" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">비탈길 중간에 더 미끄러지지 않게 하는 평평한 땅이나 통제 지점이 있을 수 있고, 이를 해명하지 않으면 그 논증은 오류이다.</text>
  </g>
</svg>
