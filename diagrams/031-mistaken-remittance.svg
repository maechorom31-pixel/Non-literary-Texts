<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" data-app="" role="img" aria-labelledby="t031 d031">
  <title id="t031">착오 송금 — 발견·반환·법적 보호의 흐름</title>
  <desc id="d031">착오 송금의 정의·발견 후 처리, 민법 제741조 부당 이득 반환, 선의·악의 구분, 은행의 책임 한계, 예금 보험 공사 지원, 세 축 균형을 인물·계좌·법조문 도식으로 시각화.</desc>
  <defs>
    <style>
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0;transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1;transform:translateY(0)}
      .bg{fill:#f5f1e8}
      .panel{fill:#fff;stroke:#c9bfa8;stroke-width:1.2}
      .ti{font:700 26px 'Noto Serif KR',serif;fill:#1a1612}
      .head{font:700 18px 'Noto Serif KR',serif;fill:#1a1612}
      .lab{font:600 15px 'Pretendard',sans-serif;fill:#1a1612}
      .lab-sm{font:400 13px 'Pretendard',sans-serif;fill:#4a3f33}
      .lab-xs{font:400 11px 'Pretendard',sans-serif;fill:#7a6f5f}
      .num{font:700 20px 'Pretendard',sans-serif;fill:#2a6f6f}
      .pill{font:600 13px 'Pretendard',sans-serif;fill:#fff}
      .it-r{font:400 13px 'Pretendard',sans-serif;fill:#a83a4a}
      .it-s{font:400 13px 'Pretendard',sans-serif;fill:#2a6f6f}
      .quote{font:600 13px 'Noto Serif KR',serif;font-style:italic;fill:#2a6f6f}
      .figLab{font:600 12px 'Pretendard',sans-serif;fill:#1a1612}
      .wm{font:400 12px 'Pretendard',sans-serif;fill:#7a6f5f;letter-spacing:.04em}
    </style>
    <marker id="ar31" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
    <marker id="ar31-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
    <symbol id="phone31" viewBox="0 0 24 36">
      <rect x="2" y="2" width="20" height="32" rx="3" fill="#2a6f6f" stroke="#1a1612" stroke-width="1"/>
      <rect x="4" y="6" width="16" height="22" rx="1" fill="#dff0ec"/>
      <circle cx="12" cy="32" r="1.4" fill="#dff0ec"/>
      <text x="12" y="20" font-size="10" font-weight="700" fill="#a83a4a" text-anchor="middle">$</text>
    </symbol>
    <symbol id="bank31" viewBox="0 0 48 36">
      <path d="M2 12 L24 4 L46 12" fill="none" stroke="#2a6f6f" stroke-width="1.4"/>
      <rect x="2" y="12" width="44" height="2" fill="#2a6f6f"/>
      <rect x="6" y="14" width="3" height="18" fill="#2a6f6f"/>
      <rect x="14" y="14" width="3" height="18" fill="#2a6f6f"/>
      <rect x="22" y="14" width="3" height="18" fill="#2a6f6f"/>
      <rect x="30" y="14" width="3" height="18" fill="#2a6f6f"/>
      <rect x="38" y="14" width="3" height="18" fill="#2a6f6f"/>
      <rect x="2" y="32" width="44" height="2" fill="#2a6f6f"/>
    </symbol>
    <symbol id="person31" viewBox="0 0 28 36">
      <circle cx="14" cy="9" r="6" fill="#ebe5d4" stroke="#7a6f5f"/>
      <path d="M3 34 Q3 19 14 19 Q25 19 25 34 Z" fill="#ebe5d4" stroke="#7a6f5f"/>
    </symbol>
    <symbol id="coin31" viewBox="0 0 18 18">
      <circle cx="9" cy="9" r="8" fill="#e0a020" stroke="#7a6f5f"/>
      <text x="9" y="13" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1612">$</text>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1100"/>

  <rect x="40" y="36" width="1120" height="62" rx="10" fill="#2a6f6f"/>
  <text x="64" y="76" class="ti" fill="#fff">착오 송금 — 발견·반환·법적 보호의 흐름</text>
  <text x="1136" y="76" class="lab-sm" fill="#cfe5e1" text-anchor="end">사회·문화 · 절차</text>

  <!-- Scene 1: 정의 + 시각 도식 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="134" class="num">1</text>
    <text x="92" y="134" class="head">착오 송금이란?</text>

    <rect class="panel" x="64" y="152" width="1072" height="120" rx="10"/>
    <rect x="64" y="152" width="6" height="120" fill="#2a6f6f"/>

    <!-- 시각 도식: 송금인이 잘못된 계좌로 -->
    <g transform="translate(96,170)">
      <use href="#phone31" x="0" y="20" width="32" height="46"/>
      <use href="#person31" x="32" y="24" width="22" height="32"/>
      <text x="22" y="80" class="figLab" text-anchor="middle">송금인</text>

      <line x1="60" y1="40" x2="100" y2="40" stroke="#a83a4a" stroke-width="2.4" stroke-dasharray="4 3" marker-end="url(#ar31-r)"/>
      <use href="#coin31" x="76" y="32" width="14" height="14"/>
      <text x="80" y="20" class="lab-xs" fill="#a83a4a" text-anchor="middle">의도 ✗</text>

      <use href="#person31" x="108" y="24" width="22" height="32"/>
      <text x="120" y="80" class="figLab" text-anchor="middle" fill="#a83a4a">엉뚱한 수취인</text>

      <text x="180" y="32" class="lab">송금인이 의도하지 않은 계좌·금액으로 송금</text>
      <text x="180" y="56" class="lab-sm">디지털 금융 발달 → 몇 번의 터치로 송금 → 실수 빈번</text>
      <text x="180" y="78" class="it-s">잘못 보낸 돈은 어떻게 돌려받나?</text>
    </g>
  </g>

  <!-- Scene 2: 발견 후 처리 흐름도 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="316" class="num">2</text>
    <text x="92" y="316" class="head">발견 후 처리 — 흐름도</text>

    <rect class="panel" x="64" y="334" width="1072" height="160" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>

    <g transform="translate(84,358)">
      <rect width="180" height="60" rx="8" fill="#2a6f6f"/>
      <use href="#person31" x="14" y="14" width="22" height="32"/>
      <text x="110" y="32" class="pill" text-anchor="middle">송금인</text>
      <text x="110" y="52" class="lab-xs" fill="#cfe5e1" text-anchor="middle">즉시 신고</text>

      <line x1="188" y1="30" x2="226" y2="30" stroke="#2a6f6f" stroke-width="2" marker-end="url(#ar31)"/>

      <rect x="234" y="0" width="180" height="60" rx="8" fill="#2a6f6f"/>
      <use href="#bank31" x="244" y="12" width="40" height="36"/>
      <text x="334" y="32" class="pill" text-anchor="middle">은행 (중개)</text>
      <text x="334" y="52" class="lab-xs" fill="#cfe5e1" text-anchor="middle">수취인에 연락</text>

      <line x1="422" y1="30" x2="460" y2="30" stroke="#2a6f6f" stroke-width="2" marker-end="url(#ar31)"/>

      <rect x="468" y="0" width="180" height="60" rx="8" fill="#2a6f6f"/>
      <use href="#person31" x="482" y="14" width="22" height="32"/>
      <text x="558" y="32" class="pill" text-anchor="middle">수취인</text>
      <text x="558" y="52" class="lab-xs" fill="#cfe5e1" text-anchor="middle">반환 요청</text>

      <!-- 분기 -->
      <line x1="656" y1="30" x2="694" y2="30" stroke="#7a6f5f" stroke-width="2" stroke-dasharray="4 3"/>

      <rect x="702" y="-12" width="320" height="34" rx="6" fill="#fff" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="862" y="10" class="lab-sm" fill="#2a6f6f" text-anchor="middle">동의 → 간단 환급 (신속 종결)</text>

      <rect x="702" y="38" width="320" height="34" rx="6" fill="#fbf2f4" stroke="#a83a4a" stroke-width="1.2"/>
      <text x="862" y="60" class="lab-sm" fill="#a83a4a" text-anchor="middle">거부/연락 두절 → 법적 절차로</text>

      <text x="380" y="100" class="it-s" text-anchor="middle">자발적 반환을 우선 시도</text>
    </g>
  </g>

  <!-- Scene 3: 부당 이득 반환 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="538" class="num">3</text>
    <text x="92" y="538" class="head">민법 제741조 — 부당 이득 반환 청구</text>

    <rect class="panel" x="64" y="556" width="1072" height="106" rx="10"/>

    <!-- 법조문 시각 -->
    <g transform="translate(84,576)">
      <rect width="40" height="60" rx="3" fill="#fff" stroke="#7a6f5f"/>
      <text x="20" y="14" class="lab-xs" text-anchor="middle">민법</text>
      <text x="20" y="32" class="lab-xs" text-anchor="middle">§741</text>
      <line x1="6" y1="38" x2="34" y2="38" stroke="#7a6f5f" stroke-width="0.6"/>
      <line x1="6" y1="44" x2="34" y2="44" stroke="#7a6f5f" stroke-width="0.6"/>
      <line x1="6" y1="50" x2="34" y2="50" stroke="#7a6f5f" stroke-width="0.6"/>

      <text x="56" y="20" class="quote">“법률상 원인 없이 타인의 재산·노무로 이익을 얻고</text>
      <text x="56" y="40" class="quote">손해를 가한 자는 그 이익을 반환하여야 한다.”</text>
      <text x="56" y="68" class="lab-sm" fill="#2a6f6f" font-weight="700">→ 수취인의 입금액 = 법률상 원인 없는 이익 → 반환 의무 발생</text>
    </g>
  </g>

  <!-- Scene 4: 선의 vs 악의 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="700" class="num">4</text>
    <text x="92" y="700" class="head">핵심 쟁점 — 수취인의 선의 vs 악의</text>

    <g>
      <rect x="64" y="718" width="528" height="110" rx="10" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.4"/>
      <use href="#person31" x="84" y="734" width="28" height="36"/>
      <text x="98" y="784" class="lab-xs" text-anchor="middle">선의 수취인</text>

      <text x="124" y="746" class="lab" fill="#2a6f6f">선의 (善意) — 몰랐다</text>
      <text x="124" y="768" class="lab-sm">착오 송금임을 인지 못 한 상태</text>
      <text x="124" y="788" class="lab-sm">예: 갑작스레 입금 → 자기 수입으로 오해</text>
      <text x="124" y="812" class="it-s">→ 민사적 반환 의무만 (형사 처벌 ✗)</text>

      <rect x="608" y="718" width="528" height="110" rx="10" fill="#fbf2f4" stroke="#a83a4a" stroke-width="1.4"/>
      <use href="#person31" x="628" y="734" width="28" height="36"/>
      <text x="642" y="784" class="lab-xs" fill="#a83a4a" text-anchor="middle">악의 수취인</text>

      <text x="668" y="746" class="lab" fill="#a83a4a">악의 (惡意) — 알고도 거부</text>
      <text x="668" y="768" class="lab-sm">착오 송금임을 알면서 반환 거부 또는 사용</text>
      <text x="668" y="788" class="lab-sm">예: 연락받았으나 응답 회피 + 인출·소비</text>
      <text x="668" y="812" class="it-r">→ 횡령죄 성립 가능 (형사 처벌)</text>
    </g>
  </g>

  <!-- Scene 5+6: 은행 책임 + 예보 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="858" class="num">5</text>
    <text x="92" y="858" class="head">은행의 책임 한계</text>

    <rect class="panel" x="64" y="876" width="528" height="120" rx="10"/>
    <use href="#bank31" x="84" y="894" width="40" height="32"/>
    <text x="84" y="950" class="lab-sm">송금 행위의 ‘통로 역할’만 수행</text>
    <text x="84" y="970" class="lab-sm">실질적 발생 주체는 송금인 (실수가 원인)</text>
    <text x="84" y="990" class="it-r">→ 은행은 법적 책임 ✗ (안내는 보조적)</text>
  </g>

  <g class="reveal" data-reveal-step="6">
    <text x="608" y="858" class="num">6</text>
    <text x="636" y="858" class="head">제도적 보완 — 예금 보험 공사</text>

    <rect class="panel" x="608" y="876" width="528" height="120" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
    <text x="628" y="900" class="lab" fill="#2a6f6f">착오 송금 반환 지원 제도</text>
    <line x1="628" y1="912" x2="1116" y2="912" stroke="#bfd9d3"/>
    <text x="628" y="936" class="lab-sm">송금인 → 부당 이득 반환 청구권 → 예보 매입</text>
    <text x="628" y="956" class="lab-sm">→ 공사가 직접 회수 → 송금인에게 반환</text>
    <text x="628" y="982" class="it-s">개인 부담 ↓ + 회수 절차 간편화</text>
  </g>

  <!-- Scene 7: 세 축 -->
  <g class="reveal" data-reveal-step="7">
    <text x="64" y="1026" class="num">7</text>
    <text x="92" y="1026" class="head">문제 해결의 세 축 — 균형</text>

    <g transform="translate(84,1042)">
      <rect width="338" height="42" rx="6" fill="#fff" stroke="#7a6f5f"/>
      <text x="169" y="20" class="lab" text-anchor="middle">① 개인의 주의 의무</text>
      <text x="169" y="36" class="lab-xs" text-anchor="middle">송금 전 계좌·금액 재확인</text>

      <rect x="358" y="0" width="338" height="42" rx="6" fill="#fbf2f4" stroke="#a83a4a"/>
      <text x="527" y="20" class="lab" text-anchor="middle" fill="#a83a4a">② 법적 보호 정교화</text>
      <text x="527" y="36" class="lab-xs" text-anchor="middle">선의·악의 판단 기준 명확화</text>

      <rect x="716" y="0" width="338" height="42" rx="6" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="885" y="20" class="lab" text-anchor="middle" fill="#2a6f6f">③ 제도적 지원 확대</text>
      <text x="885" y="36" class="lab-xs" text-anchor="middle">예보 회수 지원 등</text>
    </g>
  </g>

  <text x="1140" y="1090" class="wm" text-anchor="end">EBS 2027 · 사회·문화 · 127쪽</text>
</svg>
