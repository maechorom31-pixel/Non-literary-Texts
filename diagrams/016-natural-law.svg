<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1160" role="img" aria-labelledby="t16 d16">
  <title id="t16">자연법의 역사와 현대적 재구성</title>
  <desc id="d16">국가가 만든 실정법과 인간 본성·이성에 근거한 자연법의 관계에서 출발해, 고대 아리스토텔레스·스토아학파에서 로마법, 중세 아퀴나스의 영원법 일부로서의 자연법, 현대 마리탱의 내면적 질서로서의 자연법, 메스너의 사회적 실현 과제로서의 자연법까지의 흐름을 시간순으로 보여 주고, 마지막으로 마리탱(도덕적 성숙의 결과)과 메스너(제도적 구현 과제)의 차이를 좌우로 비교한다.</desc>

  <defs>
    <marker id="ar16-hum" viewBox="0 0 1200 1160" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e548e"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    svg[data-app] .reveal { opacity: 0; transform: translateY(6px); }
    svg[data-app] .reveal.on { opacity: 1; transform: translateY(0); }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .hum { fill: #5e548e; }
    .hum-st { stroke: #5e548e; }
    .hum-bg { fill: rgba(94,84,142,0.08); }
    .hum-bg2 { fill: rgba(94,84,142,0.18); }
  ]]></style>

  <!-- Step 1 · 실정법 vs 자연법 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="200" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">실정법과 자연법 — 두 기둥의 관계</text>

    <!-- 실정법 기둥 -->
    <g transform="translate(140, 90)">
      <rect x="0" y="0" width="200" height="120" rx="4" class="paper2 ink" stroke-width="1.4"/>
      <text x="100" y="28" text-anchor="middle" class="lbl-strong">실정법</text>
      <text x="100" y="50" text-anchor="middle" class="lbl-sm">국가가 제정·시행</text>
      <text x="100" y="68" text-anchor="middle" class="lbl-sm">강제력 + 명확한 절차</text>
      <text x="100" y="92" text-anchor="middle" class="lbl-xs">사회 질서 실현</text>
      <text x="100" y="108" text-anchor="middle" class="lbl-xs" fill="#a83a4a">but 도덕적 정당성은?</text>
    </g>

    <!-- 자연법 기둥 -->
    <g transform="translate(860, 90)">
      <rect x="0" y="0" width="200" height="120" rx="4" class="hum-bg2 hum-st" stroke-width="1.6"/>
      <text x="100" y="28" text-anchor="middle" class="lbl-strong" fill="#5e548e">자연법</text>
      <text x="100" y="50" text-anchor="middle" class="lbl-sm">인간 본성·이성에 근거</text>
      <text x="100" y="68" text-anchor="middle" class="lbl-sm">시대·사회 초월 보편 규범</text>
      <text x="100" y="92" text-anchor="middle" class="lbl-xs" fill="#5e548e">옳고 그름의 기준</text>
    </g>

    <!-- 화살표: 자연법 → 실정법 정당성 -->
    <line x1="855" y1="150" x2="345" y2="150" class="hum-st" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar16-hum)"/>
    <text x="600" y="138" text-anchor="middle" class="lbl-sm" fill="#5e548e" font-weight="700">정당성 판단의 궁극적 기준</text>
    <text x="600" y="172" text-anchor="middle" class="lbl-xs">실정법은 자연법 원리에 부합할 때 비로소 정당해진다</text>
  </g>

  <!-- Step 2 · 고대~중세 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="250" width="1120" height="160" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="278" class="lbl-head" fill="#5e548e">고대~중세 — 자연법의 철학적 기초</text>

    <!-- 시간선 -->
    <g transform="translate(80, 320)">
      <line x1="0" y1="30" x2="1040" y2="30" stroke="#7a6f5f" stroke-width="1"/>

      <g transform="translate(0, 0)">
        <circle cx="0" cy="30" r="6" class="hum"/>
        <text x="0" y="14" text-anchor="middle" class="lbl-xs" font-weight="700">아리스토텔레스</text>
        <text x="0" y="56" text-anchor="middle" class="lbl-xs">목적론적 본성</text>
        <text x="0" y="70" text-anchor="middle" class="lbl-xs">+ 공동선</text>
      </g>

      <g transform="translate(220, 0)">
        <circle cx="0" cy="30" r="6" class="hum"/>
        <text x="0" y="14" text-anchor="middle" class="lbl-xs" font-weight="700">스토아학파</text>
        <text x="0" y="56" text-anchor="middle" class="lbl-xs">자연의 이성적 질서</text>
        <text x="0" y="70" text-anchor="middle" class="lbl-xs">에 순응</text>
      </g>

      <g transform="translate(440, 0)">
        <circle cx="0" cy="30" r="6" class="hum"/>
        <text x="0" y="14" text-anchor="middle" class="lbl-xs" font-weight="700">로마법</text>
        <text x="0" y="56" text-anchor="middle" class="lbl-xs">자연법 = 법적</text>
        <text x="0" y="70" text-anchor="middle" class="lbl-xs">정당성의 기준</text>
      </g>

      <g transform="translate(680, 0)">
        <circle cx="0" cy="30" r="6" class="hum"/>
        <text x="0" y="14" text-anchor="middle" class="lbl-xs" font-weight="700">중세 · 기독교</text>
        <text x="0" y="56" text-anchor="middle" class="lbl-xs">신의 창조 질서 +</text>
        <text x="0" y="70" text-anchor="middle" class="lbl-xs">인간 이성의 조화</text>
      </g>

      <g transform="translate(940, 0)">
        <circle cx="0" cy="30" r="8" class="hum"/>
        <text x="0" y="14" text-anchor="middle" class="lbl-xs" font-weight="700">아퀴나스</text>
        <text x="0" y="56" text-anchor="middle" class="lbl-xs">자연법 = 영원법의 일부</text>
        <text x="0" y="70" text-anchor="middle" class="lbl-xs" fill="#5e548e">이성으로 인식 가능</text>
      </g>
    </g>
  </g>

  <!-- Step 3 · 마리탱 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="430" width="540" height="240" rx="6" class="hum-bg2 hum-st" stroke-width="1.5"/>
    <rect x="40" y="430" width="540" height="34" rx="6" class="hum"/>
    <text x="60" y="454" class="lbl-strong" fill="#f5f1e8">현대 ① 마리탱 — 내면적 질서로서의 자연법</text>

    <text x="60" y="488" class="lbl-strong">핵심</text>
    <text x="60" y="510" class="lbl-sm">자연법 = 인간 존재의 본질에 내재한 내면적 질서</text>
    <text x="60" y="528" class="lbl-sm">→ 외부 강제 X, 인간이 인간답게 살기 위해 스스로 따르는 원리</text>

    <text x="60" y="558" class="lbl-strong">인식 방법</text>
    <text x="60" y="580" class="lbl-sm">이성적 추론 이전의 <tspan font-weight="700" fill="#5e548e">직관적 인식</tspan></text>
    <text x="60" y="598" class="lbl-sm">단, 본능처럼 저절로 작동 ✗ → 지적 성찰·교육·문화 필요</text>

    <text x="60" y="628" class="lbl-strong">"존재하는 자연법 vs 인식된 자연법"의 구별</text>
    <text x="60" y="650" class="lbl-xs" fill="#5e548e" font-weight="700">→ 근대 인권 개념의 철학적 기초</text>
  </g>

  <!-- Step 4 · 메스너 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="620" y="430" width="540" height="240" rx="6" class="hum-bg2 hum-st" stroke-width="1.5"/>
    <rect x="620" y="430" width="540" height="34" rx="6" class="hum"/>
    <text x="640" y="454" class="lbl-strong" fill="#f5f1e8">현대 ② 메스너 — 사회적 실천과 제도</text>

    <text x="640" y="488" class="lbl-strong">핵심</text>
    <text x="640" y="510" class="lbl-sm">자연법 = 개인 양심을 넘어 사회 구조와 제도 속에서</text>
    <text x="640" y="528" class="lbl-sm">실현되어야 할 원리</text>

    <text x="640" y="558" class="lbl-strong">실존적 목적들</text>
    <g transform="translate(640, 568)">
      <rect x="0" y="0" width="120" height="22" rx="3" class="hum-bg hum-st" stroke-width="1"/>
      <text x="60" y="14" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">자기 보존·완성</text>
      <rect x="128" y="0" width="120" height="22" rx="3" class="hum-bg hum-st" stroke-width="1"/>
      <text x="188" y="14" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">자녀 출산·교육</text>
      <rect x="256" y="0" width="100" height="22" rx="3" class="hum-bg hum-st" stroke-width="1"/>
      <text x="306" y="14" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">타인 배려</text>
      <rect x="364" y="0" width="100" height="22" rx="3" class="hum-bg hum-st" stroke-width="1"/>
      <text x="414" y="14" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">공익 증진</text>
    </g>

    <text x="640" y="628" class="lbl-sm">예: 노동자 권리 보장 · 사회 약자 복지 정책</text>
    <text x="640" y="650" class="lbl-xs" fill="#5e548e" font-weight="700">→ 단순 선택 아님, 자연법의 요청</text>
  </g>

  <!-- Step 5 · 두 입장 비교 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="690" width="1120" height="200" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="718" class="lbl-head">두 입장 — 공통점과 차이</text>

    <!-- 공통점 -->
    <g transform="translate(60, 740)">
      <rect x="0" y="0" width="500" height="100" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">공통점</text>
      <text x="14" y="44" class="lbl-sm">· 자연법 = 인간 본성·이성에 근거한 보편적 질서</text>
      <text x="14" y="62" class="lbl-sm">· 사회 속에서 구현되어야 함</text>
      <text x="14" y="86" class="lbl-xs" fill="#5e548e" font-weight="700">→ 인간 존엄성 + 사회 정의를 동시에 고려</text>
    </g>

    <!-- 차이점 -->
    <g transform="translate(580, 740)">
      <rect x="0" y="0" width="540" height="100" rx="4" class="hum-bg hum-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#5e548e">차이점</text>
      <text x="14" y="44" class="lbl-sm"><tspan font-weight="700">마리탱</tspan>: 사회적 실현 = <tspan fill="#5e548e" font-weight="700">도덕적 성숙이 확산된 결과</tspan></text>
      <text x="14" y="64" class="lbl-sm"><tspan font-weight="700">메스너</tspan>: 사회적 실현 = <tspan fill="#5e548e" font-weight="700">공동체가 제도적으로 실현해야 할 과제</tspan></text>
      <text x="14" y="86" class="lbl-xs">개인의 도덕적 자율성 ↔ 사회적 연대</text>
    </g>
  </g>

  <text x="1160" y="930" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 인문·예술 · 62쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="940" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="940" width="1120" height="32" rx="6" fill="#5e548e"/>
    <text x="60" y="962" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="962" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="974" x2="1160" y2="974" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="990" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">실정법과 자연법</text>
    <text x="240" y="990" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">실정법은 국가가 제정한 사회 질서 규범, 자연법은 인간 본성·이성에 근거한 보편 규범이며, 자연법이 실정법의 정당성을 판단하는 기준이다.</text>
    <line x1="40" y1="1004" x2="1160" y2="1004" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1020" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">고대~중세 자연법</text>
    <text x="240" y="1020" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">스토아학파가 체계화하고 로마법에 영향. 중세 아퀴나스는 자연법을 신의 영원법의 일부로 보고 인간 이성을 통해 인식 가능하다고 했다.</text>
    <line x1="40" y1="1034" x2="1160" y2="1034" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1050" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">마리탱의 재해석</text>
    <text x="240" y="1050" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">자연법은 인간 존재의 본질에 내재한 내면적 질서. 직관적으로 인식되지만 교육과 도덕적 성숙을 통해 구현된다.</text>
    <line x1="40" y1="1064" x2="1160" y2="1064" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1080" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">메스너의 확장</text>
    <text x="240" y="1080" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">자연법은 개인 양심을 넘어 사회 구조와 제도 속에서 실존적 목적을 실현하는 원리여야 한다.</text>
    <line x1="40" y1="1094" x2="1160" y2="1094" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1110" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#5e548e">두 입장의 공통점과 차이</text>
    <text x="240" y="1110" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">공통: 자연법은 인간 본성·이성에 근거한 보편 규범이며 사회에서 구현되어야 한다. 차이: 마리탱은 도덕적 성숙의 결과, 메스너는 제도적 실현 과제로 본다.</text>
  </g>
</svg>
