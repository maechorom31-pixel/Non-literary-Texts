<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="t062 d062">
  <title id="t062">가상 메모리</title>
  <desc id="d062">컴퓨터의 두 기억 장치(큰 용량의 보조 기억 장치 vs 빠르지만 작은 주기억 장치)의 차이에서 출발해, 여러 프로세스를 동시 실행할 때 주기억 장치 용량의 한계를 보조 기억 장치 일부를 활용해 가상으로 확장하는 가상 메모리의 원리, 프로그램을 같은 크기의 페이지 단위로 분할하고 페이지 테이블에 매핑 정보를 기록해 페이지 프레임에 적재하는 페이징 방식, 필요한 페이지가 주기억 장치에 없을 때 발생하는 페이지 부재(폴트)와 그 처리, 그리고 페이지 프레임이 가득 찼을 때의 페이지 교체 알고리즘(FIFO·LRU·LFU)까지 시각화한다.</desc>

  <defs>
    <marker id="ar62-met" viewBox="0 0 1200 1200" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b6f47"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .mono { font-family: ui-monospace, monospace; font-size: 11px; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .met { fill: #8b6f47; }
    .met-st { stroke: #8b6f47; }
    .met-bg { fill: rgba(139,111,71,0.08); }
    .met-bg2 { fill: rgba(139,111,71,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- Step 1 · 두 기억 장치 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="200" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">컴퓨터의 두 기억 장치</text>

    <g transform="translate(80, 90)">
      <rect x="0" y="0" width="540" height="120" rx="4" class="paper2 ink" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong">보조 기억 장치 (HDD/SSD)</text>
      <text x="14" y="44" class="lbl-sm">상대적으로 큰 저장 용량</text>
      <text x="14" y="62" class="lbl-sm">프로그램·데이터 영구적 저장</text>
      <text x="14" y="86" class="lbl-xs">속도는 느리지만 용량 ↑</text>
      <!-- 큰 박스 -->
      <rect x="280" y="14" width="240" height="90" rx="4" class="paper rule" stroke-width="1"/>
      <text x="400" y="60" text-anchor="middle" class="lbl-xs" fill="#7a6f5f">큰 저장 공간</text>
    </g>

    <g transform="translate(640, 90)">
      <rect x="0" y="0" width="500" height="120" rx="4" class="met-bg met-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#8b6f47">주기억 장치 (RAM, 메모리)</text>
      <text x="14" y="44" class="lbl-sm">상대적으로 작은 저장 용량</text>
      <text x="14" y="62" class="lbl-sm">CPU가 직접 접근하는 빠른 영역</text>
      <text x="14" y="86" class="lbl-xs">속도 ↑·용량 ↓ → 일시적 머무름</text>
      <!-- 작은 박스 -->
      <rect x="280" y="20" width="160" height="80" rx="4" class="met"/>
      <text x="360" y="60" text-anchor="middle" class="lbl-xs" fill="#f5f1e8">작은 빠른 공간</text>
    </g>
  </g>

  <!-- Step 2 · 한계 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="250" width="1120" height="100" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="278" class="lbl-head" fill="#a83a4a">한계 — 여러 프로세스 동시 실행 시 주기억 장치 부족</text>
    <text x="60" y="304" class="lbl-sm">큰 프로그램·다중 작업 시 주기억 장치 한계 → 모두 적재 불가</text>
    <text x="60" y="328" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 가상 메모리 도입의 동기</text>
  </g>

  <!-- Step 3 · 가상 메모리 도입 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="370" width="1120" height="40" rx="6" class="met"/>
    <text x="60" y="396" class="lbl-strong" fill="#f5f1e8">가상 메모리 — 보조 기억 장치 일부를 메모리처럼</text>
  </g>

  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="420" width="1120" height="180" rx="6" class="met-bg met-st" stroke-width="1.5"/>
    <text x="60" y="448" class="lbl-strong" fill="#8b6f47">핵심 통찰</text>
    <text x="60" y="468" class="lbl-sm">CPU가 당장 실행하는 부분은 프로그램의 일부분일 뿐</text>
    <text x="60" y="488" class="lbl-sm">→ 당장 필요한 부분만 주기억 장치로, 나머지는 보조 기억 장치에</text>

    <g transform="translate(60, 510)">
      <rect x="0" y="0" width="500" height="70" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">페이징 (Paging)</text>
      <text x="14" y="42" class="lbl-xs">프로그램을 같은 크기의 작동 단위 = <tspan font-weight="700" fill="#8b6f47">페이지</tspan>로 분할</text>
      <text x="14" y="58" class="lbl-xs">페이지 단위로 주기억 장치에 적재</text>

      <rect x="540" y="0" width="500" height="70" rx="4" class="met-bg2 met-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#8b6f47" transform="translate(540,0)">페이지 프레임</text>
      <text x="14" y="42" class="lbl-xs" transform="translate(540,0)">주기억 장치에서 페이지를 올릴 자리</text>
      <text x="14" y="58" class="lbl-xs" transform="translate(540,0)">→ 가상 메모리를 실현하는 대표적 방법</text>
    </g>
  </g>

  <!-- Step 4-5 · 페이지 단위 + 매핑 시각화 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="620" width="1120" height="40" rx="6" class="met"/>
    <text x="60" y="646" class="lbl-strong" fill="#f5f1e8">페이지 단위 분할 + 페이지 테이블 매핑</text>
  </g>

  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="670" width="1120" height="180" rx="6" class="paper rule" stroke-width="1.2"/>

    <!-- 프로세스 A -->
    <g transform="translate(60, 700)">
      <text x="0" y="0" class="lbl-sm" font-weight="700">프로세스 A (5 페이지)</text>
      <g class="met">
        <rect x="0" y="10" width="40" height="30"/>
        <rect x="44" y="10" width="40" height="30"/>
        <rect x="88" y="10" width="40" height="30"/>
        <rect x="132" y="10" width="40" height="30"/>
        <rect x="176" y="10" width="40" height="30"/>
      </g>
      <g fill="#f5f1e8" font-family="ui-monospace, monospace" font-size="10" font-weight="700">
        <text x="20" y="30" text-anchor="middle">A0</text>
        <text x="64" y="30" text-anchor="middle">A1</text>
        <text x="108" y="30" text-anchor="middle">A2</text>
        <text x="152" y="30" text-anchor="middle">A3</text>
        <text x="196" y="30" text-anchor="middle">A4</text>
      </g>
    </g>

    <!-- 화살표 -->
    <text x="320" y="724" class="lbl-head" fill="#8b6f47">→</text>

    <!-- 주기억 장치 (페이지 프레임 7개) -->
    <g transform="translate(360, 700)">
      <text x="0" y="0" class="lbl-sm" font-weight="700">주기억 장치 (페이지 프레임 7개)</text>
      <g>
        <rect x="0" y="10" width="60" height="30" class="met"/>
        <rect x="64" y="10" width="60" height="30" class="met"/>
        <rect x="128" y="10" width="60" height="30" class="paper2" stroke="#1a1612" stroke-width="1"/>
        <rect x="192" y="10" width="60" height="30" class="acc"/>
        <rect x="256" y="10" width="60" height="30" class="acc"/>
        <rect x="320" y="10" width="60" height="30" class="acc"/>
        <rect x="384" y="10" width="60" height="30" class="paper2" stroke="#1a1612" stroke-width="1"/>
      </g>
      <g font-family="ui-monospace, monospace" font-size="10" font-weight="700">
        <text x="30" y="30" text-anchor="middle" fill="#f5f1e8">A0</text>
        <text x="94" y="30" text-anchor="middle" fill="#f5f1e8">A1</text>
        <text x="158" y="30" text-anchor="middle" fill="#7a6f5f">·</text>
        <text x="222" y="30" text-anchor="middle" fill="#f5f1e8">B0</text>
        <text x="286" y="30" text-anchor="middle" fill="#f5f1e8">B1</text>
        <text x="350" y="30" text-anchor="middle" fill="#f5f1e8">B2</text>
        <text x="414" y="30" text-anchor="middle" fill="#7a6f5f">·</text>
      </g>
      <text x="222" y="58" text-anchor="middle" class="lbl-xs">PF0   PF1   PF2   PF3   PF4   PF5   PF6</text>
    </g>

    <!-- 페이지 테이블 -->
    <g transform="translate(60, 770)">
      <text x="0" y="0" class="lbl-sm" font-weight="700">페이지 테이블 A</text>
      <g class="paper rule">
        <rect x="0" y="10" width="100" height="30" stroke-width="1"/>
        <rect x="0" y="42" width="100" height="30" stroke-width="1"/>
      </g>
      <g class="mono">
        <text x="14" y="30">A.0 → 0</text>
        <text x="14" y="62">A.1 → 100</text>
      </g>

      <text x="200" y="0" class="lbl-sm" font-weight="700">페이지 테이블 B</text>
      <g class="paper rule">
        <rect x="200" y="10" width="100" height="30" stroke-width="1"/>
        <rect x="200" y="42" width="100" height="30" stroke-width="1"/>
        <rect x="200" y="74" width="100" height="30" stroke-width="1"/>
      </g>
      <g class="mono">
        <text x="214" y="30">B.0 → 300</text>
        <text x="214" y="62">B.1 → 400</text>
        <text x="214" y="94">B.2 → 500</text>
      </g>

      <text x="380" y="40" class="lbl-xs">→ OS가 매핑을 기록해 둔다</text>
      <text x="380" y="58" class="lbl-xs">→ 가상 주소 ↔ 물리 주소 변환</text>
    </g>
  </g>

  <!-- Step 6 · 페이지 폴트 + 교체 -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="870" width="1120" height="80" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="898" class="lbl-strong" fill="#a83a4a">페이지 부재 (페이지 폴트)</text>
    <text x="60" y="920" class="lbl-sm">필요한 페이지가 주기억 장치에 없으면 → 보조 기억 장치에서 복사 → 페이지 프레임에 저장 → 접근</text>
    <text x="60" y="940" class="lbl-xs">교체 알고리즘: <tspan font-weight="700" fill="#8b6f47">FIFO</tspan>(가장 오래된 것) / <tspan font-weight="700" fill="#8b6f47">LRU</tspan>(가장 안 쓴 것) / <tspan font-weight="700" fill="#8b6f47">LFU</tspan>(가장 적게 쓴 것)</text>
  </g>

  <text x="1160" y="970" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 독서 방법 · 41쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="980" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="980" width="1120" height="32" rx="6" fill="#8b6f47"/>
    <text x="60" y="1002" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1002" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#ffffff">5개 항목</text>
    <line x1="40" y1="1014" x2="1160" y2="1014" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1030" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">두 기억 장치</text>
    <text x="240" y="1030" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">보조 기억 장치(큰 용량)와 주기억 장치(빠른 속도, 한정된 용량)의 차이.</text>
    <line x1="40" y1="1044" x2="1160" y2="1044" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1060" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">가상 메모리</text>
    <text x="240" y="1060" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">보조 기억 장치 일부를 주기억 장치처럼 활용해 큰 메모리를 사용하는 것처럼 만든다.</text>
    <line x1="40" y1="1074" x2="1160" y2="1074" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1090" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">페이지 단위 분할</text>
    <text x="240" y="1090" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">메모리를 일정 크기 페이지로 나누어 필요한 페이지만 주기억 장치에 적재한다.</text>
    <line x1="40" y1="1104" x2="1160" y2="1104" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1120" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">매핑 테이블과 MMU</text>
    <text x="240" y="1120" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">가상 주소와 물리 주소의 대응을 저장한 표를 MMU가 빠르게 변환한다.</text>
    <line x1="40" y1="1134" x2="1160" y2="1134" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1150" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">페이지 폴트</text>
    <text x="240" y="1150" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">필요한 페이지가 없으면 OS가 보조 기억 장치에서 가져와 적재한 뒤 작업을 재개한다.</text>
  </g>
</svg>
