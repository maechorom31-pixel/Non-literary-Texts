<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1240" data-app="" role="img" aria-labelledby="t37 d37">
  <title id="t37">중세의 청빈 논쟁 — 사용·소유 분리에서 근원적 자유까지</title>
  <desc id="d37">프란체스코 청빈 서약과 기부 모순에서 시작해 보나벤투라(사용·소유 분리), 보나그라티아(보충 논거), 오컴(근원적 자유)의 흐름을 시간축과 인물 도식으로 시각화.</desc>
  <defs>
    <style>
      .bg{fill:#f5f9f8}
      .panel{fill:#ffffff;stroke:#c4dcd5;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a6f6f}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#436963}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .axis{font:600 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a6f6f}
      .figLab{font:600 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d9994;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar37" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
    <symbol id="monk" viewBox="0 0 28 36">
      <circle cx="14" cy="9" r="6" fill="#dff0ec" stroke="#2a6f6f"/>
      <path d="M3 34 Q3 19 14 19 Q25 19 25 34 Z" fill="#dff0ec" stroke="#2a6f6f"/>
    </symbol>
    <symbol id="apple" viewBox="0 0 20 20">
      <circle cx="10" cy="12" r="7" fill="#a83a4a" stroke="#7a3a3a"/>
      <path d="M10 5 Q12 3 14 5" stroke="#3a6f3a" stroke-width="1.4" fill="none"/>
    </symbol>
    <symbol id="dove" viewBox="0 0 28 20">
      <path d="M2 14 Q12 4 26 10 Q22 16 14 16 Q8 18 2 14 Z" fill="#fff" stroke="#2a6f6f" stroke-width="1.2"/>
      <circle cx="22" cy="10" r="1.4" fill="#2a6f6f"/>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1240"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#2a6f6f"/>
  <text x="64" y="80" class="ti" fill="#ffffff">중세의 청빈 논쟁 — 사용·소유 분리에서 근원적 자유까지</text>
  <text x="1136" y="80" class="sub" fill="#cfe5e1" text-anchor="end">사회·문화 · 시간 순서</text>

  <!-- Scene 1: 프란체스코 청빈 + 시간축 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">출발 — 프란체스코의 청빈 서약 + 통시적 흐름</text>
    <text x="64" y="166" class="small">예수와 제자들을 본받아 헌금을 받지 말고 노동·탁발하라. 그러나 수도회는 외부 기부를 받기 시작.</text>

    <rect class="panel" x="64" y="184" width="1072" height="180" rx="10"/>
    <rect x="64" y="184" width="6" height="180" fill="#2a6f6f"/>

    <!-- 시간축 -->
    <line x1="120" y1="276" x2="1100" y2="276" stroke="#2a6f6f" stroke-width="2"/>
    <polygon points="1100,270 1116,276 1100,282" fill="#2a6f6f"/>
    <text x="1130" y="280" class="axis">시간</text>

    <!-- 13C 초 프란체스코 -->
    <line x1="200" y1="264" x2="200" y2="288" stroke="#2a6f6f" stroke-width="1.4"/>
    <circle cx="200" cy="276" r="6" fill="#2a6f6f"/>
    <text x="200" y="220" class="lab" text-anchor="middle">프란체스코</text>
    <text x="200" y="240" class="small" text-anchor="middle">청빈 서약</text>
    <text x="200" y="304" class="axis" text-anchor="middle">13C 초</text>
    <text x="200" y="322" class="small" text-anchor="middle">~1226 사망</text>

    <!-- 13C 후반 보나벤투라 -->
    <line x1="430" y1="264" x2="430" y2="288" stroke="#2a6f6f" stroke-width="1.4"/>
    <circle cx="430" cy="276" r="6" fill="#2a6f6f"/>
    <text x="430" y="220" class="lab" text-anchor="middle">보나벤투라</text>
    <text x="430" y="240" class="small" text-anchor="middle">사용 ≠ 소유</text>
    <text x="430" y="304" class="axis" text-anchor="middle">1257~74</text>
    <text x="430" y="322" class="small" text-anchor="middle">총장직</text>

    <!-- 14C 초 보나그라티아 -->
    <line x1="700" y1="264" x2="700" y2="288" stroke="#2a6f6f" stroke-width="1.4"/>
    <circle cx="700" cy="276" r="6" fill="#2a6f6f"/>
    <text x="700" y="220" class="lab" text-anchor="middle">보나그라티아</text>
    <text x="700" y="240" class="small" text-anchor="middle">두 보충 논거</text>
    <text x="700" y="304" class="axis" text-anchor="middle">14C 초</text>
    <text x="700" y="322" class="small" text-anchor="middle">교황 압력기</text>

    <!-- 14C 오컴 -->
    <line x1="980" y1="264" x2="980" y2="288" stroke="#2a6f6f" stroke-width="1.4"/>
    <circle cx="980" cy="276" r="7" fill="#a83a4a"/>
    <text x="980" y="220" class="lab" text-anchor="middle" fill="#a83a4a">오컴 윌리엄</text>
    <text x="980" y="240" class="small" text-anchor="middle">근원적 자유</text>
    <text x="980" y="304" class="axis" text-anchor="middle">14C 전반</text>
    <text x="980" y="322" class="small" text-anchor="middle">~1347 사망</text>

    <text x="84" y="356" class="it" fill="#2a6f6f">청빈 서약(현실 모순) → 사용·소유 분리 → 보충 논거 → 자유의 윤리</text>
  </g>

  <!-- Scene 2: 내·외부 비판 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="406" class="num">2</text>
    <text x="92" y="406" class="bd">두 갈래의 비판 — 청빈 서약과 현실의 모순</text>

    <!-- 가운데 모순 도식 -->
    <g transform="translate(440,432)">
      <rect width="320" height="100" rx="10" fill="#fbf2f4" stroke="#a83a4a" stroke-width="1.4"/>
      <text x="160" y="28" class="lab" text-anchor="middle" fill="#a83a4a">청빈 ↔ 기부의 모순</text>
      <use href="#monk" x="40" y="40" width="28" height="36"/>
      <text x="120" y="60" class="small">서약: 헌금 ✗ / 노동·탁발</text>
      <text x="120" y="80" class="small">현실: 음식·의복·건축 기부 ↑</text>
    </g>

    <g>
      <rect class="panel" x="64" y="446" width="356" height="98" rx="10"/>
      <text x="84" y="474" class="lab">내부 — 일부 수도자들</text>
      <line x1="84" y1="486" x2="400" y2="486" stroke="#dfeae7"/>
      <text x="84" y="510" class="small">자신들의 정체성 훼손을 우려</text>
      <text x="84" y="530" class="it">청빈 정신의 본래 의미를 지키려는 움직임</text>

      <rect class="panel" x="780" y="446" width="356" height="98" rx="10"/>
      <text x="800" y="474" class="lab">외부 — 다른 수도회·세력</text>
      <line x1="800" y1="486" x2="1116" y2="486" stroke="#dfeae7"/>
      <text x="800" y="510" class="small">청빈 서약과 모순되는 행위라 비판</text>
      <text x="800" y="530" class="it">→ 적극적 대응 논리의 필요</text>
    </g>
  </g>

  <!-- Scene 3: 보나벤투라 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="592" class="num">3</text>
    <text x="92" y="592" class="bd">보나벤투라 — 사용 vs 소유의 분리 (비교 매트릭스)</text>

    <rect class="panel" x="64" y="610" width="1072" height="174" rx="10"/>

    <!-- 매트릭스 헤더 -->
    <rect x="64" y="610" width="280" height="34" fill="#f5f9f8"/>
    <rect x="344" y="610" width="396" height="34" fill="#fbf2f4"/>
    <rect x="740" y="610" width="396" height="34" fill="#dff0ec"/>
    <text x="204" y="632" class="lab" text-anchor="middle">기준</text>
    <text x="542" y="632" class="lab" text-anchor="middle" fill="#a83a4a">법적 권리에 의한 사용</text>
    <text x="938" y="632" class="lab" text-anchor="middle" fill="#2a6f6f">단순한 사용 (자연적 사용)</text>

    <!-- 행 1 -->
    <line x1="64" y1="644" x2="1136" y2="644" stroke="#dfeae7"/>
    <text x="84" y="666" class="small">예시</text>
    <text x="354" y="666" class="small">소유권 / 용익권</text>
    <text x="750" y="666" class="small">동물이 먹이를 먹는 것 (자연적)</text>
    <use href="#apple" x="980" y="652" width="18" height="18"/>

    <!-- 행 2 -->
    <line x1="64" y1="676" x2="1136" y2="676" stroke="#dfeae7"/>
    <text x="84" y="698" class="small">권리 유무</text>
    <text x="354" y="698" class="small" fill="#a83a4a">권리가 사용을 떠받침</text>
    <text x="750" y="698" class="small" fill="#2a6f6f">권리와 무관</text>

    <!-- 행 3 -->
    <line x1="64" y1="708" x2="1136" y2="708" stroke="#dfeae7"/>
    <text x="84" y="730" class="small">소유 여부</text>
    <text x="354" y="730" class="small" fill="#a83a4a">소유 ✓</text>
    <text x="750" y="730" class="small" fill="#2a6f6f">소유 ✗</text>

    <!-- 행 4 -->
    <line x1="64" y1="740" x2="1136" y2="740" stroke="#dfeae7"/>
    <text x="84" y="762" class="small">수도자의 사용</text>
    <text x="354" y="762" class="small">해당 ✗</text>
    <text x="750" y="762" class="bd" fill="#2a6f6f">→ 해당 ✓ → 청빈 서약과 모순 없음</text>

    <line x1="344" y1="644" x2="344" y2="780" stroke="#dfeae7"/>
    <line x1="740" y1="644" x2="740" y2="780" stroke="#dfeae7"/>
  </g>

  <!-- Scene 4: 보나그라티아 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="822" class="num">4</text>
    <text x="92" y="822" class="bd">보나그라티아의 두 보충 논거 — 보나벤투라 논리의 강화</text>

    <g>
      <rect class="panel" x="64" y="840" width="528" height="148" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <text x="84" y="868" class="lab" fill="#2a6f6f">① 권리의 부재</text>
      <line x1="84" y1="880" x2="572" y2="880" stroke="#bfd9d3"/>

      <use href="#apple" x="84" y="896" width="22" height="22"/>
      <use href="#monk" x="116" y="894" width="24" height="32"/>

      <text x="148" y="912" class="small">생존에 필요한 사실상의 사용에는</text>
      <text x="148" y="932" class="small">권리가 끼어들 여지가 없다</text>
      <text x="84" y="970" class="it" fill="#2a6f6f">동물의 먹이 비유의 논리적 강화</text>

      <rect class="panel" x="608" y="840" width="528" height="148" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <text x="628" y="868" class="lab" fill="#2a6f6f">② 처분 권한의 부재</text>
      <line x1="628" y1="880" x2="1116" y2="880" stroke="#bfd9d3"/>

      <rect x="628" y="894" width="40" height="28" rx="4" fill="#fff" stroke="#a83a4a" stroke-width="1"/>
      <text x="648" y="914" class="small" text-anchor="middle" fill="#a83a4a">✗</text>
      <text x="678" y="914" class="small">처분권 없음</text>

      <text x="628" y="942" class="small">기부 물건을 자유롭게 처분할 권한이</text>
      <text x="628" y="962" class="small">없으므로 진정한 소유자가 아니다</text>
      <text x="628" y="982" class="it" fill="#2a6f6f" font-style="italic">소유의 적극적 정의에서 배제</text>
    </g>
  </g>

  <!-- Scene 5: 오컴의 근원적 자유 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="1030" class="num">5</text>
    <text x="92" y="1030" class="bd">오컴 — 윤리의 토대를 ‘근원적 자유’에서</text>
    <text x="64" y="1056" class="small">청빈 = 외부 규범의 강제 ✗ → 근원적 자유에서 우러난 자유로운 결단으로 받아들이는 것.</text>

    <rect class="panel" x="64" y="1074" width="1072" height="148" rx="10" stroke="#2a6f6f" stroke-width="1.6" fill="#dff0ec"/>

    <!-- 좌: 이전 관점 (사슬) -->
    <g transform="translate(84,1094)">
      <rect width="280" height="108" rx="10" fill="#fff" stroke="#7a6f5f" stroke-width="1"/>
      <text x="140" y="22" class="lab" text-anchor="middle">이전 관점 — 규범 복종</text>
      <line x1="14" y1="34" x2="266" y2="34" stroke="#dfeae7"/>
      <use href="#monk" x="20" y="46" width="28" height="40"/>
      <!-- 사슬 -->
      <circle cx="62" cy="64" r="4" fill="none" stroke="#7a6f5f" stroke-width="1.4"/>
      <circle cx="74" cy="64" r="4" fill="none" stroke="#7a6f5f" stroke-width="1.4"/>
      <circle cx="86" cy="64" r="4" fill="none" stroke="#7a6f5f" stroke-width="1.4"/>
      <rect x="98" y="56" width="48" height="18" rx="4" fill="#7a6f5f"/>
      <text x="122" y="68" class="small" fill="#fff" text-anchor="middle">규범</text>
      <text x="14" y="100" class="small">윤리 = 추상적 명령에 복종</text>
    </g>

    <line x1="376" y1="1148" x2="416" y2="1148" stroke="#2a6f6f" stroke-width="2.4" marker-end="url(#ar37)"/>

    <!-- 우: 오컴 — 자유 -->
    <g transform="translate(424,1094)">
      <rect width="700" height="108" rx="10" fill="#2a6f6f"/>
      <text x="350" y="26" class="lab" fill="#fff" text-anchor="middle">오컴 — 근원적 자유에 기초한 자유로운 결단</text>
      <line x1="14" y1="38" x2="686" y2="38" stroke="#cfe5e1"/>
      <use href="#dove" x="20" y="46" width="36" height="26"/>
      <use href="#monk" x="64" y="46" width="28" height="40"/>
      <text x="110" y="64" class="small" fill="#cfe5e1">청빈 = 자유로운 결단</text>
      <text x="14" y="98" class="small" fill="#cfe5e1">윤리는 자유 위에 세워진다 — 외부 강제 ✗</text>
    </g>
  </g>

  <text x="1140" y="1234" class="wm" text-anchor="end">EBS 2027 · 사회·문화 · 153쪽</text>
</svg>
