<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1240" data-app role="img" aria-labelledby="t63 d63">
  <title id="t63">디지털 읽기 — 인쇄 매체와 다른 인지·정서적 특징</title>
  <desc id="d63">초점의 이동(텍스트→매체 관계), 스크롤·F형 패턴, 하이퍼링크의 비선형성·주의 분산을 인쇄 읽기와의 비교 매트릭스와 디바이스 도식으로 시각화.</desc>
  <defs>
    <style>
      .bg{fill:#fbf7ee}
      .panel{fill:#ffffff;stroke:#d8cdb6;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#8b6f47}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#4f463d}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#9c8e7a;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar63" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b6f47"/>
    </marker>
    <symbol id="bookOpen" viewBox="0 0 80 56">
      <path d="M4 8 Q40 4 76 8 L76 50 Q40 46 4 50 Z" fill="#fbeed3" stroke="#8b6f47" stroke-width="1.4"/>
      <line x1="40" y1="6" x2="40" y2="48" stroke="#8b6f47" stroke-width="1"/>
      <line x1="10" y1="18" x2="34" y2="18" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="10" y1="26" x2="34" y2="26" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="10" y1="34" x2="34" y2="34" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="46" y1="18" x2="70" y2="18" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="46" y1="26" x2="70" y2="26" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="46" y1="34" x2="70" y2="34" stroke="#8b6f47" stroke-width="0.6"/>
    </symbol>
    <symbol id="tablet" viewBox="0 0 60 80">
      <rect x="2" y="2" width="56" height="76" rx="6" fill="#2b2622" stroke="#8b6f47" stroke-width="1.4"/>
      <rect x="6" y="8" width="48" height="60" rx="2" fill="#fbeed3"/>
      <line x1="10" y1="20" x2="50" y2="20" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="10" y1="28" x2="50" y2="28" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="10" y1="36" x2="36" y2="36" stroke="#a83a4a" stroke-width="0.8"/>
      <line x1="10" y1="44" x2="50" y2="44" stroke="#8b6f47" stroke-width="0.6"/>
      <line x1="10" y1="52" x2="40" y2="52" stroke="#8b6f47" stroke-width="0.6"/>
      <circle cx="30" cy="74" r="2" fill="#fbeed3"/>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1240"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#8b6f47"/>
  <text x="64" y="80" class="ti" fill="#ffffff">디지털 읽기 — 인쇄 매체와 다른 인지·정서적 특징</text>
  <text x="1136" y="80" class="sub" fill="#f4ead6" text-anchor="end">독서 방법 · 비교</text>

  <!-- Scene 1: 도입 + 디바이스 시각화 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">도입 — 디지털 읽기의 정의</text>

    <rect class="panel" x="64" y="160" width="1072" height="140" rx="10"/>
    <rect x="64" y="160" width="6" height="140" fill="#8b6f47"/>

    <use href="#tablet" x="96" y="180" width="80" height="106"/>

    <g transform="translate(212,180)">
      <text x="0" y="20" class="lab">디지털 기기를 매개로 화면에 제시되는 텍스트 읽기</text>
      <line x1="0" y1="32" x2="900" y2="32" stroke="#e3d6b8" stroke-width="1"/>
      <text x="0" y="56" class="small">· 키보드·마우스·터치스크린 등 보조 기기로 조작</text>
      <text x="0" y="78" class="small">· 문자 + 영상 등 복합 양식 정보 동시 제시</text>
      <text x="0" y="100" class="it" fill="#8b6f47">· 인터넷 연결 — 정보량이 압도적</text>
    </g>
  </g>

  <!-- Scene 2: 초점의 이동 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="344" class="num">2</text>
    <text x="92" y="344" class="bd">초점의 이동 — ‘텍스트 자체’에서 ‘매체 관계’로</text>

    <g>
      <rect class="panel" x="64" y="362" width="528" height="180" rx="10"/>
      <rect x="64" y="362" width="528" height="34" rx="10" fill="#a87f4a"/>
      <text x="84" y="386" class="pill">인쇄 매체 읽기</text>

      <use href="#bookOpen" x="84" y="408" width="80" height="56"/>
      <text x="190" y="430" class="small">독자의 초점이</text>
      <text x="190" y="452" class="lab">‘텍스트 자체’</text>
      <text x="190" y="472" class="small">에 집중</text>

      <text x="84" y="498" class="it">단일 텍스트 내부의 의미 파악 (선형)</text>
      <text x="84" y="522" class="small">선형적 흐름 — 일관된 진도</text>

      <rect class="panel" x="608" y="362" width="528" height="180" rx="10" stroke="#8b6f47" stroke-width="1.6" fill="#fff8ec"/>
      <rect x="608" y="362" width="528" height="34" rx="10" fill="#8b6f47"/>
      <text x="628" y="386" class="pill">디지털 읽기</text>

      <use href="#tablet" x="628" y="408" width="60" height="80"/>
      <text x="710" y="430" class="small">하이퍼텍스트 구조 →</text>
      <text x="710" y="452" class="lab" fill="#8b6f47">텍스트 + 매체 관계</text>
      <text x="710" y="472" class="small">로 초점이 분산</text>

      <text x="628" y="498" class="it" fill="#8b6f47">단일 텍스트를 넘어 다문서 읽기로 확장</text>
      <text x="628" y="522" class="small">주어진 범위를 넘어선 탐색 일상화</text>
    </g>
  </g>

  <!-- Scene 3: 스크롤 + F형 패턴 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="592" class="num">3</text>
    <text x="92" y="592" class="bd">스크롤 방식 + F형 읽기 패턴</text>

    <g>
      <rect class="panel" x="64" y="610" width="528" height="206" rx="10"/>
      <text x="84" y="638" class="lab">스크롤의 특성</text>
      <line x1="84" y1="650" x2="572" y2="650" stroke="#e3d6b8" stroke-width="1"/>
      <text x="84" y="674" class="small">· 페이지 단위가 아닌 ‘위아래 연속 흐름’</text>
      <text x="84" y="696" class="small">· 빠르게 훑어보기에 유리</text>
      <text x="84" y="718" class="small">· 가치 점검 후 정독 여부 결정</text>
      <text x="84" y="748" class="it" fill="#a83a4a">⚠ 정확성 ↓ — 인쇄보다 처리가 거칠어진다</text>
      <text x="84" y="770" class="small">동일 텍스트라도 디지털 스크롤이 정확성을 떨어뜨림</text>

      <!-- F형 패턴 시각화 -->
      <rect class="panel" x="608" y="610" width="528" height="206" rx="10" stroke="#8b6f47" stroke-width="1.4" fill="#fff8ec"/>
      <text x="628" y="638" class="lab" fill="#8b6f47">F형 읽기 패턴</text>
      <line x1="628" y1="650" x2="1116" y2="650" stroke="#e3d6b8" stroke-width="1"/>

      <g transform="translate(660,670)">
        <!-- 텍스트 라인 모형 -->
        <rect width="280" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="20" width="280" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="40" width="180" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="60" width="280" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="80" width="100" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="100" width="40" height="6" rx="2" fill="#d8cdb6"/>
        <rect y="120" width="40" height="6" rx="2" fill="#d8cdb6"/>

        <!-- F형 시선 추적 -->
        <path d="M 0 3 L 280 3" stroke="#8b6f47" stroke-width="2.6"/>
        <path d="M 280 3 L 0 23" stroke="#8b6f47" stroke-width="1" stroke-dasharray="2 2"/>
        <path d="M 0 23 L 180 23" stroke="#8b6f47" stroke-width="2.4"/>
        <path d="M 180 23 L 0 53" stroke="#8b6f47" stroke-width="1" stroke-dasharray="2 2"/>
        <path d="M 0 53 L 0 130" stroke="#8b6f47" stroke-width="2"/>
      </g>

      <text x="872" y="800" class="it" fill="#8b6f47" text-anchor="middle">제목·첫 줄 가로 → 건너뜀 → 아래로</text>
    </g>
  </g>

  <!-- Scene 4: 하이퍼링크 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="866" class="num">4</text>
    <text x="92" y="866" class="bd">하이퍼링크 — 비선형성의 양면</text>

    <g>
      <rect class="panel" x="64" y="884" width="528" height="200" rx="10" stroke="#8b6f47" stroke-width="1.4" fill="#fff8ec"/>
      <text x="84" y="912" class="lab" fill="#8b6f47">긍정 — 비선형 읽기 가능</text>
      <line x1="84" y1="924" x2="572" y2="924" stroke="#e3d6b8" stroke-width="1"/>

      <!-- 비선형 그래프: 노드와 링크 -->
      <g transform="translate(420,944)">
        <circle cx="0" cy="0" r="7" fill="#8b6f47"/>
        <circle cx="50" cy="-30" r="6" fill="#a8884a"/>
        <circle cx="60" cy="20" r="6" fill="#a8884a"/>
        <circle cx="100" cy="-10" r="6" fill="#a8884a"/>
        <circle cx="120" cy="40" r="6" fill="#a8884a"/>
        <line x1="0" y1="0" x2="50" y2="-30" stroke="#8b6f47" stroke-width="1.4"/>
        <line x1="0" y1="0" x2="60" y2="20" stroke="#8b6f47" stroke-width="1.4"/>
        <line x1="50" y1="-30" x2="100" y2="-10" stroke="#a8884a" stroke-width="1"/>
        <line x1="60" y1="20" x2="120" y2="40" stroke="#a8884a" stroke-width="1"/>
      </g>

      <text x="84" y="958" class="small">· 클릭으로 다른 텍스트로 즉시 이동</text>
      <text x="84" y="980" class="small">· 자율적 탐색 경로 구성</text>
      <text x="84" y="1002" class="small">· 다문서 읽기 — 의미를 ‘연결하며’ 읽기</text>
      <text x="84" y="1042" class="it" fill="#8b6f47">정보 접근의 폭이 넓어진다</text>

      <rect class="panel" x="608" y="884" width="528" height="200" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>
      <text x="628" y="912" class="lab" fill="#a83a4a">부정 — 인지 부담 + 주의 분산</text>
      <line x1="628" y1="924" x2="1116" y2="924" stroke="#fbe6e9" stroke-width="1"/>

      <!-- 분산 화살표 -->
      <g transform="translate(960,944)">
        <circle cx="0" cy="0" r="7" fill="#a83a4a"/>
        <line x1="0" y1="0" x2="-30" y2="-30" stroke="#a83a4a" stroke-width="1" stroke-dasharray="2 2"/>
        <line x1="0" y1="0" x2="50" y2="-30" stroke="#a83a4a" stroke-width="1" stroke-dasharray="2 2"/>
        <line x1="0" y1="0" x2="-40" y2="40" stroke="#a83a4a" stroke-width="1" stroke-dasharray="2 2"/>
        <line x1="0" y1="0" x2="60" y2="30" stroke="#a83a4a" stroke-width="1" stroke-dasharray="2 2"/>
      </g>

      <text x="628" y="958" class="small">· 무엇을 선택할지 지속적 판단</text>
      <text x="628" y="980" class="small">· 시청각 정보 — 처리할 정보량 ↑</text>
      <text x="628" y="1002" class="small">· 멀티태스킹 — 주의 분산</text>
      <text x="628" y="1042" class="it" fill="#a83a4a">→ 비독서 활동 多 → 이해력 저하 가능성</text>
    </g>
  </g>

  <!-- 종합 비교 매트릭스 -->
  <g>
    <rect class="panel" x="64" y="1110" width="1072" height="100" rx="10"/>
    <rect x="64" y="1110" width="280" height="34" fill="#fbf7ee"/>
    <rect x="344" y="1110" width="396" height="34" fill="#fbf2f4"/>
    <rect x="740" y="1110" width="396" height="34" fill="#fff8ec"/>
    <text x="204" y="1132" class="lab" text-anchor="middle">비교 기준</text>
    <text x="542" y="1132" class="lab" text-anchor="middle" fill="#a87f4a">인쇄 매체</text>
    <text x="938" y="1132" class="lab" text-anchor="middle" fill="#8b6f47">디지털 매체</text>

    <line x1="64" y1="1144" x2="1136" y2="1144" stroke="#e3d6b8"/>
    <text x="84" y="1166" class="small">읽기 흐름</text>
    <text x="354" y="1166" class="small">선형 (페이지)</text>
    <text x="750" y="1166" class="small">비선형 (스크롤·하이퍼링크)</text>

    <line x1="64" y1="1176" x2="1136" y2="1176" stroke="#e3d6b8"/>
    <text x="84" y="1198" class="small">정확성</text>
    <text x="354" y="1198" class="small" fill="#8b6f47">↑ 처리 정밀</text>
    <text x="750" y="1198" class="small" fill="#a83a4a">↓ 거친 처리 + 분산</text>

    <line x1="344" y1="1144" x2="344" y2="1208" stroke="#e3d6b8"/>
    <line x1="740" y1="1144" x2="740" y2="1208" stroke="#e3d6b8"/>
  </g>

  <text x="1140" y="1232" class="wm" text-anchor="end">EBS 2027 · 독서 방법 · 46쪽</text>
</svg>
