<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1170" data-app role="img" aria-labelledby="t65 d65">
  <title id="t65">독서 공간이 독자의 읽기에 미치는 영향</title>
  <desc id="d65">물리적 독서 공간(본원적·전용된)과 인식적 독서 공간이 독자의 능동적 선택과 함께 읽기에 영향을 미친다.</desc>
  <defs>
    <style>
      .bg{fill:#fbf7ee}
      .ink{fill:#2b2622}
      .ink2{fill:#4f463d}
      .mut{fill:#7a6e60}
      .panel{fill:#ffffff;stroke:#d8cdb6;stroke-width:1.2}
      .accent{fill:#8b6f47}
      .acc-soft{fill:#f0e3cb}
      .acc-stroke{stroke:#8b6f47;stroke-width:1.4}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#2b2622}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#8b6f47}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#4f463d}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#5e544a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#9c8e7a;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar65" viewBox="0 0 1200 1170" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b6f47"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="980"/>

  <!-- Header -->
  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#8b6f47"/>
  <text x="64" y="80" class="ti" fill="#ffffff">독서 공간이 독자의 읽기에 미치는 영향</text>
  <text x="1136" y="80" class="sub" fill="#f4ead6" text-anchor="end">독서 방법 · 인과 사슬</text>

  <!-- Scene 1: 도입 - 두 갈래 분류 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">독서 공간 = 단순 배경이 아닌 능동적 요소</text>
    <text x="64" y="166" class="small">독서 공간은 면적·부피의 물리적 공간뿐 아니라 인식적 공간까지 포함한다.</text>

    <!-- 본원적 -->
    <rect class="panel" x="64" y="184" width="345" height="124" rx="10"/>
    <rect x="64" y="184" width="6" height="124" fill="#8b6f47"/>
    <text x="84" y="210" class="lab">본원적 독서 공간</text>
    <text x="84" y="234" class="it">처음부터 독서를 위해 존재</text>
    <text x="84" y="262" class="small">· 서재 — 개인의 독서 공간</text>
    <text x="84" y="284" class="small">· 도서관 — 대중의 독서 공간</text>

    <!-- 전용된 -->
    <rect class="panel" x="427" y="184" width="346" height="124" rx="10"/>
    <rect x="427" y="184" width="6" height="124" fill="#a87f4a"/>
    <text x="447" y="210" class="lab">전용된 독서 공간</text>
    <text x="447" y="234" class="it">다른 목적의 공간이 독서에 활용</text>
    <text x="447" y="262" class="small">· 버스·지하철 — 이동 중 독서</text>
    <text x="447" y="284" class="small">· 카페·서점 — 일상 속 독서</text>

    <!-- 인식적 -->
    <rect class="panel" x="791" y="184" width="345" height="124" rx="10"/>
    <rect x="791" y="184" width="6" height="124" fill="#c69a5c"/>
    <text x="811" y="210" class="lab">인식적 독서 공간</text>
    <text x="811" y="234" class="it">독자의 의식 속에 형성</text>
    <text x="811" y="262" class="small">· 수업 시간·등굣길</text>
    <text x="811" y="284" class="small">· 아침 독서 운동·독서 모임</text>
  </g>

  <!-- Scene 2: 인지적 영향 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="354" class="num">2</text>
    <text x="92" y="354" class="bd">물리적 조건의 인지적 영향</text>
    <text x="64" y="380" class="small">소음·조도·자세 등 공간의 물리 조건이 인지 부하와 집중도를 결정한다.</text>

    <rect class="panel" x="64" y="396" width="500" height="156" rx="10"/>
    <text x="84" y="424" class="lab">공간 조건</text>
    <line x1="84" y1="436" x2="544" y2="436" stroke="#e3d6b8" stroke-width="1"/>
    <g>
      <rect x="84" y="448" width="140" height="38" rx="6" fill="#f0e3cb"/>
      <text x="154" y="473" class="lab" text-anchor="middle">소음 수준</text>
      <rect x="234" y="448" width="140" height="38" rx="6" fill="#f0e3cb"/>
      <text x="304" y="473" class="lab" text-anchor="middle">조도·시야</text>
      <rect x="384" y="448" width="140" height="38" rx="6" fill="#f0e3cb"/>
      <text x="454" y="473" class="lab" text-anchor="middle">자세·동선</text>
    </g>
    <text x="84" y="514" class="it">물리적 조건이 일정 수준을 넘어서면 주의가 분산된다.</text>
    <text x="84" y="534" class="small">조용한 도서관·서재는 깊은 읽기에, 카페는 가벼운 훑기에 적합하다.</text>

    <line x1="580" y1="474" x2="630" y2="474" stroke="#8b6f47" stroke-width="2.2" marker-end="url(#ar65)"/>

    <rect class="panel acc-stroke" x="640" y="396" width="496" height="156" rx="10" fill="#fff8ec"/>
    <text x="660" y="424" class="lab">인지적 결과</text>
    <line x1="660" y1="436" x2="1116" y2="436" stroke="#e3d6b8" stroke-width="1"/>
    <text x="660" y="464" class="small">· 작업 기억 부하 증가/감소</text>
    <text x="660" y="486" class="small">· 텍스트 처리 속도와 정확성 변화</text>
    <text x="660" y="508" class="small">· 추론·정교화 깊이 변화</text>
    <text x="660" y="538" class="it" fill="#8b6f47">→ 같은 글이라도 공간에 따라 이해의 깊이가 달라진다.</text>
  </g>

  <!-- Scene 3: 정서적 영향 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="600" class="num">3</text>
    <text x="92" y="600" class="bd">공간의 정서적 영향</text>
    <text x="64" y="626" class="small">공간이 주는 편안함·안정감은 정서적 몰입을 촉진하고 깊이 있는 이해로 이어진다.</text>

    <rect class="panel" x="64" y="642" width="500" height="148" rx="10"/>
    <text x="84" y="670" class="lab">정서적 단서</text>
    <line x1="84" y1="682" x2="544" y2="682" stroke="#e3d6b8" stroke-width="1"/>
    <text x="84" y="708" class="small">· 익숙한 분위기 → 안정감</text>
    <text x="84" y="730" class="small">· 적절한 사회적 신호 → 소속감</text>
    <text x="84" y="752" class="small">· 미적 환경 → 정서적 활성</text>
    <text x="84" y="776" class="it" fill="#8b6f47">정서가 인지를 지지한다.</text>

    <line x1="580" y1="716" x2="630" y2="716" stroke="#8b6f47" stroke-width="2.2" marker-end="url(#ar65)"/>

    <rect class="panel acc-stroke" x="640" y="642" width="496" height="148" rx="10" fill="#fff8ec"/>
    <text x="660" y="670" class="lab">정서적 결과</text>
    <line x1="660" y1="682" x2="1116" y2="682" stroke="#e3d6b8" stroke-width="1"/>
    <text x="660" y="708" class="small">· 몰입(flow) — 시간 감각의 변화</text>
    <text x="660" y="730" class="small">· 책에 대한 친밀감 형성</text>
    <text x="660" y="752" class="small">· 읽기 지속력의 증가</text>
    <text x="660" y="776" class="it" fill="#8b6f47">→ 깊은 정서적 이해로 연결</text>
  </g>

  <!-- Scene 4: 능동적 선택 결론 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="838" class="num">4</text>
    <text x="92" y="838" class="bd">독자의 능동적 선택</text>
    <text x="64" y="864" class="small">읽기 목적에 맞춰 공간을 능동적으로 선택할 때 읽기의 질이 높아진다.</text>

    <g>
      <rect x="64" y="884" width="340" height="58" rx="10" fill="#f0e3cb" stroke="#d8c595" stroke-width="1"/>
      <rect x="74" y="894" width="50" height="38" rx="6" fill="#8b6f47"/>
      <text x="99" y="918" class="pill" text-anchor="middle">목적</text>
      <text x="138" y="909" class="lab">읽기 목적의 자각</text>
      <text x="138" y="929" class="small">정독·훑기·암기·창작용 메모 등</text>

      <line x1="404" y1="913" x2="446" y2="913" stroke="#8b6f47" stroke-width="2.2" marker-end="url(#ar65)"/>

      <rect x="446" y="884" width="340" height="58" rx="10" fill="#f0e3cb" stroke="#d8c595" stroke-width="1"/>
      <rect x="456" y="894" width="50" height="38" rx="6" fill="#8b6f47"/>
      <text x="481" y="918" class="pill" text-anchor="middle">선택</text>
      <text x="520" y="909" class="lab">공간 선택과 조율</text>
      <text x="520" y="929" class="small">물리적·인식적 공간을 능동적으로 구성</text>

      <line x1="786" y1="913" x2="828" y2="913" stroke="#8b6f47" stroke-width="2.2" marker-end="url(#ar65)"/>

      <rect x="828" y="884" width="308" height="58" rx="10" fill="#fff8ec" stroke="#8b6f47" stroke-width="1.4"/>
      <text x="982" y="909" class="lab" text-anchor="middle">읽기의 질 향상</text>
      <text x="982" y="929" class="small" text-anchor="middle">집중 · 이해 · 몰입의 동시 상승</text>
    </g>
  </g>

  <text x="1140" y="956" class="wm" text-anchor="end">EBS 2027 · 독서 방법 · 280쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="980" width="1120" height="170" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="980" width="1120" height="32" rx="6" fill="#8b6f47"/>
    <text x="60" y="1002" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1002" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">4개 항목</text>
    <line x1="40" y1="1014" x2="1160" y2="1014" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1030" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">독서 공간의 의미</text>
    <text x="240" y="1030" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">단순한 배경이 아니라 독자의 집중·이해·정서에 영향을 미치는 능동적 요소.</text>
    <line x1="40" y1="1044" x2="1160" y2="1044" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1060" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">인지적 영향</text>
    <text x="240" y="1060" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">소음·조도·자세 등 물리적 조건이 인지 부하와 집중도를 결정한다.</text>
    <line x1="40" y1="1074" x2="1160" y2="1074" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1090" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">정서적 영향</text>
    <text x="240" y="1090" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">공간의 편안함이 정서적 몰입을 촉진하고 깊이 있는 이해로 이어진다.</text>
    <line x1="40" y1="1104" x2="1160" y2="1104" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1120" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">능동적 선택</text>
    <text x="240" y="1120" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">독자는 읽기 목적에 맞는 공간을 능동적으로 선택해 읽기의 질을 높일 수 있다.</text>
  </g>
</svg>
