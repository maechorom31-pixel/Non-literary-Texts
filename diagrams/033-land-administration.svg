<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="t33 d33">
  <title id="t33">토지 행정의 두 수단 — 거래 허가제와 가격 공시제</title>
  <desc id="d33">국토 종합 이용·개발·보존을 위한 토지 행정의 두 수단(토지 거래 허가제, 부동산 가격 공시제), 헌법적 근거(제23조·제122조), 표준지·개별 공시 지가의 관계, 처분성을 둘러싼 두 학설을 흐름도·헌법 조문 시각화·지가 그래프로 표현.</desc>
  <defs>
    <style>
      .bg{fill:#f5f9f8}
      .panel{fill:#ffffff;stroke:#c4dcd5;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a6f6f}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#436963}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .axis{font:600 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a6f6f}
      .figLab{font:600 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .quote{font:600 13px 'Noto Serif KR',serif;fill:#2a6f6f;font-style:italic}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d9994;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar33" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
    <symbol id="house33" viewBox="0 0 32 32">
      <path d="M16 4 L4 14 V28 H28 V14 Z" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <rect x="13" y="20" width="6" height="8" fill="#2a6f6f"/>
    </symbol>
    <symbol id="land33" viewBox="0 0 40 24">
      <rect x="2" y="14" width="36" height="8" fill="#bcd4cf" stroke="#2a6f6f"/>
      <rect x="6" y="6" width="6" height="8" fill="#fff" stroke="#2a6f6f" stroke-width="0.6"/>
      <rect x="14" y="2" width="8" height="12" fill="#fff" stroke="#2a6f6f" stroke-width="0.6"/>
      <rect x="24" y="8" width="6" height="6" fill="#fff" stroke="#2a6f6f" stroke-width="0.6"/>
    </symbol>
    <symbol id="scale33" viewBox="0 0 40 32">
      <line x1="20" y1="2" x2="20" y2="30" stroke="#2a6f6f" stroke-width="1.4"/>
      <line x1="6" y1="8" x2="34" y2="8" stroke="#2a6f6f" stroke-width="1.4"/>
      <path d="M2 8 L10 20 H6 Z" fill="#dff0ec" stroke="#2a6f6f"/>
      <path d="M30 8 L38 20 H34 Z" fill="#dff0ec" stroke="#2a6f6f"/>
      <rect x="16" y="28" width="8" height="2" fill="#2a6f6f"/>
    </symbol>
  </defs>

  <rect class="bg" width="1200" height="1200"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#2a6f6f"/>
  <text x="64" y="80" class="ti" fill="#ffffff">토지 행정의 두 수단 — 거래 허가제와 가격 공시제</text>
  <text x="1136" y="80" class="sub" fill="#cfe5e1" text-anchor="end">사회·문화 · 분류</text>

  <!-- Scene 1: 토지 행정 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">토지 행정 — 국토의 종합적 이용·개발·보존</text>

    <rect class="panel" x="64" y="160" width="1072" height="120" rx="10"/>
    <rect x="64" y="160" width="6" height="120" fill="#2a6f6f"/>

    <use href="#land33" x="84" y="190" width="120" height="72"/>

    <text x="220" y="188" class="lab">목적</text>
    <text x="220" y="212" class="small">국민과 후손의 삶을 위해 국토를 종합적으로 이용·개발·보존</text>

    <text x="220" y="240" class="lab">활동 범위</text>
    <text x="220" y="262" class="small">토지 개발 계획 입안·결정 / 거래 규제 / 이용 조정 / 도시 개발 / 농지 보존</text>
  </g>

  <!-- Scene 2: 토지 거래 허가제 + 지가 그래프 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="324" class="num">2</text>
    <text x="92" y="324" class="bd">수단 ① — 토지 거래 허가제</text>
    <text x="64" y="350" class="small">투기적 거래로 인한 급격한 지가 상승을 억제하기 위한 행정 도구.</text>

    <rect class="panel" x="64" y="368" width="1072" height="180" rx="10"/>

    <!-- 절차 흐름 -->
    <g>
      <rect x="84" y="388" width="200" height="44" rx="8" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="184" y="416" class="lab" text-anchor="middle">허가구역 지정</text>

      <line x1="292" y1="410" x2="330" y2="410" stroke="#2a6f6f" stroke-width="2.2" marker-end="url(#ar33)"/>

      <rect x="338" y="388" width="200" height="44" rx="8" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="438" y="416" class="lab" text-anchor="middle">5년 이내 기간</text>

      <line x1="546" y1="410" x2="584" y2="410" stroke="#2a6f6f" stroke-width="2.2" marker-end="url(#ar33)"/>

      <rect x="592" y="388" width="220" height="44" rx="8" fill="#dff0ec" stroke="#2a6f6f"/>
      <text x="702" y="416" class="lab" text-anchor="middle">시·군·구청장 허가</text>

      <line x1="820" y1="410" x2="858" y2="410" stroke="#2a6f6f" stroke-width="2.2" marker-end="url(#ar33)"/>

      <rect x="866" y="388" width="240" height="44" rx="8" fill="#2a6f6f"/>
      <text x="986" y="416" class="lab" fill="#ffffff" text-anchor="middle">투기 거래 억제</text>
    </g>

    <!-- 지가 안정 효과 그래프 -->
    <g transform="translate(84,448)">
      <line x1="0" y1="80" x2="980" y2="80" stroke="#7d9994" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="80" stroke="#7d9994" stroke-width="1"/>
      <text x="-6" y="6" class="axis" text-anchor="end">지가</text>
      <text x="980" y="98" class="axis" text-anchor="end">시간 →</text>

      <!-- 허가 전: 급등 -->
      <path d="M0 70 Q60 70 100 50 Q140 30 200 6" fill="none" stroke="#a83a4a" stroke-width="2.4"/>
      <text x="100" y="20" class="small" fill="#a83a4a" text-anchor="middle">허가제 도입 전 — 투기 급등</text>

      <!-- 허가 후: 안정 -->
      <line x1="200" y1="6" x2="220" y2="6" stroke="#a83a4a" stroke-width="2.4" stroke-dasharray="3 3"/>
      <line x1="220" y1="6" x2="220" y2="40" stroke="#2a6f6f" stroke-width="2.4"/>
      <path d="M220 40 Q400 36 600 38 Q800 40 980 38" fill="none" stroke="#2a6f6f" stroke-width="2.4"/>
      <text x="600" y="60" class="small" fill="#2a6f6f" text-anchor="middle">허가제 도입 후 — 안정화</text>

      <line x1="220" y1="0" x2="220" y2="80" stroke="#2a6f6f" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="220" y="-2" class="axis" text-anchor="middle">도입</text>
    </g>

    <text x="84" y="572" class="small" fill="#a83a4a">⚠ 속임수로 허가받으면 징역 또는 벌금</text>
  </g>

  <!-- Scene 3: 헌법적 근거 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="616" class="num">3</text>
    <text x="92" y="616" class="bd">헌법적 근거 — 재산권 보장 + 공공복리</text>
    <text x="64" y="642" class="small">사적 거래에 대한 행정청의 개입은 재산권의 침해가 아니라 헌법상 정당한 제한이다.</text>

    <g>
      <rect class="panel" x="64" y="660" width="528" height="140" rx="10"/>
      <rect x="64" y="660" width="6" height="140" fill="#2a6f6f"/>
      <text x="84" y="688" class="lab">헌법 제23조 (재산권)</text>
      <line x1="84" y1="700" x2="572" y2="700" stroke="#dfeae7" stroke-width="1"/>

      <use href="#scale33" x="84" y="714" width="40" height="32"/>
      <text x="138" y="730" class="quote">“재산권은 보장된다.”</text>
      <text x="138" y="752" class="small">단, 재산권의 행사는</text>
      <text x="84" y="778" class="it" fill="#2a6f6f">공공복리에 적합해야 한다.</text>

      <rect class="panel" x="608" y="660" width="528" height="140" rx="10"/>
      <rect x="608" y="660" width="6" height="140" fill="#2a6f6f"/>
      <text x="628" y="688" class="lab">헌법 제122조 (국토 제한)</text>
      <line x1="628" y1="700" x2="1116" y2="700" stroke="#dfeae7" stroke-width="1"/>

      <use href="#land33" x="628" y="714" width="60" height="32"/>
      <text x="700" y="730" class="quote">“국토의 효율적·균형 있는 개발…”</text>
      <text x="700" y="752" class="small">법률에 따라 필요한</text>
      <text x="628" y="778" class="it" fill="#2a6f6f">제한을 가할 수 있다.</text>
    </g>
  </g>

  <!-- Scene 4: 부동산 가격 공시제 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="846" class="num">4</text>
    <text x="92" y="846" class="bd">수단 ② — 부동산 가격 공시제</text>
    <text x="64" y="872" class="small">국토 교통부 장관이 매년 1월 1일 현재의 토지 적정 가격을 산정·공시. 적정 가격 형성 + 조세·부담금 형평성.</text>

    <g>
      <rect class="panel" x="64" y="890" width="1072" height="124" rx="10"/>

      <rect x="84" y="910" width="280" height="80" rx="10" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.4"/>
      <use href="#house33" x="100" y="922" width="32" height="32"/>
      <text x="244" y="938" class="lab" text-anchor="middle" fill="#2a6f6f">표준지 공시 지가</text>
      <text x="244" y="962" class="small" text-anchor="middle">전국 대표 토지의 가격</text>
      <text x="244" y="980" class="small" text-anchor="middle">매년 1/1 산정·공시</text>

      <line x1="372" y1="950" x2="412" y2="950" stroke="#2a6f6f" stroke-width="2.4" marker-end="url(#ar33)"/>
      <text x="392" y="942" class="small" fill="#2a6f6f" text-anchor="middle">⊕</text>

      <rect x="420" y="910" width="280" height="80" rx="10" fill="#eaf3f1" stroke="#bcd4cf"/>
      <text x="560" y="938" class="lab" text-anchor="middle">토지 가격 비준표</text>
      <text x="560" y="962" class="small" text-anchor="middle">각 토지별 보정 인자</text>
      <text x="560" y="980" class="small" text-anchor="middle">(위치·용도·규모 등)</text>

      <line x1="708" y1="950" x2="748" y2="950" stroke="#2a6f6f" stroke-width="2.4" marker-end="url(#ar33)"/>

      <rect x="756" y="910" width="370" height="80" rx="10" fill="#2a6f6f"/>
      <use href="#house33" x="772" y="922" width="32" height="32"/>
      <text x="958" y="938" class="lab" fill="#ffffff" text-anchor="middle">개별 공시 지가</text>
      <text x="958" y="962" class="small" fill="#cfe5e1" text-anchor="middle">개별 토지의 공시 지가</text>
      <text x="958" y="980" class="small" fill="#cfe5e1" text-anchor="middle">표준지 공시 지가에서 산정</text>
    </g>
  </g>

  <!-- Scene 5: 처분성 학설 -->
  <g class="reveal" data-reveal-step="5">
    <text x="64" y="1056" class="num">5</text>
    <text x="92" y="1056" class="bd">처분성 학설 — 공시 지가는 행정 행위인가?</text>
    <text x="64" y="1082" class="small">공시 지가가 보상액 산정·조세 부과 기준으로 사실상 한정액을 결정하는 효력 → 학설 분기.</text>

    <g>
      <rect class="panel" x="64" y="1100" width="528" height="80" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <text x="84" y="1128" class="lab" fill="#2a6f6f">전부 행정 행위 인정설</text>
      <line x1="84" y1="1140" x2="572" y2="1140" stroke="#bfd9d3" stroke-width="1"/>
      <text x="84" y="1162" class="small">공시 지가 ‘전부’를 처분성 있는 행정 행위로 인정</text>

      <rect class="panel" x="608" y="1100" width="528" height="80" rx="10" stroke="#a83a4a" stroke-width="1.4" fill="#fbf2f4"/>
      <text x="628" y="1128" class="lab" fill="#a83a4a">부분 행정 행위 인정설</text>
      <line x1="628" y1="1140" x2="1116" y2="1140" stroke="#fbe6e9" stroke-width="1"/>
      <text x="628" y="1162" class="small">보상·조세 부과 기준으로 작용하는 ‘한정 범위’에서만 처분성 인정</text>
    </g>
  </g>

  <text x="1140" y="1196" class="wm" text-anchor="end">EBS 2027 · 사회·문화 · 136쪽</text>
</svg>
