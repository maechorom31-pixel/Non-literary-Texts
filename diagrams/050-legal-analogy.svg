<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1240" role="img" aria-labelledby="t050 d050">
  <title id="t050">법 해석의 본질과 유추</title>
  <desc id="d050">법조문이 구체 사례를 명확히 규정하지 않는 흠결 영역에 직면한 법관이 취하는 유추가 단순한 보조 수단인지 법 해석의 본질인지를 두고 두 입장을 좌우 대비로 시각화한다. (가) 전통적 이해(유추 = 흠결 보충의 보조 수단)를 비판하고 모든 법 해석에서 추상 규범과 구체 사실의 거리를 메우는 동화 과정으로서의 유추를 본질로 재구성하는 입장과, (나) 유추를 사례 간 직접 비교로 보는 효율성 논리에 대해 유사·차이를 선별할 일반 명제가 필수적이라는 모순을 지적하고 법적 안정성 훼손 위험을 경고하는 비판적 입장을 정리한다.</desc>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .soc { fill: #2a6f6f; }
    .soc-st { stroke: #2a6f6f; }
    .soc-bg { fill: rgba(42,111,111,0.08); }
    .soc-bg2 { fill: rgba(42,111,111,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- 도입 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="80" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">유추는 무엇인가? — 두 입장의 대립</text>
    <text x="60" y="86" class="lbl-sm">전통적 이해(유추 = 보조 수단)를 (가)는 본질로 격상시키고, (나)는 그 격상에 내재한 모순을 지적한다.</text>
  </g>

  <!-- (가) 헤더 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="130" width="540" height="36" rx="6" class="soc"/>
    <text x="60" y="154" class="lbl-strong" fill="#f5f1e8">(가) 유추 = 법 해석의 본질</text>
  </g>

  <!-- Step 1 · 전통적 이해 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="180" width="540" height="160" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="208" class="lbl-strong">전통적 이해</text>

    <g transform="translate(60, 226)">
      <rect x="0" y="0" width="500" height="40" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="20" class="lbl-sm" font-weight="700">법 해석 = 연역적 절차</text>
      <text x="14" y="36" class="lbl-xs">일반·추상 규범 → 개별·구체 사례 처리</text>

      <rect x="0" y="50" width="500" height="40" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="70" class="lbl-sm" font-weight="700">유추 = 보조 수단</text>
      <text x="14" y="86" class="lbl-xs">연역에 흠결이 있을 때만 동원</text>
    </g>
  </g>

  <!-- Step 2 · 비판 + 재구성 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="360" width="540" height="220" rx="6" class="soc-bg soc-st" stroke-width="1.5"/>
    <text x="60" y="388" class="lbl-strong" fill="#2a6f6f">비판 + 재구성</text>

    <g transform="translate(60, 410)">
      <rect x="0" y="0" width="500" height="60" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">비판</text>
      <text x="14" y="42" class="lbl-xs">흠결 보충이 필요 없어 보이는 사례에서도</text>
      <text x="14" y="58" class="lbl-xs">법의 추상 규범과 구체 사실 사이엔 늘 거리가 존재</text>

      <rect x="0" y="80" width="500" height="80" rx="4" class="soc-bg2 soc-st" stroke-width="1.4"/>
      <text x="14" y="102" class="lbl-sm" font-weight="700" fill="#2a6f6f">재구성</text>
      <text x="14" y="122" class="lbl-xs">모든 법 해석 = 규범과 사례를 결합 가능하게</text>
      <text x="14" y="138" class="lbl-xs">정제해 가는 <tspan font-weight="700" fill="#2a6f6f">동화 과정</tspan></text>
      <text x="14" y="154" class="lbl-xs" fill="#2a6f6f" font-weight="700">→ 그 본질을 가리키는 적절한 개념이 바로 '유추'</text>
    </g>
  </g>

  <!-- (나) 헤더 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="620" y="130" width="540" height="36" rx="6" class="acc"/>
    <text x="640" y="154" class="lbl-strong" fill="#f5f1e8">(나) 유추 자체의 모순 지적</text>
  </g>

  <!-- Step 3 · 유추의 효율성 (직접 비교) -->
  <g class="reveal" data-reveal-step="3">
    <rect x="620" y="180" width="540" height="160" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="640" y="208" class="lbl-strong">유추 = 사례→사례 직접 추론</text>

    <g transform="translate(640, 230)">
      <rect x="0" y="0" width="160" height="40" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="80" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">과거 사례</text>
      <text x="80" y="36" text-anchor="middle" class="lbl-xs">사실 + 결론</text>

      <text x="180" y="22" text-anchor="middle" class="lbl-strong" fill="#7a6f5f">→</text>

      <rect x="200" y="0" width="160" height="40" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="280" y="22" text-anchor="middle" class="lbl-sm" font-weight="700">유사·차이 비교</text>

      <text x="380" y="22" text-anchor="middle" class="lbl-strong" fill="#7a6f5f">→</text>

      <rect x="400" y="0" width="100" height="40" rx="3" class="acc"/>
      <text x="450" y="22" text-anchor="middle" class="lbl-sm" font-weight="700" fill="#f5f1e8">현재 결론</text>
    </g>

    <text x="640" y="306" class="lbl-xs" fill="#7a6f5f">일반 명제를 거치지 않아 효율적으로 보임</text>
  </g>

  <!-- Step 4 · 모순 지적 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="620" y="360" width="540" height="220" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="640" y="388" class="lbl-strong" fill="#a83a4a">모순 — 일반 명제는 필수적</text>

    <g transform="translate(640, 410)">
      <rect x="0" y="0" width="500" height="60" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-sm" font-weight="700">유사·차이는 무한</text>
      <text x="14" y="42" class="lbl-xs">두 사례 사이의 유사점·차이점은 사실상 무한히 많다</text>
      <text x="14" y="58" class="lbl-xs">→ 어느 것이 법적으로 중요한지 선별해야 함</text>

      <rect x="0" y="80" width="500" height="80" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="102" class="lbl-sm" font-weight="700" fill="#a83a4a">결정적 통찰</text>
      <text x="14" y="122" class="lbl-xs">유사·차이의 법적 중요성을 선별할 <tspan font-weight="700" fill="#a83a4a">일반 명제가 필수적</tspan></text>
      <text x="14" y="138" class="lbl-xs">"즉각적 유사성 파악"도 사실은 내면화된 일반 명제 덕분</text>
      <text x="14" y="154" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 사례 직접 비교만으로는 부족하다 (자기모순)</text>
    </g>
  </g>

  <!-- Step 5 · 자의적 판단의 위험 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="600" width="1120" height="180" rx="6" class="paper2 ink" stroke-width="1"/>
    <text x="60" y="628" class="lbl-head">한계 — 법적 안정성 훼손 위험</text>
    <text x="60" y="652" class="lbl-sm">유추를 법 해석의 본질로 격상시키면, 일반 명제 없는 직관적 판단이 자의적 판단으로 흐를 위험</text>

    <g transform="translate(80, 670)">
      <rect x="0" y="0" width="500" height="90" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">법관의 즉각적 판단</text>
      <text x="14" y="44" class="lbl-sm">즉각적 유사성 파악도 <tspan font-weight="700">앞선 일반 명제의 내면화</tspan> 덕분</text>
      <text x="14" y="62" class="lbl-sm">의식할 필요 없을 정도로 체화됨</text>
      <text x="14" y="80" class="lbl-xs">→ 일반 명제가 보이지 않을 뿐, 작동하고 있다</text>
    </g>

    <g transform="translate(620, 670)">
      <rect x="0" y="0" width="500" height="90" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">법적 안정성의 위험</text>
      <text x="14" y="44" class="lbl-sm">정말 순전히 직관적 판단이라면</text>
      <text x="14" y="62" class="lbl-sm" fill="#a83a4a" font-weight="700">→ 자의적 판단으로 흐를 위험</text>
      <text x="14" y="80" class="lbl-xs" fill="#a83a4a">유추를 본질로 격상하면 법적 안정성이 훼손된다</text>
    </g>
  </g>

  <!-- Step 6 · 한계 (비교 요약) -->
  <g class="reveal" data-reveal-step="6">
    <rect x="40" y="800" width="1120" height="180" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="828" class="lbl-head">한눈에 보는 대립 — 한계 인식</text>

    <g transform="translate(60, 850)">
      <rect x="0" y="0" width="1080" height="30" class="paper2"/>
      <text x="14" y="20" class="lbl-strong">기준</text>
      <text x="240" y="20" class="lbl-strong" fill="#2a6f6f">(가) 본질론</text>
      <text x="660" y="20" class="lbl-strong" fill="#a83a4a">(나) 모순 비판</text>

      <line x1="0" y1="30" x2="1080" y2="30" stroke="#7a6f5f" stroke-width="0.6"/>
      <text x="14" y="56" class="lbl">유추의 위치</text>
      <text x="240" y="56" class="lbl">법 해석의 본질 (격상)</text>
      <text x="660" y="56" class="lbl">사례 직접 비교의 효율적 추론</text>

      <line x1="0" y1="68" x2="1080" y2="68" stroke="#c9bfa8" stroke-width="0.5"/>
      <text x="14" y="94" class="lbl">법 해석의 성격</text>
      <text x="240" y="94" class="lbl">동화 과정 (규범 ↔ 사실)</text>
      <text x="660" y="94" class="lbl">일반 명제가 필수적</text>

      <line x1="0" y1="106" x2="1080" y2="106" stroke="#c9bfa8" stroke-width="0.5"/>
      <text x="14" y="132" class="lbl">평가</text>
      <text x="240" y="132" class="lbl" fill="#2a6f6f">전통의 한계 극복</text>
      <text x="660" y="132" class="lbl" fill="#a83a4a">법적 안정성 훼손 위험</text>
    </g>
  </g>

  <text x="1160" y="1010" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 주제 통합 · 269쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1020" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1020" width="1120" height="32" rx="6" fill="#2a6f6f"/>
    <text x="60" y="1042" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1042" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1054" x2="1160" y2="1054" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1070" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">전통적 유추 이해</text>
    <text x="240" y="1070" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">법 흠결을 메우는 보조 수단으로 유추를 인식하는 전통적 입장.</text>
    <line x1="40" y1="1084" x2="1160" y2="1084" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1100" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">(가)의 본질론</text>
    <text x="240" y="1100" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">모든 법 해석은 규범과 사례를 동화시키는 과정이며, 그 본질은 보조 수단이 아니라 유추 자체이다.</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">(나)의 유추 정의</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">사례와 사례를 직접 비교해 결론을 도출하는 추론으로, 일반 명제를 거치지 않는다는 점에서 효율적으로 보인다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">(나)의 모순 지적</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">유사·차이는 무한하므로 법적 중요성을 선별할 일반 명제가 필수적이며, 사례 직접 비교만으로는 부족하다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">법적 안정성 위험</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">유추를 본질로 격상시키면 자의적 판단으로 흘러 법적 안정성을 훼손할 위험이 있다.</text>
  </g>
</svg>
