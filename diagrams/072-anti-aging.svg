<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t72 d72">
  <title id="t72">역노화 기술 — 노화 시계를 되돌리는 시도</title>
  <desc id="d72">유전체 불안정성과 줄기세포 고갈로 진행되는 노화에 맞서, 야마나카 인자를 이용한 부분적 리프로그래밍이 텔로미어·후성 유전·줄기세포의 회춘을 시도한다.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fc}
      .panel{fill:#ffffff;stroke:#bfd0e3;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#1f5582}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#42597a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d97b6;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar72" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
    <marker id="ar72-r" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <!-- Header -->
  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#1f5582"/>
  <text x="64" y="80" class="ti" fill="#ffffff">역노화 기술 — 노화 시계를 되돌리려는 생명 과학</text>
  <text x="1136" y="80" class="sub" fill="#cfdcec" text-anchor="end">과학·기술 · 시간 순서</text>

  <!-- Scene 1: 도입 - 노화의 두 원인 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">노화의 두 원인 — 분자·세포 차원의 누적 변화</text>
    <text x="64" y="166" class="small">노화는 단순한 시간 경과가 아니라, 유전체 손상의 누적과 줄기세포 고갈로 일어나는 분자·세포 차원의 변화이다.</text>

    <g>
      <rect class="panel" x="64" y="184" width="528" height="112" rx="10"/>
      <text x="84" y="212" class="lab">유전체 불안정성</text>
      <line x1="84" y1="224" x2="572" y2="224" stroke="#dfe7f1" stroke-width="1"/>
      <text x="84" y="248" class="small">· DNA 손상 복구 시스템의 효율 저하</text>
      <text x="84" y="270" class="small">· DNA 절단·변이, 염색체 수·구조 변화 누적</text>
      <text x="84" y="292" class="it" fill="#a83a4a">→ 세포 기능에 심각한 문제 초래</text>

      <rect class="panel" x="608" y="184" width="528" height="112" rx="10"/>
      <text x="628" y="212" class="lab">줄기세포의 고갈</text>
      <line x1="628" y1="224" x2="1116" y2="224" stroke="#dfe7f1" stroke-width="1"/>
      <text x="628" y="248" class="small">· 나이가 들수록 줄기세포 활성 감소</text>
      <text x="628" y="270" class="small">· 분열 빈도가 줄어 재생 능력 저하</text>
      <text x="628" y="292" class="it" fill="#a83a4a">→ 손상된 조직의 회복이 어려워진다</text>
    </g>

    <rect x="64" y="312" width="1072" height="40" rx="8" fill="#e6eff8" stroke="#1f5582" stroke-width="1.2"/>
    <text x="600" y="338" class="lab" fill="#1f5582" text-anchor="middle">최근의 돌파구 — ‘세포 리프로그래밍’을 이용한 역노화 기술</text>
  </g>

  <!-- Scene 2: 텔로미어 / 야마나카 인자 도입 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="394" class="num">2</text>
    <text x="92" y="394" class="bd">세포 리프로그래밍의 발견 — 야마나카 인자</text>
    <text x="64" y="420" class="small">분화된 체세포가 줄기세포로 다시 돌아갈 수 있다(역분화). 4가지 유전자가 핵심 스위치 역할을 한다.</text>

    <g>
      <rect x="64" y="438" width="220" height="62" rx="10" fill="#e6eff8" stroke="#bfd0e3" stroke-width="1"/>
      <text x="174" y="464" class="lab" text-anchor="middle">분화된 체세포</text>
      <text x="174" y="486" class="small" text-anchor="middle">피부·신경·간세포 등</text>

      <line x1="292" y1="469" x2="334" y2="469" stroke="#1f5582" stroke-width="2.2" marker-end="url(#ar72)"/>

      <g transform="translate(340,438)">
        <rect width="350" height="62" rx="10" fill="#e6eff8" stroke="#bfd0e3" stroke-width="1"/>
        <text x="175" y="26" class="lab" text-anchor="middle">야마나카 인자 4종 주입</text>
        <g transform="translate(20,36)">
          <rect width="68" height="20" rx="6" fill="#1f5582"/>
          <text x="34" y="14" class="pill" text-anchor="middle">Oct3/4</text>
          <rect x="78" width="64" height="20" rx="6" fill="#1f5582"/>
          <text x="110" y="14" class="pill" text-anchor="middle">Sox2</text>
          <rect x="148" width="56" height="20" rx="6" fill="#1f5582"/>
          <text x="176" y="14" class="pill" text-anchor="middle">Klf4</text>
          <rect x="210" width="64" height="20" rx="6" fill="#a83a4a"/>
          <text x="242" y="14" class="pill" text-anchor="middle">c-Myc</text>
        </g>
      </g>

      <line x1="698" y1="469" x2="740" y2="469" stroke="#1f5582" stroke-width="2.2" marker-end="url(#ar72)"/>

      <rect x="746" y="438" width="240" height="62" rx="10" fill="#1f5582"/>
      <text x="866" y="464" class="lab" fill="#ffffff" text-anchor="middle">유도 만능 줄기세포</text>
      <text x="866" y="486" class="small" fill="#cfdcec" text-anchor="middle">iPSC — 다시 줄기세포로 회귀</text>

      <text x="1004" y="464" class="small">· 노화 징후</text>
      <text x="1004" y="484" class="small">  모두 사라짐</text>
    </g>

    <text x="84" y="528" class="small">⚠ 단점 — 세포가 본래의 정체성과 기능까지 잃어버린다 (피부세포 → 줄기세포로 ‘되돌아가 버림’).</text>
    <text x="84" y="548" class="small" fill="#a83a4a">⚠ 위험 — c-Myc는 암 유발 가능성. ‘테라토마(기형종)’ 발생 위험.</text>
  </g>

  <!-- Scene 3: 부분적 리프로그래밍 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="604" class="num">3</text>
    <text x="92" y="604" class="bd">부분적 리프로그래밍 — 회춘 지점에서 멈추기</text>
    <text x="64" y="630" class="small">완전 회귀(2~3주) 대신 일시적 발현(2~4일)만 적용 → 정체성은 유지하면서 노화 징후만 개선한다.</text>

    <g>
      <!-- 시간축 -->
      <line x1="84" y1="700" x2="1116" y2="700" stroke="#1f5582" stroke-width="2"/>
      <line x1="84" y1="694" x2="84" y2="706" stroke="#1f5582" stroke-width="2"/>
      <line x1="1116" y1="694" x2="1116" y2="706" stroke="#1f5582" stroke-width="2"/>
      <text x="84" y="724" class="small" text-anchor="middle">0일</text>
      <text x="1116" y="724" class="small" text-anchor="middle">2~3주</text>

      <!-- 회춘 지점 -->
      <line x1="280" y1="668" x2="280" y2="732" stroke="#a83a4a" stroke-width="2.2" stroke-dasharray="4,3"/>
      <text x="280" y="660" class="lab" fill="#a83a4a" text-anchor="middle">회춘 지점</text>
      <text x="280" y="752" class="small" fill="#a83a4a" text-anchor="middle">2~4일 — 부분적 리프로그래밍</text>

      <!-- 영역 표시 -->
      <rect x="84" y="688" width="196" height="24" fill="#1f5582" opacity=".22"/>
      <rect x="280" y="688" width="836" height="24" fill="#1f5582" opacity=".42"/>

      <text x="182" y="704" class="small" fill="#ffffff" text-anchor="middle">유지: 체세포의 정체성</text>
      <text x="700" y="704" class="small" fill="#ffffff" text-anchor="middle">위험: 정체성 상실 → 유도 만능 줄기세포(iPSC) — 테라토마 위험</text>
    </g>

    <text x="84" y="788" class="it" fill="#1f5582">최근에는 c-Myc를 제외한 3가지 인자만으로도 부분적 리프로그래밍에 의한 역노화에 성공했다.</text>
  </g>

  <!-- Scene 4: 한계와 전망 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="838" class="num">4</text>
    <text x="92" y="838" class="bd">한계와 전망 — 안전성·정밀성·지속성</text>
    <text x="64" y="864" class="small">혁신성 만큼 미해결 과제도 많다. 안전성 확보와 ‘회춘 지점’ 정밀 제어가 핵심.</text>

    <g>
      <rect class="panel" x="64" y="882" width="346" height="128" rx="10"/>
      <text x="84" y="910" class="lab">안전성</text>
      <line x1="84" y1="922" x2="390" y2="922" stroke="#dfe7f1" stroke-width="1"/>
      <text x="84" y="946" class="small">· 테라토마(기형종) 발생 위험</text>
      <text x="84" y="968" class="small">· 비정상 분화로 악성 종양 가능성</text>
      <text x="84" y="990" class="it" fill="#a83a4a">위험을 완전히 없앨 수 있는지 불투명</text>

      <rect class="panel" x="426" y="882" width="346" height="128" rx="10"/>
      <text x="446" y="910" class="lab">정밀성</text>
      <line x1="446" y1="922" x2="752" y2="922" stroke="#dfe7f1" stroke-width="1"/>
      <text x="446" y="946" class="small">· ‘회춘 지점’의 위치가 미정</text>
      <text x="446" y="968" class="small">· 세포별 적정 발현 기간 미상</text>
      <text x="446" y="990" class="it" fill="#a83a4a">표적 세포별 맞춤 제어 필요</text>

      <rect class="panel" x="788" y="882" width="348" height="128" rx="10"/>
      <text x="808" y="910" class="lab">지속성과 전망</text>
      <line x1="808" y1="922" x2="1116" y2="922" stroke="#dfe7f1" stroke-width="1"/>
      <text x="808" y="946" class="small">· 역노화 상태의 지속 기간 불확실</text>
      <text x="808" y="968" class="small">· 윤리·자원 분배 등 사회적 쟁점</text>
      <text x="808" y="990" class="it" fill="#1f5582">불로장생의 꿈 — 신중한 접근 필요</text>
    </g>
  </g>

  <text x="1140" y="1054" class="wm" text-anchor="end">EBS 2027 · 과학·기술 · 308쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">노화의 분자적 이해</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">시간 경과의 결과가 아니라 분자·세포 차원의 누적된 변화로 이해된다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">텔로미어와 텔로머라아제</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">분열마다 짧아지는 염색체 끝부분과 이를 연장하는 효소가 역노화의 한 표적.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">후성 유전 리프로그래밍</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">나이 들며 변한 후성 유전적 마커를 젊은 패턴으로 되돌리는 기술.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">줄기세포 활성화</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">활성을 잃은 줄기세포를 활성화하거나 이식해 조직 재생을 촉진한다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">윤리적·사회적 쟁점</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">수명 연장의 기대와 함께 자원 분배·세대 격차·인구 구조 등의 쟁점이 제기된다.</text>
  </g>
</svg>
