<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" role="img" aria-labelledby="t7 d7">
  <title id="t7">임베딩과 유사도 표현</title>
  <desc id="d7">단어를 숫자로 표현하는 가장 단순한 방법인 원-핫 인코딩의 한계(차원 폭발 + 의미 무관)에서 출발해, 임베딩이 단어를 좌표 공간의 점으로 표현하여 의미가 비슷한 단어들이 가까이 모이도록 학습한다는 점, 워드투벡의 두 학습 방법(전후 문맥 빈칸 채우기, 다음 단어 예측), 그리고 최종적으로 좌표 평면에서 두 점 사이 거리가 의미 유사도를 나타낸다는 결론을 시각화한다.</desc>

  <defs>
    <marker id="ar7-sci" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
    <marker id="ar7-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .mono { font-family: ui-monospace, monospace; font-size: 12px; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .sci { fill: #1f5582; }
    .sci-st { stroke: #1f5582; }
    .sci-bg { fill: rgba(31,85,130,0.08); }
    .sci-bg2 { fill: rgba(31,85,130,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- ===========================================================
       Step 1 · 원-핫 인코딩과 한계
       =========================================================== -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="240" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <rect x="40" y="30" width="1120" height="34" rx="6" class="acc"/>
    <text x="60" y="54" class="lbl-strong" fill="#f5f1e8">원-핫 인코딩 — 가장 단순한 방법, 그러나…</text>

    <!-- 좌측: 단어 → 벡터 -->
    <g transform="translate(60, 90)">
      <text x="0" y="0" class="lbl-strong">단어 → 숫자 벡터</text>
      <g transform="translate(0, 16)">
        <rect x="0" y="0" width="240" height="32" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="14" y="20" class="lbl">사과</text>
        <text x="80" y="20" class="mono" fill="#1f5582">→  ( 1, 0, 0 )</text>

        <rect x="0" y="40" width="240" height="32" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="14" y="60" class="lbl">배</text>
        <text x="80" y="60" class="mono" fill="#1f5582">→  ( 0, 1, 0 )</text>

        <rect x="0" y="80" width="240" height="32" rx="3" class="paper2 ink" stroke-width="1"/>
        <text x="14" y="100" class="lbl">딸기</text>
        <text x="80" y="100" class="mono" fill="#1f5582">→  ( 0, 0, 1 )</text>

        <text x="0" y="138" class="lbl-xs" fill="#7a6f5f">한 자리만 1, 나머지는 0</text>
      </g>
    </g>

    <!-- 중앙: 3차원 공간에서 모두 같은 거리 -->
    <g transform="translate(420, 156)">
      <text x="0" y="-50" text-anchor="middle" class="lbl-strong">3차원 공간에서 보면…</text>
      <!-- 축 -->
      <line x1="-60" y1="40" x2="60" y2="40" class="ink" stroke-width="1"/>
      <line x1="-60" y1="40" x2="-60" y2="-40" class="ink" stroke-width="1"/>
      <line x1="-60" y1="40" x2="-30" y2="60" class="ink" stroke-width="1"/>
      <text x="64" y="44" class="lbl-xs">x</text>
      <text x="-64" y="-44" text-anchor="end" class="lbl-xs">y</text>
      <text x="-32" y="68" class="lbl-xs">z</text>

      <!-- 단어 점들 (각 축 끝) -->
      <circle cx="50" cy="40" r="6" class="acc"/>
      <text x="56" y="36" class="lbl-xs" fill="#a83a4a" font-weight="700">사과</text>
      <circle cx="-60" cy="-30" r="6" class="acc"/>
      <text x="-66" y="-34" text-anchor="end" class="lbl-xs" fill="#a83a4a" font-weight="700">배</text>
      <circle cx="-20" cy="56" r="6" class="acc"/>
      <text x="-14" y="64" class="lbl-xs" fill="#a83a4a" font-weight="700">딸기</text>

      <!-- 점 사이 거리 모두 동일 표시 -->
      <line x1="50" y1="40" x2="-60" y2="-30" stroke="#7a6f5f" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="50" y1="40" x2="-20" y2="56" stroke="#7a6f5f" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="-60" y1="-30" x2="-20" y2="56" stroke="#7a6f5f" stroke-width="0.8" stroke-dasharray="2 2"/>
      <text x="0" y="100" text-anchor="middle" class="lbl-xs" fill="#a83a4a">→ 모든 단어가 등거리: 의미 차이 X</text>
    </g>

    <!-- 우측: 한계 -->
    <g transform="translate(700, 90)">
      <text x="0" y="0" class="lbl-strong" fill="#a83a4a">두 가지 한계</text>

      <rect x="0" y="16" width="440" height="56" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="36" class="lbl-sm" font-weight="700">① 의미 무관</text>
      <text x="14" y="56" class="lbl-xs">사과·배는 모두 과일인데 좌표상 거리는 모두 같음</text>

      <rect x="0" y="80" width="440" height="56" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="100" class="lbl-sm" font-weight="700">② 차원 폭발</text>
      <text x="14" y="120" class="lbl-xs">단어 1만 개 → 1만 차원 벡터. 데이터 다루기 어려움</text>
    </g>
  </g>

  <!-- ===========================================================
       Step 2 · 임베딩 도입
       =========================================================== -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="290" width="1120" height="160" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <rect x="40" y="290" width="1120" height="34" rx="6" class="sci"/>
    <text x="60" y="314" class="lbl-strong" fill="#f5f1e8">임베딩 — 의미 관계를 좌표 공간에 새기다</text>

    <text x="60" y="354" class="lbl">단어를 (x, y) 또는 그 이상의 차원을 가진 <tspan font-weight="700" fill="#1f5582">실수 벡터</tspan>로 표현하되,</text>
    <text x="60" y="376" class="lbl"><tspan font-weight="700" fill="#1f5582">의미가 유사한 단어들이 좌표 공간에서 가까운 위치에 놓이도록 학습</tspan>한다.</text>
    <text x="60" y="402" class="lbl-sm">대표 모델: <tspan font-weight="700">워드투벡 (Word2Vec)</tspan> — 함께 등장하는 단어 패턴을 분석해 비슷한 문맥의 단어에 비슷한 좌표를 부여</text>
    <text x="60" y="424" class="lbl-xs" fill="#1f5582" font-weight="700">→ 원-핫의 두 한계(의미 무관·차원 폭발)를 동시에 해결</text>
  </g>

  <!-- ===========================================================
       Step 3 · 학습 방법 ① 전후 문맥
       =========================================================== -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="470" width="540" height="200" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="498" class="lbl-strong">학습 방법 ① 전후 문맥에서 빈칸 채우기</text>

    <!-- 예시 -->
    <g transform="translate(60, 522)">
      <rect x="0" y="0" width="500" height="40" rx="4" class="paper2 ink" stroke-width="1"/>
      <text x="14" y="26" class="mono">"나는 ____ 좋아한다"</text>
      <text x="240" y="26" class="lbl-sm" fill="#1f5582">← 빈칸 예측</text>
    </g>

    <!-- 후보 -->
    <g transform="translate(60, 580)">
      <rect x="0" y="0" width="80" height="28" rx="3" class="sci"/>
      <text x="40" y="18" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">사과</text>

      <rect x="100" y="0" width="80" height="28" rx="3" class="sci"/>
      <text x="140" y="18" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">배</text>

      <rect x="200" y="0" width="80" height="28" rx="3" class="sci"/>
      <text x="240" y="18" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">딸기</text>

      <text x="300" y="18" class="lbl-sm">→ 비슷한 문맥에 자주 등장</text>
    </g>

    <text x="60" y="650" class="lbl-xs" fill="#1f5582" font-weight="700">→ 같은 빈칸을 채우는 단어들 → 좌표가 비슷하게 학습됨</text>
  </g>

  <!-- ===========================================================
       Step 4 · 학습 방법 ② 다음 단어
       =========================================================== -->
  <g class="reveal" data-reveal-step="4">
    <rect x="620" y="470" width="540" height="200" rx="6" class="paper rule" stroke-width="1"/>
    <text x="640" y="498" class="lbl-strong">학습 방법 ② 다음 단어 예측</text>

    <!-- 예시 -->
    <g transform="translate(640, 522)">
      <rect x="0" y="0" width="80" height="40" rx="3" class="sci"/>
      <text x="40" y="26" text-anchor="middle" class="mono" fill="#f5f1e8" font-weight="700">사과</text>

      <line x1="84" y1="20" x2="116" y2="20" class="sci-st" stroke-width="1.6" marker-end="url(#ar7-sci)"/>

      <rect x="120" y="0" width="100" height="40" rx="3" fill="none" class="sci-st" stroke-width="1.4" stroke-dasharray="3 2"/>
      <text x="170" y="26" text-anchor="middle" class="mono" fill="#1f5582">??? 예측</text>
    </g>

    <!-- 자주 함께 나오는 단어 -->
    <g transform="translate(640, 580)">
      <text x="0" y="0" class="lbl-sm">자주 함께 등장하는 단어:</text>
      <rect x="0" y="10" width="80" height="22" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="40" y="26" text-anchor="middle" class="lbl-xs">먹다</text>
      <rect x="90" y="10" width="80" height="22" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="130" y="26" text-anchor="middle" class="lbl-xs">달다</text>
      <rect x="180" y="10" width="80" height="22" rx="3" class="paper2 ink" stroke-width="1"/>
      <text x="220" y="26" text-anchor="middle" class="lbl-xs">맛있다</text>
    </g>

    <text x="640" y="650" class="lbl-xs" fill="#1f5582" font-weight="700">→ "사과"와 자주 같이 나오는 단어들 → 좌표 공간에서 가까이 위치</text>
  </g>

  <!-- ===========================================================
       Step 5 · 좌표 평면 = 거리
       =========================================================== -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="690" width="1120" height="220" rx="6" class="sci-bg2 sci-st" stroke-width="1.5"/>
    <text x="60" y="718" class="lbl-head" fill="#1f5582">결과 — 좌표 평면에서 거리 = 의미 유사도</text>

    <!-- 좌표 평면 -->
    <g transform="translate(160, 800)">
      <!-- 축 -->
      <line x1="-100" y1="60" x2="280" y2="60" class="ink" stroke-width="1"/>
      <line x1="-100" y1="-60" x2="-100" y2="80" class="ink" stroke-width="1"/>
      <text x="284" y="64" class="lbl-xs">x</text>
      <text x="-104" y="-64" text-anchor="end" class="lbl-xs">y</text>

      <!-- 과일 클러스터 -->
      <circle cx="-30" cy="0" r="6" class="sci"/>
      <text x="-26" y="-8" class="lbl-xs" fill="#1f5582" font-weight="700">사과</text>
      <circle cx="-10" cy="-12" r="6" class="sci"/>
      <text x="-6" y="-20" class="lbl-xs" fill="#1f5582" font-weight="700">배</text>
      <circle cx="-22" cy="14" r="6" class="sci"/>
      <text x="-18" y="22" class="lbl-xs" fill="#1f5582" font-weight="700">딸기</text>
      <!-- 클러스터 원 -->
      <ellipse cx="-22" cy="0" rx="32" ry="22" fill="none" class="sci-st" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="20" y="-20" class="lbl-xs" fill="#1f5582">과일 클러스터</text>

      <!-- 동물 클러스터 (반대편) -->
      <circle cx="180" cy="20" r="6" fill="#5e8c5e"/>
      <text x="186" y="14" class="lbl-xs" fill="#5e8c5e" font-weight="700">개</text>
      <circle cx="200" cy="34" r="6" fill="#5e8c5e"/>
      <text x="206" y="30" class="lbl-xs" fill="#5e8c5e" font-weight="700">고양이</text>
      <circle cx="218" cy="14" r="6" fill="#5e8c5e"/>
      <text x="224" y="8" class="lbl-xs" fill="#5e8c5e" font-weight="700">토끼</text>
      <ellipse cx="200" cy="22" rx="36" ry="22" fill="none" stroke="#5e8c5e" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="240" y="-2" class="lbl-xs" fill="#5e8c5e">동물 클러스터</text>

      <!-- 거리 표시 -->
      <line x1="-22" y1="0" x2="200" y2="22" stroke="#a83a4a" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="90" y="6" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">멀다 = 의미 다름</text>

      <line x1="-22" y1="14" x2="-10" y2="-12" stroke="#1f5582" stroke-width="1.4"/>
      <text x="-50" y="-32" class="lbl-xs" fill="#1f5582" font-weight="700">가깝다 = 의미 유사</text>
    </g>

    <!-- 핵심 한 줄 -->
    <g transform="translate(580, 750)">
      <rect x="0" y="0" width="540" height="120" rx="4" class="paper rule" stroke-width="1.2"/>
      <text x="14" y="22" class="lbl-strong" fill="#1f5582">핵심: 거리 = 의미 유사도</text>
      <text x="14" y="44" class="lbl-sm">두 단어 점 사이의 거리가 가까울수록</text>
      <text x="14" y="62" class="lbl-sm">두 단어의 의미가 유사하다고 해석</text>
      <text x="14" y="92" class="lbl-xs" fill="#1f5582" font-weight="700">활용: 자연어 처리, 추천 시스템 등</text>
      <text x="14" y="108" class="lbl-xs">단어의 의미적 유사도를 계산하는 기반</text>
    </g>
  </g>

  <text x="1160" y="930" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 과학·기술 · 198쪽</text>
</svg>
