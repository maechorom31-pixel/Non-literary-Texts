<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="t24 d24">
  <title id="t24">기원 본질주의</title>
  <desc id="d24">"다른 부모에게서 태어났다면 그것도 나일까?"라는 문제 제기에서 출발해, 내 삶의 가능성이 한 시작점에서 갈라지는 거대한 나무 비유로 기원 본질주의를 도해하고, 경험과 유전자가 '나만의 X'가 될 수 없는 이유, 크립키의 알파/베타 논증, 그리고 접합자 재활용 시나리오라는 반박 사례까지 차례로 시각화한다.</desc>

  <defs>
    <marker id="ar24-hum" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5e548e"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .quote { font-family: 'Noto Serif KR', serif; font-size: 12px; font-style: italic; fill: #5e548e; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .hum { fill: #5e548e; }
    .hum-st { stroke: #5e548e; }
    .hum-bg { fill: rgba(94,84,142,0.08); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
  ]]></style>

  <!-- Step 1 · 문제 제기 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="100" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">문제 제기 — "다른 부모에게서 태어났다면 그것도 나일까?"</text>
    <text x="60" y="86" class="lbl">대부분 사람들은 자신이 인간 외 다른 어떤 것도 될 수 없다고 생각한다.</text>
    <text x="60" y="108" class="lbl-sm">→ 한 달만 더 기다렸다면? 다른 정자-난자 쌍에서 다른 아이가 태어났을 것이다.</text>
  </g>

  <!-- Step 2 · 기원 본질주의 + 나무 비유 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="150" width="1120" height="240" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="178" class="lbl-head" fill="#5e548e">기원 본질주의 — 모든 가지가 한 시작점에서</text>
    <text x="60" y="200" class="lbl-sm">나를 나답게 만드는 고유 특징 = 나의 기원 (태어나게 한 출발점)</text>

    <!-- 삶의 나무 -->
    <g transform="translate(600, 360)">
      <!-- 나무 줄기 (시작점) -->
      <rect x="-12" y="-10" width="24" height="14" class="hum"/>
      <circle cx="0" cy="-2" r="14" class="hum"/>
      <text x="0" y="2" text-anchor="middle" font-size="11" fill="#f5f1e8" font-weight="700">기원</text>

      <!-- 가지들 (가능성) -->
      <g stroke="#5e548e" stroke-width="1.4" fill="none">
        <line x1="0" y1="-14" x2="-260" y2="-130"/>
        <line x1="0" y1="-14" x2="-180" y2="-150"/>
        <line x1="0" y1="-14" x2="-100" y2="-160"/>
        <line x1="0" y1="-14" x2="-20" y2="-170"/>
        <line x1="0" y1="-14" x2="60" y2="-170"/>
        <line x1="0" y1="-14" x2="140" y2="-160"/>
        <line x1="0" y1="-14" x2="220" y2="-150"/>
        <line x1="0" y1="-14" x2="280" y2="-130"/>
      </g>
      <!-- 잔가지 -->
      <g stroke="#5e548e" stroke-width="0.8" fill="none" opacity="0.7">
        <line x1="-180" y1="-150" x2="-220" y2="-200"/>
        <line x1="-180" y1="-150" x2="-160" y2="-210"/>
        <line x1="-100" y1="-160" x2="-140" y2="-220"/>
        <line x1="-100" y1="-160" x2="-80" y2="-220"/>
        <line x1="-20" y1="-170" x2="-40" y2="-220"/>
        <line x1="-20" y1="-170" x2="0" y2="-230"/>
        <line x1="60" y1="-170" x2="40" y2="-230"/>
        <line x1="60" y1="-170" x2="80" y2="-220"/>
        <line x1="140" y1="-160" x2="120" y2="-220"/>
        <line x1="140" y1="-160" x2="160" y2="-210"/>
        <line x1="220" y1="-150" x2="200" y2="-200"/>
      </g>
      <!-- 잎 (가능한 삶들) -->
      <g class="hum" opacity="0.7">
        <circle cx="-220" cy="-200" r="6"/>
        <circle cx="-160" cy="-210" r="6"/>
        <circle cx="-140" cy="-220" r="6"/>
        <circle cx="-80" cy="-220" r="6"/>
        <circle cx="-40" cy="-220" r="6"/>
        <circle cx="0" cy="-230" r="6"/>
        <circle cx="40" cy="-230" r="6"/>
        <circle cx="80" cy="-220" r="6"/>
        <circle cx="120" cy="-220" r="6"/>
        <circle cx="160" cy="-210" r="6"/>
        <circle cx="200" cy="-200" r="6"/>
      </g>

      <text x="-280" y="-228" class="lbl-xs" fill="#5e548e">"이 글을 읽기 대신 게임"</text>
      <text x="180" y="-228" class="lbl-xs" fill="#5e548e">"엄마에게 더 다정"</text>
      <text x="0" y="50" text-anchor="middle" class="lbl-xs" fill="#5e548e" font-weight="700">↑ 모든 갈림길은 이 한 시작점에서 갈라진다</text>
    </g>
  </g>

  <!-- Step 3 · 경험·유전자 검토 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="410" width="1120" height="160" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="438" class="lbl-head">'나만의 X' 후보 검토 — 경험과 유전자도 아니다</text>

    <g transform="translate(80, 460)">
      <rect x="0" y="0" width="500" height="84" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">경험은 X가 될 수 없다</text>
      <text x="14" y="44" class="lbl-sm">다른 사람이 우연히 똑같은 경험을 가질 가능성 ↗</text>
      <text x="14" y="62" class="lbl-sm">예: 태어날 때 다른 아기와 바뀐 경우</text>
      <text x="14" y="78" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 나만의 고유 속성이 아님</text>
    </g>

    <g transform="translate(620, 460)">
      <rect x="0" y="0" width="500" height="84" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="14" y="22" class="lbl-strong" fill="#a83a4a">유전자도 X가 될 수 없다</text>
      <text x="14" y="44" class="lbl-sm">일란성 쌍둥이 = 유전자 동일</text>
      <text x="14" y="62" class="lbl-sm">그런데 서로 다른 개체</text>
      <text x="14" y="78" class="lbl-xs" fill="#a83a4a" font-weight="700">→ 나만의 고유 속성이 아님</text>
    </g>
  </g>

  <!-- Step 4 · 크립키 논증 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="590" width="1120" height="180" rx="6" class="hum-bg hum-st" stroke-width="1.5"/>
    <text x="60" y="618" class="lbl-head" fill="#5e548e">크립키의 옹호 논증 — 알파 vs 베타</text>

    <g transform="translate(80, 640)">
      <!-- 알파 -->
      <rect x="0" y="0" width="220" height="60" rx="4" class="hum"/>
      <text x="110" y="22" text-anchor="middle" class="lbl-strong" fill="#f5f1e8">접합자 α (실제)</text>
      <text x="110" y="42" text-anchor="middle" class="lbl-xs" fill="#f5f1e8">내가 실제로 유래한 정자-난자 융합</text>

      <text x="240" y="38" text-anchor="middle" class="lbl-head" fill="#a83a4a">vs</text>

      <!-- 베타 -->
      <rect x="280" y="0" width="220" height="60" rx="4" class="paper2 ink" stroke-width="1.4"/>
      <text x="390" y="22" text-anchor="middle" class="lbl-strong">접합자 β (가상)</text>
      <text x="390" y="42" text-anchor="middle" class="lbl-xs">제삼자가 유래한 다른 융합</text>
    </g>

    <g transform="translate(640, 640)">
      <rect x="0" y="0" width="500" height="100" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong" fill="#5e548e">논증 흐름</text>
      <text x="14" y="44" class="lbl-sm">만약 α와 β 둘 다 나의 기원일 수 있다면…</text>
      <text x="14" y="62" class="lbl-sm">→ 한 사람은 α에서, 다른 사람은 β에서 유래</text>
      <text x="14" y="78" class="lbl-sm">→ 두 사람 모두 '나'?</text>
      <text x="14" y="96" class="lbl-xs" fill="#a83a4a" font-weight="700">불가능 (동시에 두 곳에 있을 수 없음) → α만이 나의 기원</text>
    </g>
  </g>

  <!-- Step 5 · 접합자 재활용 반박 -->
  <g class="reveal" data-reveal-step="5">
    <rect x="40" y="790" width="1120" height="180" rx="6" class="acc-bg acc-st" stroke-width="1.5"/>
    <text x="60" y="818" class="lbl-head" fill="#a83a4a">접합자 재활용 시나리오 — 기원조차 고유하지 않다?</text>

    <g transform="translate(80, 840)">
      <!-- 원래 접합자 -->
      <circle cx="40" cy="40" r="22" class="hum"/>
      <text x="40" y="44" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">α</text>

      <!-- 화살표: 태아로 성장하며 원자 일부 버림 -->
      <line x1="64" y1="40" x2="120" y2="40" class="hum-st" stroke-width="1.4" marker-end="url(#ar24-hum)"/>
      <text x="92" y="32" text-anchor="middle" class="lbl-xs" fill="#5e548e">원자 버림</text>

      <!-- 버려진 원자들 -->
      <g class="hum" opacity="0.5">
        <circle cx="140" cy="20" r="3"/>
        <circle cx="160" cy="40" r="3"/>
        <circle cx="148" cy="56" r="3"/>
        <circle cx="174" cy="22" r="3"/>
      </g>

      <line x1="184" y1="40" x2="220" y2="40" class="hum-st" stroke-width="1.4" stroke-dasharray="2 2" marker-end="url(#ar24-hum)"/>
      <text x="200" y="60" text-anchor="middle" class="lbl-xs" fill="#5e548e">우연히 같은 배열로</text>

      <!-- 재활용 접합자 -->
      <circle cx="260" cy="40" r="22" class="hum" opacity="0.7"/>
      <text x="260" y="44" text-anchor="middle" class="lbl-xs" fill="#f5f1e8" font-weight="700">α'</text>
      <text x="260" y="78" text-anchor="middle" class="lbl-xs" fill="#5e548e">재활용 접합자</text>

      <!-- 두 아이 -->
      <line x1="40" y1="64" x2="40" y2="100" class="hum-st" stroke-width="1.4" marker-end="url(#ar24-hum)"/>
      <text x="40" y="118" text-anchor="middle" class="lbl-sm" font-weight="700">아이 A</text>

      <line x1="260" y1="64" x2="260" y2="100" class="hum-st" stroke-width="1.4" marker-end="url(#ar24-hum)"/>
      <text x="260" y="118" text-anchor="middle" class="lbl-sm" font-weight="700">아이 B</text>

      <!-- 결론 박스 -->
      <rect x="380" y="0" width="660" height="118" rx="4" class="paper2 ink" stroke-width="1.4"/>
      <text x="394" y="22" class="lbl-strong">반박의 핵심</text>
      <text x="394" y="44" class="lbl-sm">α의 원자들이 또 다른 접합자(α')를 형성한다면</text>
      <text x="394" y="62" class="lbl-sm">→ 두 아이가 모두 '나'가 되는 시나리오</text>
      <text x="394" y="80" class="lbl-sm" fill="#a83a4a" font-weight="700">→ 이것은 불가능</text>
      <text x="394" y="104" class="lbl-xs" fill="#a83a4a" font-weight="700">⇒ 우리의 기원조차 형이상학적으로 고유하지 않을 수 있다</text>
    </g>
  </g>

  <text x="1160" y="990" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 인문·예술 · 96쪽</text>
</svg>
