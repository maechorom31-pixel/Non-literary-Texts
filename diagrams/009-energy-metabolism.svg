<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1220" role="img" aria-labelledby="t9 d9">
  <title id="t9">인체 내 에너지 대사와 항상성</title>
  <desc id="d9">에너지 대사를 음식물 섭취와 소비의 균형으로 정의한 양팔 저울에서 출발해, 에너지 소비를 기초 대사량(60~75%)·활동 대사량·식이 유발성 열 발생(약 10%)으로 나눈 비례 막대, 인체 도식 위에 췌장(인슐린·글루카곤)·위(그렐린)·지방 세포(렙틴)의 분비 부위와 작용 방향을 표시한 호르몬 메커니즘, 그리고 균형 회복을 위한 생활 습관과 의학적 접근까지를 차근차근 보여 준다.</desc>

  <defs>
    <marker id="ar9-up" viewBox="0 0 1200 1220" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a83a4a"/>
    </marker>
    <marker id="ar9-dn" viewBox="0 0 1200 1220" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f5582"/>
    </marker>
  </defs>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .ink-fill { fill: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .sci { fill: #1f5582; }
    .sci-st { stroke: #1f5582; }
    .sci-bg { fill: rgba(31,85,130,0.08); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
    .body-fill { fill: #ebe5d4; stroke: #7a6f5f; stroke-width: 1.2; }
  ]]></style>

  <!-- ===========================================================
       Step 1 · 양팔 저울
       =========================================================== -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="200" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">에너지 대사 = 섭취 ↔ 소비</text>

    <!-- 양팔 저울 -->
    <g transform="translate(600, 168)">
      <!-- 기둥 -->
      <line x1="0" y1="-78" x2="0" y2="40" class="ink" stroke-width="2"/>
      <!-- 가로대 -->
      <line x1="-220" y1="-78" x2="220" y2="-78" class="ink" stroke-width="2"/>
      <!-- 받침 -->
      <polygon points="-20,40 20,40 0,72" class="ink-fill"/>
      <rect x="-60" y="72" width="120" height="6" class="ink-fill"/>

      <!-- 왼쪽 (섭취) -->
      <line x1="-220" y1="-78" x2="-220" y2="-30" class="ink" stroke-width="1"/>
      <line x1="-260" y1="-30" x2="-180" y2="-30" class="ink" stroke-width="1"/>
      <rect x="-275" y="-30" width="110" height="46" rx="4" class="acc-bg acc-st" stroke-width="1.4"/>
      <text x="-220" y="-10" text-anchor="middle" class="lbl-strong" fill="#a83a4a">섭취</text>
      <text x="-220" y="8" text-anchor="middle" class="lbl-xs">음식물 → 영양소</text>
      <g transform="translate(-220, -56)">
        <path d="M-10,0 Q-10,-8 0,-8 Q10,-8 10,0 Z" fill="#a83a4a" opacity="0.7"/>
        <line x1="-10" y1="0" x2="10" y2="0" stroke="#a83a4a" stroke-width="1"/>
      </g>

      <!-- 오른쪽 (소비) -->
      <line x1="220" y1="-78" x2="220" y2="-30" class="ink" stroke-width="1"/>
      <line x1="180" y1="-30" x2="260" y2="-30" class="ink" stroke-width="1"/>
      <rect x="165" y="-30" width="110" height="46" rx="4" class="sci-bg sci-st" stroke-width="1.4"/>
      <text x="220" y="-10" text-anchor="middle" class="lbl-strong" fill="#1f5582">소비</text>
      <text x="220" y="8" text-anchor="middle" class="lbl-xs">기초 + 활동 + 열 발생</text>
      <g transform="translate(220, -56)">
        <path d="M0,-10 Q-6,-2 -4,4 Q-2,8 0,6 Q4,8 4,2 Q6,-2 0,-10 Z" fill="#1f5582" opacity="0.7"/>
      </g>
    </g>

    <!-- 좌우 결과 -->
    <text x="120" y="218" class="lbl"><tspan font-weight="700" fill="#a83a4a">섭취 &gt; 소비</tspan> → 잉여 에너지가 지방으로 저장 (체중 ↑)</text>
    <text x="700" y="218" class="lbl"><tspan font-weight="700" fill="#1f5582">섭취 &lt; 소비</tspan> → 저장 에너지 소모 (체중 ↓)</text>
  </g>

  <!-- ===========================================================
       Step 2 · 세 가지 소비 항목
       =========================================================== -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="250" width="1120" height="200" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <text x="60" y="278" class="lbl-head" fill="#1f5582">에너지 소비의 세 가지 구성</text>
    <text x="60" y="298" class="lbl-sm">생활 활동에 따라 비중이 달라지지만, 큰 그림은 다음과 같다.</text>

    <!-- 비율 막대 -->
    <g transform="translate(60, 320)">
      <rect x="0" y="0" width="1080" height="48" fill="#ebe5d4" stroke="#7a6f5f" stroke-width="1"/>
      <rect x="0" y="0" width="730" height="48" fill="#1f5582"/>
      <text x="365" y="30" text-anchor="middle" font-size="14" fill="#f5f1e8" font-weight="700">기초 대사량 60~75%</text>
      <rect x="730" y="0" width="240" height="48" fill="#5a8bb5"/>
      <text x="850" y="30" text-anchor="middle" font-size="13" fill="#f5f1e8">활동 대사량 (개인차 큼)</text>
      <rect x="970" y="0" width="110" height="48" fill="#a5b8d4"/>
      <text x="1025" y="30" text-anchor="middle" font-size="11" fill="#1a1612">식이 유발 ~10%</text>
    </g>

    <text x="60" y="396" class="lbl-sm"><tspan font-weight="700" fill="#1a1612">기초 대사량</tspan>: 호흡·체온 유지 등 생명 유지 최소 에너지 (가장 큰 비중)</text>
    <text x="60" y="416" class="lbl-sm"><tspan font-weight="700">활동 대사량</tspan>: 일상 활동·운동 / <tspan font-weight="700">식이 유발성 열 발생</tspan>: 소화·흡수·대사 과정에서 발생</text>
    <text x="60" y="438" class="lbl-xs" fill="#7a6f5f">→ 같은 양을 먹어도 사람마다 체중 변화가 다른 이유는 이 세 항목의 비중이 다르기 때문</text>
  </g>

  <!-- ===========================================================
       Step 3 · 인체 도식 + 호르몬 (좌측 인체 / 우측 호르몬 카드 2개)
       =========================================================== -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="470" width="1120" height="400" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="498" class="lbl-head">항상성을 유지하는 네 호르몬 — 분비 부위와 작용 방향</text>

    <!-- 인체 실루엣 (좌측) -->
    <g transform="translate(200, 690)">
      <!-- 머리 -->
      <ellipse cx="0" cy="-130" rx="22" ry="26" class="body-fill"/>
      <!-- 목 -->
      <rect x="-8" y="-104" width="16" height="14" class="body-fill"/>
      <!-- 몸통 -->
      <path d="M-50,-90 Q-58,-60 -56,-20 Q-54,30 -42,80 L42,80 Q54,30 56,-20 Q58,-60 50,-90 Z" class="body-fill"/>
      <!-- 팔 -->
      <path d="M-50,-86 Q-78,-50 -82,0 Q-82,30 -76,40 L-66,38 Q-62,10 -56,-20" class="body-fill"/>
      <path d="M50,-86 Q78,-50 82,0 Q82,30 76,40 L66,38 Q62,10 56,-20" class="body-fill"/>

      <!-- 위 (그렐린) -->
      <ellipse cx="-12" cy="-30" rx="22" ry="14" fill="#a83a4a" opacity="0.85"/>
      <text x="-12" y="-26" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">위</text>

      <!-- 췌장 (인슐린·글루카곤) -->
      <ellipse cx="6" cy="-4" rx="32" ry="9" fill="#5e548e" opacity="0.9"/>
      <text x="6" y="-1" text-anchor="middle" font-size="9" fill="#f5f1e8" font-weight="700">췌장</text>

      <!-- 지방 세포 (렙틴) - 복부 -->
      <g transform="translate(-2, 36)">
        <circle cx="0" cy="0" r="12" fill="#1f5582" opacity="0.8"/>
        <circle cx="-14" cy="6" r="9" fill="#1f5582" opacity="0.8"/>
        <circle cx="12" cy="8" r="10" fill="#1f5582" opacity="0.8"/>
        <text x="0" y="3" text-anchor="middle" font-size="8" fill="#f5f1e8" font-weight="700">지방</text>
      </g>

      <!-- leader line: 위 → 그렐린 카드 -->
      <line x1="10" y1="-30" x2="200" y2="-130" stroke="#a83a4a" stroke-width="1" stroke-dasharray="2 2"/>
      <!-- leader line: 췌장 → 두 카드 -->
      <line x1="38" y1="-4" x2="200" y2="-30" stroke="#5e548e" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="38" y1="-2" x2="200" y2="50" stroke="#5e548e" stroke-width="1" stroke-dasharray="2 2"/>
      <!-- leader line: 지방 → 렙틴 -->
      <line x1="14" y1="44" x2="200" y2="120" stroke="#1f5582" stroke-width="1" stroke-dasharray="2 2"/>
    </g>

    <!-- 4개 호르몬 카드 (우측) -->
    <!-- 인슐린 (췌장) -->
    <g transform="translate(420, 530)">
      <rect x="0" y="0" width="340" height="74" rx="4" class="paper2 ink" stroke-width="1"/>
      <rect x="0" y="0" width="340" height="22" rx="4" fill="#1f5582"/>
      <text x="14" y="16" font-family="Noto Serif KR" font-size="12" fill="#f5f1e8" font-weight="700">인슐린</text>
      <text x="76" y="16" font-size="10" fill="#f5f1e8">췌장 · 식후 혈당 ↑ 시 분비</text>
      <text x="14" y="40" class="lbl-sm">→ 포도당을 세포로 + 글리코겐·지방으로 저장</text>
      <text x="14" y="62" class="lbl-xs" fill="#1f5582" font-weight="700">결과: 혈당 ↓ (저장 모드)</text>
    </g>

    <!-- 글루카곤 (췌장) -->
    <g transform="translate(420, 614)">
      <rect x="0" y="0" width="340" height="74" rx="4" class="paper2 ink" stroke-width="1"/>
      <rect x="0" y="0" width="340" height="22" rx="4" fill="#a83a4a"/>
      <text x="14" y="16" font-family="Noto Serif KR" font-size="12" fill="#f5f1e8" font-weight="700">글루카곤</text>
      <text x="86" y="16" font-size="10" fill="#f5f1e8">췌장 · 공복 시 혈당 ↓ 시 분비</text>
      <text x="14" y="40" class="lbl-sm">→ 글리코겐 분해 → 포도당으로 변환해 혈액으로</text>
      <text x="14" y="62" class="lbl-xs" fill="#a83a4a" font-weight="700">결과: 혈당 ↑ (회복 모드)</text>
    </g>

    <!-- 그렐린 (위) -->
    <g transform="translate(780, 530)">
      <rect x="0" y="0" width="340" height="74" rx="4" class="paper2 ink" stroke-width="1"/>
      <rect x="0" y="0" width="340" height="22" rx="4" fill="#a83a4a"/>
      <text x="14" y="16" font-family="Noto Serif KR" font-size="12" fill="#f5f1e8" font-weight="700">그렐린</text>
      <text x="76" y="16" font-size="10" fill="#f5f1e8">위에서 분비</text>
      <text x="14" y="40" class="lbl-sm">→ 식욕 자극 ("먹어야겠다" 신호)</text>
      <text x="14" y="62" class="lbl-xs" fill="#a83a4a" font-weight="700">결과: 섭취량 ↑</text>
    </g>

    <!-- 렙틴 (지방) -->
    <g transform="translate(780, 614)">
      <rect x="0" y="0" width="340" height="74" rx="4" class="paper2 ink" stroke-width="1"/>
      <rect x="0" y="0" width="340" height="22" rx="4" fill="#1f5582"/>
      <text x="14" y="16" font-family="Noto Serif KR" font-size="12" fill="#f5f1e8" font-weight="700">렙틴</text>
      <text x="60" y="16" font-size="10" fill="#f5f1e8">지방 세포에서 분비</text>
      <text x="14" y="40" class="lbl-sm">→ 식욕 억제 + 에너지 소비 ↑</text>
      <text x="14" y="62" class="lbl-xs" fill="#1f5582" font-weight="700">결과: 섭취량 ↓ + 소비 ↑</text>
    </g>

    <!-- 호르몬 짝 정리 -->
    <g transform="translate(420, 712)">
      <rect x="0" y="0" width="700" height="60" rx="4" class="paper2 rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">호르몬의 짝 — 정교한 균형</text>
      <text x="14" y="44" class="lbl-sm"><tspan font-weight="700" fill="#5e548e">혈당</tspan>: 인슐린(↓) ↔ 글루카곤(↑)    /    <tspan font-weight="700" fill="#5e548e">식욕</tspan>: 렙틴(억제) ↔ 그렐린(자극)</text>
    </g>

    <!-- 인체 도식 라벨 -->
    <text x="200" y="820" text-anchor="middle" class="lbl-xs" fill="#7a6f5f">분비 부위 (인체 도식)</text>
  </g>

  <!-- ===========================================================
       Step 4 · 균형 회복
       =========================================================== -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="890" width="1120" height="60" rx="6" class="sci-bg sci-st" stroke-width="1.5"/>
    <text x="60" y="918" class="lbl-strong" fill="#1f5582">균형 회복 — 항상성은 자동만이 아니라 환경이 함께 작동</text>
    <text x="60" y="940" class="lbl">식사량 조절 · 규칙적 운동(활동 대사량 ↑) · 충분한 수면 · 스트레스 관리 + 필요 시 의학적 진단·치료</text>
  </g>

  <text x="1160" y="990" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 과학·기술 · 207쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1000" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1000" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1022" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1022" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#ffffff">6개 항목</text>
    <line x1="40" y1="1034" x2="1160" y2="1034" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1050" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">에너지 대사</text>
    <text x="240" y="1050" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">음식물에서 에너지를 얻어 소비하는 과정. 섭취량과 소비량의 차이가 체중 변화로 나타난다.</text>
    <line x1="40" y1="1064" x2="1160" y2="1064" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1080" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">기초 대사량</text>
    <text x="240" y="1080" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">생명 유지에 필요한 최소한의 에너지. 전체 소비의 60~75%로 가장 큰 비중.</text>
    <line x1="40" y1="1094" x2="1160" y2="1094" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1110" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">활동 대사량 vs 식이 유발성 열 발생</text>
    <text x="240" y="1110" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">활동 대사량은 운동·활동에 쓰이며 개인차가 크고, 식이 유발성 열 발생은 소화·흡수 과정에서 약 10%를 차지한다.</text>
    <line x1="40" y1="1124" x2="1160" y2="1124" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1140" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">혈당 조절 호르몬</text>
    <text x="240" y="1140" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">인슐린(혈당 ↓ 저장), 글루카곤(혈당 ↑ 분해)이 짝을 이뤄 혈당을 일정 범위에 유지한다.</text>
    <line x1="40" y1="1154" x2="1160" y2="1154" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1170" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">식욕 조절 호르몬</text>
    <text x="240" y="1170" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">렙틴(지방 세포 → 식욕 억제), 그렐린(위 → 식욕 자극)이 식욕의 균형을 잡는다.</text>
  </g>
</svg>
