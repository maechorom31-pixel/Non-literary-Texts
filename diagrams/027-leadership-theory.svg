<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t27 d27">
  <title id="t27">리더십 이론의 변천 — 피들러부터 자기 결정 이론까지</title>
  <desc id="d27">상황 적합성(피들러) → 구성원 성숙도(허시·블랜차드) → 거래 vs 변혁(번스·바스) → 동기 부여(로크·데시·라이언)의 흐름.</desc>
  <defs>
    <style>
      .bg{fill:#f5f9f8}
      .panel{fill:#ffffff;stroke:#c4dcd5;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#1d2a28}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#2a6f6f}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3e5953}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#436963}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d9994;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
    <marker id="ar27" viewBox="0 0 1200 1300" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a6f6f"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#2a6f6f"/>
  <text x="64" y="80" class="ti" fill="#ffffff">리더십 이론의 변천 — 상황·성숙도·변혁·동기</text>
  <text x="1136" y="80" class="sub" fill="#cfe5e1" text-anchor="end">사회·문화 · 분류</text>

  <!-- Scene 1: 피들러 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">피들러 — 상황 적합성 모형</text>
    <text x="64" y="166" class="small">“리더십은 능력이 아니라 적합성이다.” — 리더 스타일과 상황의 호의성이 맞아떨어져야 성과가 난다.</text>

    <g>
      <rect class="panel" x="64" y="184" width="528" height="124" rx="10"/>
      <text x="84" y="212" class="lab">두 가지 리더 스타일</text>
      <line x1="84" y1="224" x2="572" y2="224" stroke="#dfeae7" stroke-width="1"/>
      <text x="84" y="248" class="small">· 업무 지향형 — 목표 달성을 중시</text>
      <text x="84" y="270" class="small">· 관계 지향형 — 구성원과의 관계·소통 중시</text>
      <text x="84" y="294" class="it">스타일은 ‘고정’되어 있다고 가정</text>

      <rect class="panel" x="608" y="184" width="528" height="124" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <text x="628" y="212" class="lab" fill="#2a6f6f">상황의 호의성 — 세 변수</text>
      <line x1="628" y1="224" x2="1116" y2="224" stroke="#bfd9d3" stroke-width="1"/>
      <text x="628" y="248" class="small">· 리더-구성원 관계 (신뢰·존중)</text>
      <text x="628" y="270" class="small">· 업무 구조의 명확성</text>
      <text x="628" y="292" class="small">· 리더의 공식적 권한(채용·승진 등)</text>
    </g>

    <g transform="translate(64,328)">
      <rect width="346" height="38" rx="8" fill="#a83a4a" opacity=".15" stroke="#a83a4a"/>
      <text x="173" y="24" class="lab" fill="#a83a4a" text-anchor="middle">매우 낮음 — 업무 지향형 ✓</text>

      <rect x="362" width="348" height="38" rx="8" fill="#cfdcec" stroke="#1f5582"/>
      <text x="536" y="24" class="lab" fill="#1f5582" text-anchor="middle">중간 — 관계 지향형 ✓</text>

      <rect x="726" width="346" height="38" rx="8" fill="#a83a4a" opacity=".15" stroke="#a83a4a"/>
      <text x="899" y="24" class="lab" fill="#a83a4a" text-anchor="middle">매우 높음 — 업무 지향형 ✓</text>
    </g>
  </g>

  <!-- Scene 2: 허시·블랜차드 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="416" class="num">2</text>
    <text x="92" y="416" class="bd">허시·블랜차드 — 구성원 성숙도 따라 4가지 스타일</text>
    <text x="64" y="442" class="small">리더 스타일이 ‘고정’이 아니라 구성원 성숙도(역량·의지)에 따라 바뀌어야 한다.</text>

    <g>
      <!-- 2x2 매트릭스 -->
      <rect x="84" y="464" width="240" height="100" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="100" y="488" class="lab" fill="#2a6f6f">코치형</text>
      <text x="100" y="510" class="small">의지 ↑ / 역량 ↓</text>
      <text x="100" y="530" class="small">— 지시 + 격려</text>
      <text x="100" y="552" class="it">동기는 있지만 능력 보충</text>

      <rect x="328" y="464" width="240" height="100" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="344" y="488" class="lab" fill="#2a6f6f">위임형</text>
      <text x="344" y="510" class="small">의지 ↑ / 역량 ↑</text>
      <text x="344" y="530" class="small">— 자율 부여</text>
      <text x="344" y="552" class="it">스스로 해결 가능</text>

      <rect x="84" y="572" width="240" height="100" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="100" y="596" class="lab" fill="#2a6f6f">지시형</text>
      <text x="100" y="618" class="small">의지 ↓ / 역량 ↓</text>
      <text x="100" y="638" class="small">— 명확한 지시·감독</text>
      <text x="100" y="660" class="it">초보 단계</text>

      <rect x="328" y="572" width="240" height="100" rx="8" fill="#dff0ec" stroke="#2a6f6f" stroke-width="1.2"/>
      <text x="344" y="596" class="lab" fill="#2a6f6f">지원형</text>
      <text x="344" y="618" class="small">의지 ↓ / 역량 ↑</text>
      <text x="344" y="638" class="small">— 동기 부여 중심</text>
      <text x="344" y="660" class="it">능력 있으나 의욕 부족</text>

      <!-- 축 -->
      <text x="448" y="450" class="small" text-anchor="middle">의지(심리적 성숙도) ↑</text>
      <text x="600" y="618" class="small" text-anchor="start">→ 역량(업무 성숙도)</text>

      <!-- 우측 설명 -->
      <rect class="panel" x="608" y="464" width="528" height="208" rx="10"/>
      <text x="628" y="492" class="lab">분류 기준</text>
      <line x1="628" y1="504" x2="1116" y2="504" stroke="#dfeae7" stroke-width="1"/>
      <text x="628" y="528" class="small">· 업무 성숙도 = 역량 (능력·경험)</text>
      <text x="628" y="550" class="small">· 심리적 성숙도 = 의지 (적극성·의욕·자신감)</text>
      <text x="628" y="582" class="lab">두 행동의 조합</text>
      <line x1="628" y1="594" x2="1116" y2="594" stroke="#dfeae7" stroke-width="1"/>
      <text x="628" y="618" class="small">· 과업 행동 — 구체적 지시·감독</text>
      <text x="628" y="640" class="small">· 관계 행동 — 인간적 관계·동기 부여</text>
      <text x="628" y="664" class="it" fill="#2a6f6f">구성원 상태에 맞춰 스타일을 ‘유연하게’ 변환</text>
    </g>
  </g>

  <!-- Scene 3: 번스·바스 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="710" class="num">3</text>
    <text x="92" y="710" class="bd">번스·바스 — 거래 vs 변혁의 리더십</text>

    <g>
      <rect class="panel" x="64" y="728" width="528" height="158" rx="10"/>
      <rect x="64" y="728" width="528" height="34" rx="10" fill="#a83a4a" opacity=".7"/>
      <text x="84" y="752" class="pill">거래적 리더십</text>
      <text x="84" y="788" class="small">· 보상과 처벌의 명확화</text>
      <text x="84" y="810" class="small">· 목표 달성 시 보상 / 일탈 시 조치</text>
      <text x="84" y="832" class="small">· 일탈 행위 감시</text>
      <text x="84" y="864" class="it" fill="#a83a4a">번스: 이걸로만 보는 건 한계!</text>

      <rect class="panel" x="608" y="728" width="528" height="158" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <rect x="608" y="728" width="528" height="34" rx="10" fill="#2a6f6f"/>
      <text x="628" y="752" class="pill">변혁적 리더십 (번스가 강조)</text>
      <text x="628" y="788" class="small">· 창의성 자극 + 책임의 분권화</text>
      <text x="628" y="810" class="small">· 멘토로서 영감·개인적 관심·조언</text>
      <text x="628" y="832" class="small">· 구성원의 동기·가치관을 변화</text>
      <text x="628" y="864" class="it" fill="#2a6f6f">리더와 구성원 = 상호 변화적 관계</text>
    </g>

    <rect x="64" y="900" width="1072" height="36" rx="8" fill="#fff8ec" stroke="#8b6f47" stroke-width="1.2"/>
    <text x="600" y="924" class="lab" fill="#8b6f47" text-anchor="middle">바스의 종합 — 두 리더십은 배타적이지 않다. ‘조합’이 가장 효과적</text>
  </g>

  <!-- Scene 4: 동기 부여 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="976" class="num">4</text>
    <text x="92" y="976" class="bd">로크 + 데시·라이언 — 동기 부여로 가는 리더십</text>

    <g>
      <rect class="panel" x="64" y="994" width="528" height="64" rx="10"/>
      <text x="84" y="1018" class="lab">로크 — 목표 설정 이론</text>
      <text x="84" y="1040" class="small">도전적·특정적·공개적 목표 → 의도적 노력과 성과 ↑</text>

      <rect class="panel" x="608" y="994" width="528" height="64" rx="10" stroke="#2a6f6f" stroke-width="1.4" fill="#dff0ec"/>
      <text x="628" y="1018" class="lab" fill="#2a6f6f">데시·라이언 — 자기 결정 이론</text>
      <text x="628" y="1040" class="small">자율권·자기 결정감 = 내적 동기 ↑ / 물적 보상 = 내적 동기 ↓</text>
    </g>
  </g>

  <text x="1140" y="1064" class="wm" text-anchor="end">EBS 2027 · 사회·문화 · 109쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#2a6f6f"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">6개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">피들러의 상황 적합성</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">리더 스타일(업무 지향 vs 관계 지향)과 상황의 호의성(관계·업무 구조·권한)의 적합성에 따라 성과가 결정된다.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">허시·블랜차드의 4가지 스타일</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">구성원의 역량·의지에 따라 지시형 / 코치형 / 지원형 / 위임형 리더십이 효과적이다.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">거래적 리더십</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">보상과 처벌의 명확화에 중점을 둔 타산적 리더십. 안정적·감시적이다.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">변혁적 리더십</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">구성원의 창의성과 책임 분권화를 지향. 영감과 멘토링으로 구성원의 동기·가치관을 변화시킨다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#2a6f6f">바스의 종합</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">변혁적·거래적 리더십은 상호 배타적이지 않고, 둘을 조합할 때 성과가 효과적으로 달성된다.</text>
  </g>
</svg>
