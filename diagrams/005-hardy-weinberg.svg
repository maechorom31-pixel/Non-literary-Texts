<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1300" role="img" aria-labelledby="t5 d5">
  <title id="t5">하디-바인베르크 평형 — 다섯 조건과 (p+q)² 전개</title>
  <desc id="d5">평형 법칙의 다섯 가지 조건이 모두 만족될 때만 유전자 빈도가 유지되며, (p+q)²의 전개로 다음 세대 유전자형 빈도를 계산한다.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fc}
      .panel{fill:#ffffff;stroke:#bfd0e3;stroke-width:1.2}
      .ti{font:600 28px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .sub{font:400 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .lab{font:600 16px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .bd{font:700 18px 'Pretendard',ui-sans-serif,sans-serif;fill:#10243a}
      .num{font:700 20px 'Pretendard',ui-sans-serif,sans-serif;fill:#1f5582}
      .it{font:400 14px 'Pretendard',ui-sans-serif,sans-serif;fill:#3a5371}
      .small{font:400 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#42597a}
      .pill{font:600 13px 'Pretendard',ui-sans-serif,sans-serif;fill:#ffffff}
      .mono{font:600 18px ui-monospace,'SF Mono',monospace;fill:#10243a}
      .wm{font:400 12px 'Pretendard',ui-sans-serif,sans-serif;fill:#7d97b6;letter-spacing:.04em}
      .reveal{transition:opacity .35s ease, transform .35s ease}
      svg[data-app] .reveal{opacity:0; transform:translateY(6px)}
      svg[data-app] .reveal.on{opacity:1; transform:translateY(0)}
    </style>
  </defs>

  <rect class="bg" width="1200" height="1080"/>

  <!-- Header -->
  <rect x="40" y="36" width="1120" height="68" rx="10" fill="#1f5582"/>
  <text x="64" y="80" class="ti" fill="#ffffff">하디-바인베르크 평형 — 다섯 조건과 (p+q)² 전개</text>
  <text x="1136" y="80" class="sub" fill="#cfdcec" text-anchor="end">과학·기술 · 인과</text>

  <!-- Scene 1: 도입 -->
  <g class="reveal" data-reveal-step="1">
    <text x="64" y="140" class="num">1</text>
    <text x="92" y="140" class="bd">평형 법칙의 제안 — 1908</text>
    <text x="64" y="166" class="small">하디(영국, 수학자)·바인베르크(독일, 의사)가 독립적으로 제안. 멘델 유전 법칙에 기반한 수학적 모델.</text>

    <rect class="panel" x="64" y="184" width="1072" height="98" rx="10"/>
    <rect x="64" y="184" width="6" height="98" fill="#1f5582"/>
    <text x="84" y="212" class="lab">집단 유전학의 출발점</text>
    <line x1="84" y1="224" x2="1116" y2="224" stroke="#dfe7f1" stroke-width="1"/>
    <text x="84" y="248" class="small">일정한 조건이 모두 충족되면, 한 집단 안의 유전자 빈도와 유전자형 빈도는 세대가 지나도 변하지 않는다.</text>
    <text x="84" y="270" class="it" fill="#1f5582">→ 진화가 일어나지 않는 ‘이상적 상태’를 정의함으로써, 진화의 동력을 거꾸로 가늠하는 기준점이 된다.</text>
  </g>

  <!-- Scene 2: 다섯 조건 -->
  <g class="reveal" data-reveal-step="2">
    <text x="64" y="328" class="num">2</text>
    <text x="92" y="328" class="bd">평형이 유지되기 위한 다섯 가지 조건</text>
    <text x="64" y="354" class="small">하나라도 깨지면 평형이 깨진다 — 그 깨짐이 곧 ‘진화의 동력’.</text>

    <g>
      <rect x="64" y="372" width="208" height="120" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <circle cx="100" cy="408" r="22" fill="#1f5582"/>
      <text x="100" y="414" class="pill" text-anchor="middle">①</text>
      <text x="84" y="450" class="lab">큰 집단</text>
      <text x="84" y="472" class="small">유전적 부동(우연 변화)</text>
      <text x="84" y="488" class="small">을 무시할 수 있을 만큼</text>

      <rect x="280" y="372" width="208" height="120" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <circle cx="316" cy="408" r="22" fill="#1f5582"/>
      <text x="316" y="414" class="pill" text-anchor="middle">②</text>
      <text x="300" y="450" class="lab">무작위 교배</text>
      <text x="300" y="472" class="small">선호·동류 짝짓기 없음</text>
      <text x="300" y="488" class="small">짝 선택이 임의적</text>

      <rect x="496" y="372" width="208" height="120" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <circle cx="532" cy="408" r="22" fill="#1f5582"/>
      <text x="532" y="414" class="pill" text-anchor="middle">③</text>
      <text x="516" y="450" class="lab">돌연변이 없음</text>
      <text x="516" y="472" class="small">새로운 대립 유전자가</text>
      <text x="516" y="488" class="small">생기지 않아야</text>

      <rect x="712" y="372" width="208" height="120" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <circle cx="748" cy="408" r="22" fill="#1f5582"/>
      <text x="748" y="414" class="pill" text-anchor="middle">④</text>
      <text x="732" y="450" class="lab">이주 없음</text>
      <text x="732" y="472" class="small">다른 집단으로의 유출</text>
      <text x="732" y="488" class="small">·유입이 없어야</text>

      <rect x="928" y="372" width="208" height="120" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <circle cx="964" cy="408" r="22" fill="#1f5582"/>
      <text x="964" y="414" class="pill" text-anchor="middle">⑤</text>
      <text x="948" y="450" class="lab">자연 선택 없음</text>
      <text x="948" y="472" class="small">유전자형별 적응도가</text>
      <text x="948" y="488" class="small">동일</text>
    </g>
  </g>

  <!-- Scene 3: (p+q)² 계산 -->
  <g class="reveal" data-reveal-step="3">
    <text x="64" y="544" class="num">3</text>
    <text x="92" y="544" class="bd">유전자형 빈도 계산 — (p+q)² 전개</text>
    <text x="64" y="570" class="small">예) 나비 집단에서 대립 유전자 A=0.7, a=0.3. 무작위 교배 시 다음 세대의 유전자형 빈도는?</text>

    <rect class="panel" x="64" y="588" width="528" height="240" rx="10"/>
    <text x="84" y="616" class="lab">대립 유전자 빈도 (p+q=1)</text>
    <line x1="84" y1="628" x2="572" y2="628" stroke="#dfe7f1" stroke-width="1"/>

    <g>
      <rect x="84" y="648" width="220" height="60" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <text x="194" y="678" class="lab" text-anchor="middle">A 의 빈도 p</text>
      <text x="194" y="698" class="mono" text-anchor="middle">p = 0.7</text>

      <rect x="320" y="648" width="220" height="60" rx="10" fill="#fbe6e9" stroke="#a83a4a" stroke-width="1.2"/>
      <text x="430" y="678" class="lab" text-anchor="middle" fill="#a83a4a">a 의 빈도 q</text>
      <text x="430" y="698" class="mono" text-anchor="middle" fill="#a83a4a">q = 0.3</text>
    </g>

    <text x="84" y="744" class="lab">전개식</text>
    <line x1="84" y1="756" x2="572" y2="756" stroke="#dfe7f1" stroke-width="1"/>
    <text x="84" y="784" class="mono">(p + q)² = p² + 2pq + q²</text>
    <text x="84" y="810" class="mono">      = 0.49 + 0.42 + 0.09 = 1</text>

    <!-- 푸넷 사각형 -->
    <g transform="translate(620,610)">
      <text x="240" y="6" class="lab" text-anchor="middle">유전자형 빈도 (Punnett Square)</text>

      <rect x="120" y="20" width="120" height="36" fill="#1f5582"/>
      <text x="180" y="44" class="pill" text-anchor="middle">A (0.7)</text>
      <rect x="240" y="20" width="120" height="36" fill="#a83a4a"/>
      <text x="300" y="44" class="pill" text-anchor="middle">a (0.3)</text>

      <rect x="0" y="56" width="120" height="84" fill="#1f5582"/>
      <text x="60" y="104" class="pill" text-anchor="middle">A (0.7)</text>
      <rect x="120" y="56" width="120" height="84" fill="#dfeef9" stroke="#bfd0e3" stroke-width="1"/>
      <text x="180" y="92" class="lab" text-anchor="middle">AA</text>
      <text x="180" y="116" class="mono" text-anchor="middle" fill="#1f5582">0.49</text>
      <rect x="240" y="56" width="120" height="84" fill="#fff8ec" stroke="#bfd0e3" stroke-width="1"/>
      <text x="300" y="92" class="lab" text-anchor="middle">Aa</text>
      <text x="300" y="116" class="mono" text-anchor="middle" fill="#8b6f47">0.21</text>

      <rect x="0" y="140" width="120" height="84" fill="#a83a4a"/>
      <text x="60" y="188" class="pill" text-anchor="middle">a (0.3)</text>
      <rect x="120" y="140" width="120" height="84" fill="#fff8ec" stroke="#bfd0e3" stroke-width="1"/>
      <text x="180" y="176" class="lab" text-anchor="middle">Aa</text>
      <text x="180" y="200" class="mono" text-anchor="middle" fill="#8b6f47">0.21</text>
      <rect x="240" y="140" width="120" height="84" fill="#fbe6e9" stroke="#bfd0e3" stroke-width="1"/>
      <text x="300" y="176" class="lab" text-anchor="middle">aa</text>
      <text x="300" y="200" class="mono" text-anchor="middle" fill="#a83a4a">0.09</text>
    </g>

    <text x="84" y="868" class="it" fill="#1f5582">→ 다음 세대 유전자형 빈도: AA 0.49 · Aa 0.42 · aa 0.09 (다섯 조건이 유지되는 한 영원히 그대로)</text>
  </g>

  <!-- Scene 4: 응용 -->
  <g class="reveal" data-reveal-step="4">
    <text x="64" y="916" class="num">4</text>
    <text x="92" y="916" class="bd">응용 — 평형은 진화 연구의 강력한 도구</text>

    <g>
      <rect x="64" y="934" width="528" height="98" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <text x="84" y="962" class="lab">유전 질환 보인자 빈도 추정</text>
      <text x="84" y="986" class="small">열성 동형(aa)으로 발현되는 질환의 경우</text>
      <text x="84" y="1006" class="small">관찰된 환자 비율 q² 로부터 q와 보인자 비율 2pq를 추정</text>

      <rect x="608" y="934" width="528" height="98" rx="10" fill="#dfeef9" stroke="#1f5582" stroke-width="1.2"/>
      <text x="628" y="962" class="lab">평형에서 벗어남 = 진화의 신호</text>
      <text x="628" y="986" class="small">실측 빈도가 평형값에서 멀어진 만큼</text>
      <text x="628" y="1006" class="small">다섯 조건 중 무엇이 작용하는지 진단할 수 있다</text>
    </g>
  </g>

  <text x="1140" y="1064" class="wm" text-anchor="end">EBS 2027 · 과학·기술 · 186쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="1080" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="1080" width="1120" height="32" rx="6" fill="#1f5582"/>
    <text x="60" y="1102" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="1102" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="1114" x2="1160" y2="1114" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1130" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">하디-바인베르크 평형</text>
    <text x="240" y="1130" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">일정 조건이 모두 충족되면 한 집단의 유전자 빈도와 유전자형 빈도가 세대가 지나도 변하지 않는다는 법칙.</text>
    <line x1="40" y1="1144" x2="1160" y2="1144" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1160" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">다섯 가지 조건</text>
    <text x="240" y="1160" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">충분히 큰 집단, 무작위 교배, 돌연변이 없음, 이주 없음, 자연 선택 없음.</text>
    <line x1="40" y1="1174" x2="1160" y2="1174" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1190" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">유전적 부동</text>
    <text x="240" y="1190" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">작은 집단에서 우연으로 유전자 빈도가 변하는 현상. 큰 집단 조건을 깨뜨리는 요인.</text>
    <line x1="40" y1="1204" x2="1160" y2="1204" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1220" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">(p+q)² 식</text>
    <text x="240" y="1220" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">두 대립 유전자의 빈도 p, q에서 다음 세대 유전자형 빈도를 계산하는 식. p² + 2pq + q²로 전개된다.</text>
    <line x1="40" y1="1234" x2="1160" y2="1234" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1250" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#1f5582">응용</text>
    <text x="240" y="1250" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">유전 질환 보인자 빈도 추정, 평형에서 벗어난 정도로 진화의 동력 확인 등에 활용된다.</text>
  </g>
</svg>
