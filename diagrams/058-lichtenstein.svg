<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1160" role="img" aria-labelledby="t058 d058">
  <title id="t058">로이 리히텐슈타인의 팝 아트</title>
  <desc id="d058">1960년대 미국 대중 매체 발달과 함께 등장한 팝 아트의 거장 리히텐슈타인이 만화의 형식 요소를 어떻게 회화로 가져왔는지를 시각화한다. 인쇄소의 점묘 패턴을 손으로 직접 찍어 재현한 벤데이 도트 기법, 평면적 원색과 굵은 검은색 윤곽선의 시각 효과, 만화의 패널을 그대로 모사하지 않고 특정 장면을 선택적으로 확대해 정서적 긴장을 극대화하는 재구성 기법, 그리고 말풍선과 의성어를 정보 전달이 아닌 시각적 조형 요소로 사용한 점, 「꽈광!(Whaam!)」 사례를 통해 그 정수가 어떻게 드러나는지 정리한다.</desc>

  <style><![CDATA[
    .reveal { transition: opacity .35s ease, transform .35s ease; }
    .lbl { font-family: 'Pretendard', sans-serif; font-size: 13px; fill: #4a3f33; }
    .lbl-sm { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #7a6f5f; }
    .lbl-xs { font-family: 'Pretendard', sans-serif; font-size: 10px; fill: #7a6f5f; }
    .lbl-strong { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; fill: #1a1612; }
    .lbl-title { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; fill: #1a1612; }
    .lbl-head { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; fill: #1a1612; }
    .ink { stroke: #1a1612; }
    .paper { fill: #f5f1e8; }
    .paper2 { fill: #ebe5d4; }
    .rule { stroke: #c9bfa8; }
    .met { fill: #8b6f47; }
    .met-st { stroke: #8b6f47; }
    .met-bg { fill: rgba(139,111,71,0.08); }
    .met-bg2 { fill: rgba(139,111,71,0.18); }
    .acc { fill: #a83a4a; }
    .acc-st { stroke: #a83a4a; }
    .acc-bg { fill: rgba(168,58,74,0.08); }
    .pop-yellow { fill: #d4a72c; }
    .pop-blue { fill: #1f5582; }
  ]]></style>

  <!-- 도입 -->
  <g class="reveal" data-reveal-step="1">
    <rect x="40" y="30" width="1120" height="100" rx="6" class="paper rule" stroke-width="1"/>
    <text x="60" y="60" class="lbl-head">로이 리히텐슈타인 — 팝 아트의 거장</text>
    <text x="60" y="86" class="lbl-sm">1960년대 미국 대중 매체 발달 + 만화·광고·유명인 등 대중문화 이미지의 미술 영역 진입</text>
    <text x="60" y="108" class="lbl-xs" fill="#8b6f47" font-weight="700">기존 회화의 정교한 붓 터치·고전적 주제 → 만화 형식의 미적 재해석</text>
  </g>

  <!-- Step 2 · 벤데이 도트 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="40" y="150" width="540" height="260" rx="6" class="met-bg met-st" stroke-width="1.5"/>
    <text x="60" y="178" class="lbl-strong" fill="#8b6f47">기법 ① 벤데이 도트</text>
    <text x="60" y="200" class="lbl-sm">만화 인쇄에 쓰이던 점묘 패턴을 손으로 직접 재현</text>

    <!-- 도트 패턴 -->
    <g transform="translate(60, 230)">
      <rect x="0" y="0" width="500" height="120" rx="4" class="paper rule" stroke-width="1"/>
      <!-- 빨간 도트 -->
      <g fill="#a83a4a">
        <circle cx="40" cy="20" r="5"/><circle cx="80" cy="20" r="5"/><circle cx="120" cy="20" r="5"/>
        <circle cx="160" cy="20" r="5"/><circle cx="200" cy="20" r="5"/><circle cx="240" cy="20" r="5"/>
        <circle cx="280" cy="20" r="5"/><circle cx="320" cy="20" r="5"/><circle cx="360" cy="20" r="5"/>
        <circle cx="400" cy="20" r="5"/><circle cx="440" cy="20" r="5"/>
        <circle cx="40" cy="40" r="5"/><circle cx="80" cy="40" r="5"/><circle cx="120" cy="40" r="5"/>
        <circle cx="160" cy="40" r="5"/><circle cx="200" cy="40" r="5"/><circle cx="240" cy="40" r="5"/>
        <circle cx="280" cy="40" r="5"/><circle cx="320" cy="40" r="5"/><circle cx="360" cy="40" r="5"/>
        <circle cx="400" cy="40" r="5"/><circle cx="440" cy="40" r="5"/>
        <circle cx="40" cy="60" r="5"/><circle cx="80" cy="60" r="5"/><circle cx="120" cy="60" r="5"/>
        <circle cx="160" cy="60" r="5"/><circle cx="200" cy="60" r="5"/><circle cx="240" cy="60" r="5"/>
        <circle cx="280" cy="60" r="5"/><circle cx="320" cy="60" r="5"/><circle cx="360" cy="60" r="5"/>
        <circle cx="400" cy="60" r="5"/><circle cx="440" cy="60" r="5"/>
        <circle cx="40" cy="80" r="5"/><circle cx="80" cy="80" r="5"/><circle cx="120" cy="80" r="5"/>
        <circle cx="160" cy="80" r="5"/><circle cx="200" cy="80" r="5"/><circle cx="240" cy="80" r="5"/>
        <circle cx="280" cy="80" r="5"/><circle cx="320" cy="80" r="5"/><circle cx="360" cy="80" r="5"/>
        <circle cx="400" cy="80" r="5"/><circle cx="440" cy="80" r="5"/>
        <circle cx="40" cy="100" r="5"/><circle cx="80" cy="100" r="5"/><circle cx="120" cy="100" r="5"/>
        <circle cx="160" cy="100" r="5"/><circle cx="200" cy="100" r="5"/><circle cx="240" cy="100" r="5"/>
        <circle cx="280" cy="100" r="5"/><circle cx="320" cy="100" r="5"/><circle cx="360" cy="100" r="5"/>
        <circle cx="400" cy="100" r="5"/><circle cx="440" cy="100" r="5"/>
      </g>
    </g>

    <text x="60" y="380" class="lbl-xs" fill="#8b6f47" font-weight="700">기계가 인쇄한 듯한 균질한 효과 → but 실제로는 수작업과 반복</text>
    <text x="60" y="396" class="lbl-xs">→ 기계적 재현과 수작업이 결합된 독창적 예술 작품</text>
  </g>

  <!-- Step 2 · 평면적 색면 + 윤곽선 -->
  <g class="reveal" data-reveal-step="2">
    <rect x="620" y="150" width="540" height="260" rx="6" class="met-bg2 met-st" stroke-width="1.5"/>
    <text x="640" y="178" class="lbl-strong" fill="#8b6f47">기법 ② 평면적 원색 + 굵은 윤곽선</text>
    <text x="640" y="200" class="lbl-sm">만화 인쇄물의 시각 효과를 회화로 재현</text>

    <!-- 색면 + 굵은 윤곽선 시각화 -->
    <g transform="translate(700, 240)">
      <!-- 빨강 -->
      <path d="M 0 0 L 100 0 L 100 100 L 0 100 Z" class="acc"/>
      <!-- 노랑 -->
      <path d="M 110 0 L 210 0 L 210 100 L 110 100 Z" class="pop-yellow"/>
      <!-- 파랑 -->
      <path d="M 220 0 L 320 0 L 320 100 L 220 100 Z" class="pop-blue"/>
      <!-- 굵은 검은 윤곽선 -->
      <rect x="-2" y="-2" width="324" height="104" fill="none" class="ink" stroke-width="6"/>
      <line x1="100" y1="0" x2="100" y2="100" class="ink" stroke-width="6"/>
      <line x1="210" y1="0" x2="210" y2="100" class="ink" stroke-width="6"/>
    </g>

    <text x="640" y="380" class="lbl-xs" fill="#8b6f47" font-weight="700">평면적 원색의 색면 구성 + 명확한 검은 윤곽 → 만화의 시각 효과 회화로</text>
  </g>

  <!-- Step 3 · 패널의 선택적 확대 -->
  <g class="reveal" data-reveal-step="3">
    <rect x="40" y="430" width="1120" height="220" rx="6" class="paper rule" stroke-width="1.2"/>
    <text x="60" y="458" class="lbl-strong">기법 ③ 패널의 선택적 확대</text>
    <text x="60" y="478" class="lbl-sm">패널 = 만화에서 서사를 분절해 보여 주는 개별 장면 단위</text>

    <!-- 만화 4컷 (작은 패널) -->
    <g transform="translate(80, 500)">
      <rect x="0" y="0" width="80" height="100" class="paper2 ink" stroke-width="2"/>
      <text x="40" y="56" text-anchor="middle" class="lbl-xs" fill="#7a6f5f">패널 1</text>
      <rect x="90" y="0" width="80" height="100" class="paper2 ink" stroke-width="2"/>
      <text x="130" y="56" text-anchor="middle" class="lbl-xs" fill="#7a6f5f">패널 2</text>
      <!-- 강조 패널 -->
      <rect x="180" y="-4" width="84" height="108" class="acc-bg acc-st" stroke-width="3"/>
      <text x="222" y="56" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">패널 3</text>
      <rect x="274" y="0" width="80" height="100" class="paper2 ink" stroke-width="2"/>
      <text x="314" y="56" text-anchor="middle" class="lbl-xs" fill="#7a6f5f">패널 4</text>
    </g>

    <!-- 화살표 -->
    <text x="500" y="560" class="lbl-head" fill="#a83a4a">→</text>

    <!-- 확대된 패널 -->
    <g transform="translate(580, 500)">
      <rect x="0" y="-10" width="500" height="120" class="acc-bg acc-st" stroke-width="3"/>
      <text x="250" y="34" text-anchor="middle" class="lbl-strong" fill="#a83a4a">패널 3 (선택·확대)</text>
      <text x="250" y="58" text-anchor="middle" class="lbl-xs">→ 특정 정서적 긴장을 극대화</text>
      <text x="250" y="78" text-anchor="middle" class="lbl-xs" fill="#a83a4a" font-weight="700">단순 모사 X — 선택과 재배열의 미적 재해석</text>
    </g>
  </g>

  <!-- Step 4 · 말풍선·의성어 + 사례 -->
  <g class="reveal" data-reveal-step="4">
    <rect x="40" y="670" width="1120" height="240" rx="6" class="met-bg2 met-st" stroke-width="1.5"/>
    <text x="60" y="698" class="lbl-strong" fill="#8b6f47">기법 ④ 말풍선·의성어 + 대표작 「꽈광!(Whaam!)」</text>

    <!-- 의성어 시각화 -->
    <g transform="translate(80, 720)">
      <!-- 폭발 모양 -->
      <polygon points="0,80 30,40 50,70 80,20 110,60 140,30 170,75 200,40 230,80 220,110 180,100 150,130 110,110 80,140 50,110 30,130 10,110" fill="#d4a72c" stroke="#1a1612" stroke-width="2.4"/>
      <text x="115" y="100" text-anchor="middle" font-family="Noto Serif KR" font-size="38" font-weight="900" fill="#a83a4a">WHAAM!</text>
      <text x="115" y="174" text-anchor="middle" class="lbl-xs" font-weight="700">「꽈광!(Whaam!)」 (1963)</text>
    </g>

    <!-- 분석 박스 -->
    <g transform="translate(380, 730)">
      <rect x="0" y="0" width="380" height="150" rx="4" class="paper rule" stroke-width="1"/>
      <text x="14" y="22" class="lbl-strong">원작 vs 리히텐슈타인</text>
      <text x="14" y="44" class="lbl-sm">원작(전쟁 만화): 적기를 격추하는 전투기 강조</text>
      <text x="14" y="62" class="lbl-sm" fill="#a83a4a" font-weight="700">→ 리히텐슈타인: 격추된 전투기의 폭발 강조</text>
      <text x="14" y="92" class="lbl-strong">의성어의 효과</text>
      <text x="14" y="112" class="lbl-xs">각진 텍스트 → 격렬한 폭발과 화염을 극적으로</text>
      <text x="14" y="128" class="lbl-xs">→ 폭발의 소리까지 떠올리게 하는 시각 조형 요소</text>
    </g>

    <!-- 평가 박스 -->
    <g transform="translate(780, 730)">
      <rect x="0" y="0" width="360" height="150" rx="4" class="met"/>
      <text x="14" y="22" class="lbl-strong" fill="#f5f1e8">예술적 의의</text>
      <text x="14" y="44" class="lbl-sm" fill="#f5f1e8">대중 매체의 이미지를</text>
      <text x="14" y="62" class="lbl-sm" fill="#f5f1e8">차용하고 재해석</text>
      <text x="14" y="84" class="lbl-xs" fill="#f5f1e8" opacity="0.85">단순 복제 X</text>
      <text x="14" y="100" class="lbl-xs" fill="#f5f1e8" opacity="0.85">→ 만화 형식 요소를 미적</text>
      <text x="14" y="116" class="lbl-xs" fill="#f5f1e8" opacity="0.85">  재해석의 도구로 사용</text>
      <text x="14" y="138" class="lbl-xs" fill="#f5f1e8" font-weight="700">새로운 회화 양식의 선구</text>
    </g>
  </g>

  <text x="1160" y="930" text-anchor="end" class="lbl-sm" fill="#7a6f5f">EBS · 독서 방법 · 28쪽</text>
  <!-- FOOTER_AUTO -->
  <g>
    <rect x="40" y="940" width="1120" height="200" rx="6" fill="#fdfaf2" stroke="#c9bfa8" stroke-width="1"/>
    <rect x="40" y="940" width="1120" height="32" rx="6" fill="#8b6f47"/>
    <text x="60" y="962" font-family="Noto Serif KR, serif" font-size="15" font-weight="700" fill="#f5f1e8">핵심 개념 정리</text>
    <text x="1140" y="962" text-anchor="end" font-family="Pretendard, sans-serif" font-size="11" fill="#cfe5e1">5개 항목</text>
    <line x1="40" y1="974" x2="1160" y2="974" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="990" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">팝 아트의 등장</text>
    <text x="240" y="990" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">1960년대 대중 매체 발달과 함께 일상의 대중 이미지를 미술 소재로 활용하는 사조.</text>
    <line x1="40" y1="1004" x2="1160" y2="1004" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1020" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">벤데이 도트</text>
    <text x="240" y="1020" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">만화 인쇄의 점묘 패턴을 손으로 직접 찍어 기계적 재현과 수작업의 독창적 조화를 만들어 낸다.</text>
    <line x1="40" y1="1034" x2="1160" y2="1034" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1050" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">평면적 원색과 굵은 윤곽선</text>
    <text x="240" y="1050" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">만화의 시각적 특징을 회화로 가져와 시각적 효과를 극대화한다.</text>
    <line x1="40" y1="1064" x2="1160" y2="1064" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1080" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">패널의 선택적 확대</text>
    <text x="240" y="1080" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">만화 한 장면을 확대해 특정 정서를 극대화하며, 단순 복제가 아닌 미적 재해석으로 만든다.</text>
    <line x1="40" y1="1094" x2="1160" y2="1094" stroke="#c9bfa8" stroke-width="0.5"/>
    <text x="60" y="1110" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#8b6f47">말풍선·의성어</text>
    <text x="240" y="1110" font-family="Pretendard, sans-serif" font-size="13" fill="#4a3f33">시각적 조형 요소로 배치해 단순 정보 전달을 넘는 정서적 긴장감을 표현한다.</text>
  </g>
</svg>
